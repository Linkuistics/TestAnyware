  ### Session 25 (2026-05-04T01:27:44Z) — Wire schema-presence contract test

  - Implemented the `every_schema_id_has_a_schema_file` test in `cli-rs/crates/testanyware-cli/tests/cli-contract.rs`, which had been stubbed as `todo!()` with `#[ignore]`. On entry, discovered the 20 distinct stub JSON files under `docs/reference/cli-schemas/` were already created in a prior commit — only the test wiring remained.
  - Added `serde_json` to a new `[dev-dependencies]` block in `cli-rs/crates/testanyware-cli/Cargo.toml` (kept out of binary runtime deps). The test deduplicates `schema_id` values via `BTreeSet`, then for each unique id asserts the file exists and parses as valid JSON. Failures are accumulated before asserting so all offenders are reported in a single failure rather than stopping on the first.
  - `Cargo.lock` regenerated automatically to record the new dev dependency.
  - All changes compile and `cargo test --test cli-contract` passes.

  What this suggests trying next:
  - The `add-ubuntu-ci-matrix-entry-for-cargo-build-test-linux-build-verification` task is now more compelling: the contract test suite (including the newly enabled schema check) should run on Linux CI.
  - Schema files are stubs (`{"schema_version": "1.0", "$comment": "TODO"}`); a future task should evolve them to real JSON Schema documents as commands are implemented.
