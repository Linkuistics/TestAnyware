body: |
  ### Session 33 (2026-05-04T07:51:17Z) — Port agent-only CLI commands to Rust

  - Implemented `agent {health,windows,snapshot,inspect,press}` and `file {exec,upload,download}` commands in Rust, end-to-end from CLI flags to HTTP agent calls.
  - Added `AgentClient` endpoint methods in `cli-rs/crates/testanyware-agent-client/src/lib.rs` — expanded from a stub to ~316 lines covering all eight endpoints plus typed error conversion from `reqwest::Error`.
  - Added connection resolution in `cli-rs/crates/testanyware-cli/src/resolve.rs` mirroring Swift's `ConnectionOptions.resolveAgent` chain: `--connect` spec file, `--vm` per-VM spec under `$XDG_STATE_HOME`, `--agent` direct endpoint, env vars, then error.
  - Added `OutputMode` and JSON/text envelope helpers in `cli-rs/crates/testanyware-cli/src/output.rs` implementing the §3 success and §3.4 error envelopes.
  - Extracted command handlers into `cli-rs/crates/testanyware-cli/src/commands/agent.rs` (211 lines) and `file.rs` (173 lines).
  - Added `agent_requests.rs` to `testanyware-protocol` (192 lines) with typed structs for all request/response bodies.
  - Wrote wiremock-based integration tests in `cli-rs/crates/testanyware-agent-client/tests/endpoint_integration.rs` (299 lines) covering all endpoints against a local mock HTTP server.
  - Updated all JSON schemas under `docs/reference/cli-schemas/` to reflect correct wire shapes.
  - `AgentError` carries stable `code()` tokens aligned with §4 of the CLI design contract; wire-error strings are mapped via `map_wire_error()`.
  - All commands have `--help` after-help blocks with ≥2 examples and full EXIT CODES sections per §7-template.
  - Task `port-agent-only-cli-commands-exec-upload-download-agent-to-rust` marked done.
  - What this suggests next: run the wiremock suite (`cargo test -p testanyware-agent-client`) and validate against a live QEMU Linux guest before declaring live parity; then proceed to VNC/OCR-dependent commands.
