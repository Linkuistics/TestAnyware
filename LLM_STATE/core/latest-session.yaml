body: |
  ### Session 26 (2026-05-04T02:02:14Z) — Migrate Rust CLI to noun-first command structure

  - Restructured the clap command tree in `cli-rs/crates/testanyware-cli/src/main.rs` from a flat verb-first surface to noun-first groups matching the CLI design contract §1 `CANONICAL_COMMANDS` table.
  - Added `Screen` (capture, record, size, find-text), `File` (upload, download, exec) top-level noun groups; expanded `Agent` subcommands (wait, set-value, focus, show-menu, window-focus/resize/move/close/minimize); added `Capabilities`, `Schema`, `LlmInstructions` top-level commands.
  - Retained all original verb-first names (`screenshot`, `record`, `screen-size`, `find-text`, `upload`, `download`, `exec`) as clap enum variants with §7.2-style alias announcements in their doc comments.
  - Added synonym aliases: `vm list` → `ls`, `vm delete` → `rm`/`remove`, `agent inspect` → `show`.
  - Extracted shared `Args` structs (`ConnectionArgs`, `ScreenCaptureArgs`, `ScreenRecordArgs`, etc.) to avoid duplicating field definitions between canonical and alias variants.
  - Updated `cli-rs/crates/testanyware-cli/tests/cli-contract.rs`: removed `#[ignore]` from four contract tests (`every_canonical_command_is_present`, `verb_first_aliases_match_canonical`, `synonym_aliases_match_canonical`, `each_canonical_command_help_succeeds`) and replaced the `todo!()` stubs with real assertion loops.
  - All four contract tests pass against the migrated surface.

  What worked: clap's `aliases` attribute on `#[command]` cleanly threads synonym aliases through to the canonical's help body, satisfying the synonym-help-equality check in the contract test. Verb-first variants as separate enum members with custom doc comments satisfies §7.2's alias-announcement requirement without special macro machinery.

  What didn't: none — the migration was clean.

  What this suggests next: the four newly-active contract tests form a regression guard for the entire CLI surface. Future port tasks (implementing actual behaviour behind stubs) should not need to touch the surface contract tests again unless adding new commands.
