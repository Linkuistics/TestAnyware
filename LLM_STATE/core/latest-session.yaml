body: |
  ### Session 37 (2026-05-04T12:34:51Z) — Port WindowOriginCompensation and wire --window into input subcommands

  - Ported `WindowOriginCompensation` from the Swift CLI into a new Rust module `commands/window.rs`, exposing `resolve_window_offset` and `apply_window_offset` helpers. The module carries 9 unit tests covering the 40 px macOS Tahoe default inset, `TESTANYWARE_WINDOW_TOP_INSET` env override, non-macOS pass-through paths, `f64→i32` truncation parity with Swift's `Int(Double)`, and env-parse error cases.
  - Wired `--window <name>` into all six window-relative input subcommands (`click`, `mouse-down`, `mouse-up`, `move`, `scroll`, `drag`) in both `main.rs` (clap enum variants + dispatcher arms) and `input.rs` (run_* function signatures + `apply_window_offset` call sites). `run_drag` resolves the window once and applies the same offset to both endpoints, matching the Swift helper's behaviour.
  - Extended `resolve.rs` with `resolve_platform()` and `resolve_platform_with_env()` that follow the `--platform`/env → spec.platform → caller-default chain, enabling `resolve_target_platform` in `input.rs` to fall back to the per-VM spec's `platform` field rather than always defaulting to macOS immediately.
  - `cargo test --workspace` is 219/219 green; `cargo build --workspace` is clean. The single new clippy warning (`too_many_arguments` on `run_drag`, now 9/7) is suppressed at the function site with `#[allow]`.
  - End-to-end correctness of the 40 px inset requires a live Tahoe golden VM — all unit-testable behaviour is covered but live-VM verification is deferred to the existing verification-gate task.
  - Remaining backlog tasks that could not be attempted have structural blockers: live VMs for verification gates, ffmpeg-next compilation for VNC viewer, ~1300 lines of QEMU runner logic that cannot be honestly verified without live VMs.

  ## What this suggests next

  - Add `--window`-relative click correctness to the live-VM verification gate task checklist (e.g., close button of a known window via `--window <appName>` confirmed by OCR).
  - The memory entry `rust-cli-window-flag-not-yet-ported` is now obsolete and should be retired in triage.
  - A small follow-up task to add a VNC connect timeout to `RfbConnection::connect` was flagged but not implemented; worth tracking.
