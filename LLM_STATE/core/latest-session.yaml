body: |
  ### Session 22 (2026-05-03T23:36:41Z) — Audit Swift CLI and produce Rust port design contract

  - Attempted: Full audit of the Swift CLI surface against `cli-tool-design.md` guidelines; production of a written design contract (`docs/architecture/cli-design-contract.md`) and stub JSON Schema directory (`docs/reference/cli-schemas/`) for all 20 declared commands plus a shared error envelope.
  - What worked: The contract document was produced at ~600 lines across 12 sections, covering: noun-first canonical command names with verb-first aliases, a frozen flag vocabulary, a canonical error-code catalogue, bucketed exit codes (0–7 with slot 7 reserved for timeouts), a hard CI gate requiring ≥ 2 help examples per public subcommand, required discoverability commands (`capabilities`, `schema <cmd>`, `llm-instructions`), per-command idempotency table, and a gap report against the current Swift CLI. All 21 stub schema files parse as valid JSON.
  - What didn't work / open questions: (1) The right `--limit` default for `agent snapshot` (element counts can far exceed 100) is deferred to the port task. (2) Whether `--window-regex` is a v1 requirement or a follow-up was not decided; flagged in the contract as optional v1. (3) Linux/Windows agent error-string realignment is required by the contract but is not covered by any existing backlog task.
  - What this suggests next: Port tasks (`port-agent-only-cli-commands-exec-upload-download-agent-to-rust` or `port-qemu-runner-and-vm-lifecycle-to-rust`) can now begin against this contract. Triage should spawn three new tasks: realign Linux agent error strings, realign Windows agent error strings, add `tests/cli-contract.rs` skeleton.
  - Key learnings: The Swift CLI fails the contract on six axes (JSON coverage, help examples, error structure, verb/noun convention, behaviour gaps, discoverability). The gap report in §10 maps each failure to the Rust-port acceptance criterion for the implementing task, so port-task authors have a fixed bar without re-reading the audit.
