tasks:
- id: add-testanyware-min-tool-sentinels-to-release-build-sh-for-release-pipeline-tools
  title: Add testanyware-min-tool sentinels to release-build.sh for release pipeline tools
  category: feature
  status: not_started
  dependencies: []
  description: |
    Add testanyware-min-tool sentinels to release-build.sh for release pipeline tools

    **Background:** `ProvisionerScriptsVersionCheck` was added to `testanyware doctor` to read `# testanyware-min-tool: <tool> <version>` sentinel comments from bundled `.sh` files and compare them against installed host tool versions. As of this task, no bundled script declares any sentinels — the doctor prints `✓ no version sentinels declared in bundled scripts`.

    `release-build.sh` performs the actual release build (swift build, dotnet publish, etc.) and silently depends on minimum versions of tools. Today its tool checks are human-facing only (e.g., `release-doctor.sh` prints `swift --version` for visual inspection). Adding sentinels to `release-build.sh` (and/or `release-doctor.sh`) would give the doctor automated version-coherence coverage for the release pipeline tools.

    **Work to do:**
    - Identify which tools and minimum versions `release-build.sh` implicitly depends on (swift, dotnet, gh, etc.).
    - Add `# testanyware-min-tool: <tool> <version>` sentinel comment lines to `scripts/release-build.sh` for each identified dependency.
    - Run `testanyware doctor` and verify the new sentinels are picked up and reported correctly.
    - If minimum versions are not clearly established, document the investigation findings and add sentinels for what can be confidently determined.

    **Acceptance:** `testanyware doctor` reports the release pipeline tool floors from `release-build.sh` sentinels. Below-floor installs produce advisory warnings matching `ToolAvailabilityCheck` precedent.

    **Promoted from:** `add-provisionerscriptsversioncheck-to-doctor-command` results — "What this suggests next" item 2.
