tasks:
- id: disable-ssh-in-macos-and-linux-golden-images
  title: Disable SSH in macOS and Linux golden images
  category: feature
  status: not_started
  dependencies: []
  description: |
    Unblocked after Task 3 P5 landed 2026-04-19.

    The macOS and Linux golden images ship with SSH enabled for the
    `admin` user. Consumers have started reaching into VMs via SSH instead of using
    `testanyware exec`, which teaches anti-patterns: the Windows golden has no SSH at
    all, so any SSH-based workflow is non-portable. Bake SSH-off into the goldens
    after the agent is known-working: `systemsetup -f -setremotelogin off` for macOS,
    `systemctl disable --now ssh` for Linux. Downstream cleanup:
    - `testanyware vm start` (Swift): drop `--no-ssh`, the SSH-wait loop,
      and the `ssh` field from the spec file.
    - `ConnectionSpec.ssh` in Swift: remove (or accept-on-decode, never-encode, if
      old spec files from running VMs need tolerance).
    - README: drop SSH mentions from golden-image descriptions and the spec-file
      schema.
    Requires a golden rebuild for macOS and Linux. Surfaced 2026-04-18 during the
    `guivision vm` refactor brainstorm. SSH wait (~11 s of ~26 s macOS start) is the
    primary motivation for doing this promptly after Task 3 P5 lands.
- id: deduplicate-unifiedrole-swift-across-cli-and-agent-targets
  title: Deduplicate UnifiedRole.swift across CLI and agent targets
  category: chore
  status: not_started
  dependencies: []
  description: |
    `UnifiedRole.swift` exists in both the CLI target and the agent-side
    target and must be kept byte-for-byte identical. Adding or removing a `UnifiedRole`
    case requires updating both copies; `UnifiedRoleTests` checks `allCases.count` and
    will fail with a stale expected value if only one copy is updated. The test acts as a
    guard but the duplication remains a maintenance burden — divergence can go undetected
    between case additions. Fix options:
    - Move `UnifiedRole.swift` into a shared framework/module target both targets link.
    - Generate the file once and copy as a pre-build step.
    - At minimum, add a lint rule / CI check that asserts the two files are identical.
    The shared-module option aligns best with the existing library structure but requires
    a target restructure. Surfaced 2026-04-19 during P4 code review.
- id: input-click-window-reports-vnc-click-40px-below-target-on-tahoe
  title: '`input click --window` reports VNC click ~40px below target on Tahoe'
  category: bug
  status: not_started
  dependencies: []
  description: |
    The `--window` option translates window-relative coordinates to
    screen-absolute using the AX-reported window origin. On Tahoe, the AX window
    frame includes the window's drop-shadow inset in its origin, so all clicks land
    ~40px below the intended target. Workaround documented in `--window` help text
    and README Gotchas: obtain screen-absolute coordinates from a full-screen
    screenshot and pass them directly to `input click` without `--window`. Fix:
    subtract the drop-shadow inset from the AX window origin before converting
    coordinates. Surfaced 2026-04-19 during Racket sample app VM testing.
- id: consolidate-connectionspec-namedspecpath-with-vmpaths
  title: Consolidate ConnectionSpec.namedSpecPath with VMPaths
  category: chore
  status: not_started
  dependencies: []
  description: |
    Unblocked after Task 3 P5 landed 2026-04-19.

    `ConnectionSpec.namedSpecPath(for:)` and `VMPaths` both compute
    named-spec paths under the XDG state directory (`$XDG_STATE_HOME/testanyware/vms/<id>/`).
    The duplication was flagged during P1 Task 3 (VMSpec) and deferred. Changing one
    without the other will create path drift — if XDG logic evolves in `VMPaths`,
    `namedSpecPath` will silently return a different location and `--vm <id>` resolution
    will break. Fix: remove `ConnectionSpec.namedSpecPath(for:)` (or make it delegate to
    `VMPaths`) so there is one authoritative path computation. Audit callers of
    `namedSpecPath` before deleting — the `--vm` resolution path in
    `ConnectionOptions.resolve()` is the primary consumer. Best done in a focused PR
    after Task 3 (vm subcommands) P5 lands, since P5 touches the spec-file surface.
- id: broaden-vm-list-to-show-user-supplied-non-prefix-vms-with-a-sidecar
  title: Broaden `vm list` to show user-supplied non-prefix VMs with a sidecar
  category: chore
  status: not_started
  dependencies: []
  description: |
    Surfaced from vm-start/vm-stop fix (2026-04-27): `parseAllVMNames` now returns
    every name in the tart catalog regardless of prefix or state, so lifecycle
    operations can address user-supplied non-prefix ids. However, `vm list` still
    uses `parseList` (filtered to `testanyware-*` running clones) so those VMs
    remain invisible to the display layer.

    The gap: a VM started with `--id my-custom-vm` runs correctly but does not
    appear in `testanyware vm list`. A user who forgets the id cannot discover it
    without falling back to raw `tart list`.

    **Fix:** Extend `VMListFormatter`/`VMCommand.List` to include tart VMs that
    have a spec/meta sidecar under `$XDG_STATE_HOME/testanyware/vms/<id>/` but
    whose name does not match `testanyware-<hex8>`. These are "adopted" VMs the
    lifecycle owns by virtue of sidecar presence, and should be shown in the
    running-VMs section with the same column format.

    **Scope constraint:** preserve byte-for-byte column-width parity with
    `vm-list.sh` for all currently-displayed rows (memoed invariant:
    `vmlistformatter-column-widths-are-byte-for-byte-parity-with-vm-list-sh`).
    Only add rows; do not change existing column layout.

    **Constraint:** Keep `parseList`/`runList` semantics unchanged for the display
    path that currently works. The new discovery path should use `parseAllVMNames`
    + sidecar presence check, not `runList`.
- id: audit-testanyware-agent-entitlements-for-documents-folder-access-on-tahoe
  title: Audit testanyware-agent entitlements for Documents folder access on Tahoe
  category: bug
  status: not_started
  dependencies: []
  description: |
    During Note Editor VM verification on 2026-04-18, running
    `testanyware exec ls /Users/admin/Documents/` on the Tahoe VM triggered a macOS TCC
    dialog (Transparency, Consent, and Control) on the guest. The agent binary lacks the
    Documents folder (or full-disk access) privacy entitlement or TCC grant on Tahoe.
    This can block automated test scripts that inspect file-save results.

    Remediation options (evaluate in order):
    1. **TCC grant** — grant `testanyware-agent` Documents/full-disk access via `tccutil` or
       the Privacy & Security pane during the Tahoe golden-image build, the same way
       Accessibility is granted.
    2. **Entitlement** — if ad-hoc signing allows it, add `com.apple.security.files.user-selected.read-write`
       or the Documents/Downloads entitlements to the agent binary's entitlement set and
       rebuild the golden.
    3. **Alternate path** — redirect file-inspection commands to paths outside the TCC
       sandbox (e.g. `/tmp`, the agent's own working directory) when Documents inspection
       is not strictly required.

    Requires a golden rebuild for Tahoe once the correct grant is identified. Surfaced
    2026-04-18 during Note Editor verification.
- id: menu-bar-drill-down-snapshot-only-surfaces-top-level-items
  title: 'Menu bar drill-down: snapshot only surfaces top-level items'
  category: feature
  status: not_started
  dependencies: []
  description: |
    `testanyware agent snapshot --window "Menu Bar"` only returns
    top-level menu bar items (Apple, app-name). Submenus are not in the accessibility
    tree until the menu is open, so `press --role menu-item --label "..."` fails with
    "No element found" for any submenu item. Verifying full menu structure currently
    requires: (1) VNC click on the menu title to open it, (2) screenshot of the region.
    A `testanyware menu-drill` command, a `snapshot --open-menu <title>` flag, or at
    minimum a documented multi-step workflow would reduce friction in app-validation
    sessions that need to inspect or exercise menu contents. Surfaced from Racket sample
    app validation sessions on 2026-04-17.
- id: virtiofs-serves-stale-cached-files-after-host-update
  title: VirtioFS serves stale cached files after host update
  category: bug
  status: not_started
  dependencies: []
  description: |
    VirtioFS shared filesystem can serve cached (stale) file content
    to the VM even after the host has written an updated version. Current workaround:
    use base64 transfer (`testanyware scp` or inline base64) or restart the VM. A
    `testanyware sync` command or explicit cache-bust mechanism (e.g. `testanyware scp
    --no-virtio-cache`) would eliminate this class of silent transfer error. Affects
    any workflow that edits a source file on the host and then recompiles or re-runs it
    inside the VM. Surfaced on 2026-04-17 during Racket sample app validation.
- id: brainstorm-and-plan-local-homebrew-binary-distribution
  title: Brainstorm and plan local Homebrew binary distribution
  category: chore
  status: not_started
  dependencies: []
  description: |
    The `local-homebrew-binary-distribution-tap-no-client-builds` backlog task
    explicitly states "Needs brainstorm + plan before execution" and enumerates
    seven open sub-phases. No work phase should pick it up directly — it requires
    design alignment on Developer ID / notarisation, cross-arch build strategy,
    formula template authoring, and golden-script changes before any code is written.

    This task makes the brainstorm prerequisite visible as standalone executable
    work so it can be scheduled ahead of the implementation task.

    **Scope of the brainstorm session:**
    1. Apple Developer ID and notarisation requirements (ad-hoc signing sufficiency?).
    2. Cross-arch macOS builds: arm64-only vs universal2, feasibility without x86_64 host.
    3. Artifact inventory: CLI + 3 agent binaries — build pipeline for each.
    4. Tap repo authoring: reuse `Linkuistics/homebrew-taps` (already used by Ravel-Lite).
    5. Formula template: sed-driven SHA injection pattern (mirror Ravel-Lite's `.rb.tmpl`).
    6. Golden-script update strategy: switch from `swift build` inside VM to brew-artifact
       copy during golden build, accounting for TCC re-grant constraint
       (`agent-hot-swap-does-not-re-grant-tcc-accessibility` memory entry).
    7. README install instructions update scope.

    **Output of the brainstorm:** a written implementation plan with phases,
    files to create/modify, and ordering constraints — suitable for input to the
    `writing-plans` skill.
- id: local-homebrew-binary-distribution-tap-no-client-builds
  title: Local Homebrew binary distribution (tap, no client builds)
  category: feature
  status: not_started
  dependencies:
  - brainstorm-and-plan-local-homebrew-binary-distribution
  description: |
    Mirror Ravel-Lite's local-build pattern so users can install testanyware
    (and the in-VM agents the goldens consume) without running `swift build`,
    `dotnet build`, or any other compiler on their machine.

    **Reference implementation:** `~/Development/Ravel-Lite/scripts/release-build.sh`
    + `release-publish.sh` + `scripts/templates/ravel-lite.rb.tmpl`. Entirely
    local: `cargo release` tags → `release-build.sh` produces per-target
    tarballs and renders the formula → `release-publish.sh` does
    `gh release create` and copies the formula into the
    `~/Development/homebrew-taps` clone. No GitHub Actions.

    **Distribution scope (likely):**
    - Host CLI (`testanyware`, Swift, macOS arm64 + x86_64 — though x86_64 may
      not be feasible without an x86_64 host or universal-bin work).
    - macOS in-VM agent (`testanyware-agent`, Swift, arm64 only).
    - Windows in-VM agent (C# / .NET 9 self-contained, win-arm64) — already
      produces a standalone binary.
    - Linux in-VM agent (Python source — no compile, just bundle).
    - Vision pipeline ships as Python source via `uv` regardless.

    **Constraints surfaced by memory:**
    - `agent-hot-swap-does-not-re-grant-tcc-accessibility`: TCC pins the
      accessibility grant to the original binary's csreq. A brew-installed
      agent cannot just replace the in-VM binary — golden image creation
      must consume the brew-shipped artifact at golden-build time and
      re-grant TCC then. Plan must address this.
    - macOS golden creation currently does `swift build` inside the VM via
      `vm-create-golden-macos.sh`. Once the agent is brew-distributed, the
      golden script copies the prebuilt artifact instead.

    **Why it's a multi-phase feature (not a one-task work phase):**
    1. Ada Apple Developer ID + notarisation? (open question)
    2. Cross-arch macOS builds (arm64 only? universal2?).
    3. Three artifact classes to bundle (CLI + 3 agents).
    4. Tap repo authoring (`Linkuistics/homebrew-taps` already exists per
       Ravel-Lite usage — reuse it).
    5. Formula template + sed-driven SHA injection.
    6. Updates to golden-image scripts to consume brew-shipped agents.
    7. README install instructions update.

    Needs brainstorm + plan before execution.
- id: vm-start-with-platform-linux-id-non-prefix-previously-started-macos
  title: vm start with --platform linux + --id <non-prefix> previously started macOS
  category: bug
  status: done
  dependencies: []
  description: |
    User reported (2026-04-27): `testanyware vm start --platform linux --id XX` started a macOS VM instead of a Linux one whenever `XX` collided with an existing tart catalog entry that was a macOS clone. Without `--id` (auto-generated `testanyware-<hex>`) it correctly started Linux because the freshly-generated id never collided.

    Root cause: pre-fix `VMLifecycle.tartVMExists` went through `TartRunner.runList` → `parseList`, which filters tart's catalog to `testanyware-golden-*` names plus `testanyware-*` names that are *running*. Non-prefix ids and stopped testanyware-prefix clones were both invisible to lifecycle collision detection, so `removeExisting` was skipped and `tart clone` raced against an existing entry.

    The fix landed in commit ad35897 ("Fix VM lifecycle blind spot for non-prefixed tart IDs"): added `TartRunner.parseAllVMNames` / `vmExists` (unfiltered name-only catalog query), and pointed `VMLifecycle.tartVMExists` plus the stop tart branch at it. Three unit tests cover `parseAllVMNames` directly.

    The bug surfaced again because `/usr/local/bin/testanyware` was symlinked to a pre-fix release binary (built 16:42, fix landed 19:08); any `vm start` invocation against the stale symlink was still running the old code. Rebuilding `cli/.build/release/testanyware` puts the fix into the path the user invokes.
  results: |
    **Outcome:** verified resolved by commit ad35897 (already on `main`); no source code change needed. The user-reported symptom on 2026-04-27 came from a stale release symlink, not a remaining defect.

    **Investigation:** traced the `vm start` path top-down — `VMCommand.Start.run` → `VMStartOptions.init` → `VMLifecycle.startTart` → `tartVMExists` → `TartRunner.removeExisting` → `TartRunner.clone`. Confirmed `--platform linux --id XX` carries `Platform.linux` through unchanged; `options.base` resolves to `testanyware-golden-linux-24.04` via `Platform.defaultBase`; the only platform-sensitive routing is `Platform.backend` (linux → tart). The pre-fix bug was confined to `tartVMExists`: it ran through `TartRunner.runList` → `parseList`, which filters tart's catalog to `testanyware-golden-*` plus *running* `testanyware-*` clones. Non-prefix ids were invisible, so `removeExisting` was skipped on the collision branch.

    Probed `tart` directly to learn that `tart clone src dst` over an existing **stopped** dst silently overwrites (exit 0, disk replaced) — verified by re-cloning `mini-browser-test` (50G macOS) from the linux golden and observing `disk.img` shrink to 20G with `config.json` flipping `"os": "linux"`. So the pre-fix bug only manifested when the existing non-prefix entry was *running* at the moment of `vm start`, in which case `tart clone` raced with the live VM and the user observed the original macOS VM continuing.

    **End-to-end verification with the post-fix binary:**
    1. `tart clone testanyware-golden-macos-tahoe tbug` → `~/.tart/vms/tbug/config.json` had `"os": "darwin"`, 50 GB disk.
    2. `testanyware vm start --platform linux --id tbug` → stderr emitted `Stopping existing VM 'tbug'...` (proves the post-fix `vmExists` saw `tbug` despite the non-prefix name), then `Cloning testanyware-golden-linux-24.04 → tbug...`, then booted to ready state.
    3. Wrote `/Users/antony/.local/state/testanyware/vms/tbug.json` with `"platform": "linux"` and a working agent endpoint `192.168.64.4:8648`. Linux VMs run a Python `http.server` agent; the macOS VM runs Swift Hummingbird on a different code path. Successful agent ready handshake on port 8648 is independent confirmation that the disk is the linux clone, not residual macOS content.
    4. `testanyware vm stop tbug` cleaned up cleanly.

    **Why the user saw "still":** at session start `/usr/local/bin/testanyware` symlinked to `cli/.build/release/testanyware` built `27 Apr 16:42`; the fix commit ad35897 landed at `27 Apr 19:08`. So any `vm start` invocation between 19:08 and a `swift build -c release` rerun was still executing the pre-fix `tartVMExists`. I rebuilt during this work-phase (release binary now `27 Apr 19:21`), so the symlinked path now has the fix.

    **Test coverage:** the fix already ships three unit tests on `TartRunner.parseAllVMNames`. Ran `swift test --package-path cli --filter TartRunnerTests` → 16/16 passed, including the three regression tests for the unfiltered name query. Did not add a new integration test — the existing pattern covers `--platform linux` round-trip with prefixed ids, the unit tests cover the catalog-query primitive, and a non-prefix-id integration test would require pre-creating a macOS clone (~30 s of setup per run) without buying coverage that isn't already pinned by the unit layer.

    **Side effects of the investigation to flag:**
    - Existing tart catalog entry `mini-browser-test` was 50 GB / macOS at session start; my direct `tart clone` probe overwrote it to a 20 GB Linux clone. Last access before the probe was `1 week ago`, so it appeared stale, but the user should know the disk content changed.
    - `~/.local/state/testanyware/vms/` accumulated several `*.tart.log` files from prior runs (testanyware-prefixed and `tbug`). Spec/meta were correctly cleaned up by `vm stop`; only the log files remain. Consider whether `VMLifecycle.stop` should also remove the per-id log file — minor housekeeping, not part of this bug.

    **Suggested follow-up (not in scope of this task):** the pre-fix bug had a second lurking symptom even with `--id testanyware-prefix`: `parseList`'s `state == "running"` filter meant a stopped testanyware-prefix clone left over from a previous session was equally invisible to `tartVMExists`. The same fix (`vmExists` → `parseAllVMNames`) cures both, so no extra work is needed; just noting that the blast radius of the original bug was wider than the user's report suggested.
