tasks:
- id: smoke-test-window-compensation-and-open-menu-path-on-tahoe-golden
  title: Smoke-test --window compensation and --open-menu path on Tahoe golden
  category: bug
  status: not_started
  dependencies: []
  description: |
    Verify the `--window` 40 px drop-shadow compensation and the `--open-menu` comma-path
    drill-down against a real Tahoe VM after the next golden rebuild.

    Both features landed in code but could not be exercised end-to-end in the sessions that
    implemented them because the in-VM agent cannot be hot-swapped without losing TCC
    accessibility (see `agent-hot-swap-does-not-re-grant-tcc-accessibility` memory entry).

    **Checks to perform (fold into whichever session next rebuilds the Tahoe golden):**

    1. `testanyware input click --window <name> 100 100` against a known-position UI control
       (e.g. a button in TextEdit whose screen-absolute position is known).  Confirm the click
       lands on the intended target rather than ~40 px below it.  If the default 40 px inset
       does not match reality, update `WindowOriginCompensation.defaultMacosTopInset` and
       note the correct value in the `window-flag-includes-drop-shadow-in-ax-origin` memory
       entry.

    2. `testanyware agent snapshot --open-menu "File,Recent Files"` against the macOS golden's
       TextEdit or Finder.  Confirm the snapshot includes the recent-files submenu items.
       If the 400 ms per-segment settle is insufficient (submenu not populated at snapshot
       time), apply either the `--menu-settle-ms` flag approach or the poll-and-retry loop
       described in the `open-menu-settle-delay-is-hardcoded-at-400ms` memory entry.

    **Related backlog tasks:** `disable-ssh-in-macos-and-linux-golden-images` and
    `audit-testanyware-agent-entitlements-for-documents-folder-access-on-tahoe` both require
    Tahoe golden rebuilds and are natural opportunities to bundle this smoke-test.
- id: virtiofs-serves-stale-cached-files-after-host-update
  title: VirtioFS serves stale cached files after host update
  category: bug
  status: not_started
  dependencies: []
  description: |
    VirtioFS shared filesystem can serve cached (stale) file content
    to the VM even after the host has written an updated version. Current workaround:
    use base64 transfer (`testanyware scp` or inline base64) or restart the VM. A
    `testanyware sync` command or explicit cache-bust mechanism (e.g. `testanyware scp
    --no-virtio-cache`) would eliminate this class of silent transfer error. Affects
    any workflow that edits a source file on the host and then recompiles or re-runs it
    inside the VM. Surfaced on 2026-04-17 during Racket sample app validation.
- id: local-homebrew-binary-distribution-tap-no-client-builds
  title: Local Homebrew binary distribution (tap, no client builds)
  category: feature
  status: done
  dependencies: []
  description: |
    Mirror Ravel-Lite's local-build pattern so users can install testanyware
    (and the in-VM agents the goldens consume) without running `swift build`,
    `dotnet build`, or any other compiler on their machine.

    **Reference implementation:** `~/Development/Ravel-Lite/scripts/release-build.sh`
    + `release-publish.sh` + `scripts/templates/ravel-lite.rb.tmpl`. Entirely
    local: `cargo release` tags → `release-build.sh` produces per-target
    tarballs and renders the formula → `release-publish.sh` does
    `gh release create` and copies the formula into the
    `~/Development/homebrew-taps` clone. No GitHub Actions.

    **Distribution scope (likely):**
    - Host CLI (`testanyware`, Swift, macOS arm64 + x86_64 — though x86_64 may
      not be feasible without an x86_64 host or universal-bin work).
    - macOS in-VM agent (`testanyware-agent`, Swift, arm64 only).
    - Windows in-VM agent (C# / .NET 9 self-contained, win-arm64) — already
      produces a standalone binary.
    - Linux in-VM agent (Python source — no compile, just bundle).
    - Vision pipeline ships as Python source via `uv` regardless.

    **Constraints surfaced by memory:**
    - `agent-hot-swap-does-not-re-grant-tcc-accessibility`: TCC pins the
      accessibility grant to the original binary's csreq. A brew-installed
      agent cannot just replace the in-VM binary — golden image creation
      must consume the brew-shipped artifact at golden-build time and
      re-grant TCC then. Plan must address this.
    - macOS golden creation currently does `swift build` inside the VM via
      `vm-create-golden-macos.sh`. Once the agent is brew-distributed, the
      golden script copies the prebuilt artifact instead.

    **Why it's a multi-phase feature (not a one-task work phase):**
    1. Ada Apple Developer ID + notarisation? (open question)
    2. Cross-arch macOS builds (arm64 only? universal2?).
    3. Three artifact classes to bundle (CLI + 3 agents).
    4. Tap repo authoring (`Linkuistics/homebrew-taps` already exists per
       Ravel-Lite usage — reuse it).
    5. Formula template + sed-driven SHA injection.
    6. Updates to golden-image scripts to consume brew-shipped agents.
    7. README install instructions update.

    Needs brainstorm + plan before execution.
  results: |
    Implemented P1–P5 of `0-docs/plans/HomebrewDistribution.plan.md`.

    ## What was built

    **New files:**

    - `scripts/release-doctor.sh` — preflight: arch=arm64, swift, dotnet, python3, tar+xz, gh-auth.
    - `scripts/release-build.sh` — runs doctor, requires clean tagged HEAD, builds CLI + macOS agent (`swift build -c release`) and Windows agent (`dotnet publish -r win-arm64 --self-contained`), stages Linux agent source (excluding `__pycache__`/`*.pyc`), copies provisioner scripts + helpers + LICENSE/README into `target/dist/staging/testanyware-v<ver>-aarch64-apple-darwin/`, packages as `.tar.xz`, computes SHA256, renders `target/dist/testanyware.rb` from the template.
    - `scripts/release-publish.sh` — gh-auth + tap-clone preflight, `gh release create` against `Linkuistics/TestAnyware`, copies the rendered formula into `$TESTANYWARE_TAP_DIR/Formula/testanyware.rb`, commits, pushes.
    - `scripts/templates/testanyware.rb.tmpl` — single-tarball formula (macOS arm64 only, `depends_on arch: :arm64`); `bin.install "bin/testanyware"` + `pkgshare.install Dir["share/testanyware/*"]`; smoke test asserts `--help` output.

    **Modified golden scripts** (P4) — switched from in-script `swift build` / `dotnet publish` / repo-relative agent path to `brew --prefix testanyware`/`share/testanyware/agents/<platform>/...` with env-var escape hatches:

    - `provisioner/scripts/vm-create-golden-macos.sh` — `install_agent()` now resolves `_TESTANYWARE_BIN` via `command -v testanyware` (or `TESTANYWARE_CLI_BIN_OVERRIDE`) and the agent via `$(brew --prefix testanyware)/share/testanyware/agents/macos/testanyware-agent` (or `TESTANYWARE_AGENT_BIN_OVERRIDE`). All `_PROJECT_ROOT`/`_CLI_PKG`/`_AGENT_PKG`/`_HOST_BIN_PATH`/`_AGENT_BIN_PATH` references removed. Helper paths (`$(dirname "$0")/../helpers/`) are layout-portable: same relative shape in both repo and brew prefix.
    - `provisioner/scripts/vm-create-golden-linux.sh` — `_AGENT_DIR` now resolves via brew prefix, with the `TESTANYWARE_AGENT_BIN_OVERRIDE` escape hatch.
    - `provisioner/scripts/vm-create-golden-windows.sh` — dropped the `dotnet` preflight check, removed the in-script `dotnet publish`, removed the now-unused `_PROJECT_DIR`. `_AGENT_EXE` resolves via brew prefix with `TESTANYWARE_AGENT_BIN_OVERRIDE`.

    **README + .gitignore** (P5):

    - New `## Install (Homebrew)` section above Building from Source: `brew install Linkuistics/taps/testanyware`, instructions for invoking the bundled `vm-create-golden-*.sh` from `$(brew --prefix testanyware)/share/testanyware/scripts/`. (Picked option C from the P5 follow-up: documented `bash $(brew --prefix testanyware)/share/...` invocation. Option A — a `testanyware vm create-golden` subcommand — is the more discoverable long-term path but adds CLI surface; current docs leave the door open without locking it in.)
    - Reframed `## Building from Source` as a contributor section that documents the `TESTANYWARE_AGENT_BIN_OVERRIDE` and `TESTANYWARE_CLI_BIN_OVERRIDE` env vars.
    - `.gitignore` now ignores `/target/dist/`.

    ## Verification

    - `bash -n` clean on all six modified/new bash scripts.
    - `ruby -c` clean on the formula template and the rendered formula (with sample SHA + version 0.1.0).
    - `scripts/release-doctor.sh` runs and reports all prerequisites met on this host.
    - `scripts/release-build.sh` refuses correctly with "working tree is dirty; commit or stash before releasing" — confirms the dirty-tree gate fires before the tag-exists gate, matching Ravel-Lite's ordering.
    - Manually exercised the staging-tree assembly path (linux agent + scripts + helpers) and confirmed the bundle layout matches the plan: `bin/`, `share/testanyware/agents/linux/testanyware_agent/`, `share/testanyware/scripts/vm-*.sh`, `share/testanyware/helpers/*`. No `__pycache__` leak.

    ## What's next (P6 — gated on actual release)

    P6 is the end-to-end smoke test. It requires:

    1. `git tag -a v0.0.1-rc1` against TestAnyware.
    2. `scripts/release-build.sh` (heavy: full swift + dotnet builds).
    3. `scripts/release-publish.sh` (creates the GitHub release + pushes to tap).
    4. Fresh shell: `brew update && brew install Linkuistics/taps/testanyware`.
    5. `bash "$(brew --prefix testanyware)/share/testanyware/scripts/vm-create-golden-macos.sh"` — confirms agent flows through brew prefix.
    6. Run integration suite against the resulting golden.
    7. Promote to v0.1.0 on success.

    Step 5 is the highest-risk step because it hits the TCC-csreq pinning behaviour that motivated the brew-bundling design — the `grant_tcc_permissions` flow computes csreq from whatever binary is at `/usr/local/bin/testanyware-agent` inside the VM, which after this change is the brew-shipped artifact rather than a `swift build` artifact. Per the plan's risk table this should "just work" but it's the first time it's been exercised end-to-end.

    ## Suggests next

    - Once P6 verifies a working pipeline, replace the existing `Formula/testanyware.rb` in the tap (currently a `swift build`-from-source formula) with the new bundled formula.
    - Resolve P5 follow-up: pick A (`testanyware vm create-golden --platform <p>` subcommand) vs the documented B/C if the bare `bash $(brew --prefix ...)/share/...` invocation proves clumsy in user testing.
    - Memory entry candidate: "release-build.sh requires clean tagged HEAD + arm64 host + swift + dotnet — runs full builds before packaging into a single bundled tarball" if the workflow ends up tripping people up.
