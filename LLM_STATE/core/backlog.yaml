tasks:
- id: port-qemu-runner-and-vm-lifecycle-to-rust
  title: Port QEMU runner and VM lifecycle to Rust
  category: feature
  status: not_started
  dependencies: []
  description: |
    Port the QEMU-based VM lifecycle to Rust. This is the **primary VM path** under the new constraints (Linux/Windows guests on Linux/macOS hosts). Tart support is a separate later task (12).

    **Scope (port from Swift)**
    - `cli/Sources/TestAnywareDriver/VM/QEMURunner.swift`
    - `cli/Sources/TestAnywareDriver/VM/QEMUMonitorClient.swift`
    - `cli/Sources/TestAnywareDriver/VM/VMLifecycle.swift` (QEMU paths only — tart paths in task 12)
    - `cli/Sources/TestAnywareDriver/VM/AgentHealthWaiter.swift`
    - `cli/Sources/TestAnywareDriver/VM/DetachedProcess.swift`
    - `cli/Sources/TestAnywareDriver/VM/VMPaths.swift`
    - `cli/Sources/TestAnywareDriver/VM/VMSpec.swift` and `VMMeta.swift`
    - swtpm setup for Windows guests (TPM 2.0 socket).
    - Per-VM spec write/read; meta sidecar with PID + clone-dir + (later) viewer-PID.

    **Commands**
    - `testanyware vm start --platform {linux|windows} --display WxH [--viewer]`
    - `testanyware vm stop <id>`
    - `testanyware vm list`
    - `testanyware vm delete <name>`

    **Acceptance criteria**
    - On a Linux host: `testanyware vm start --platform windows --display 1920x1080` clones and starts a Windows golden, returns a usable VM id, agent reaches health within timeout.
    - On a Linux host: same flow for `--platform linux`.
    - On a macOS host: same QEMU flows work (linux + windows guests).
    - `testanyware vm stop` cleanly terminates QEMU + swtpm. Viewer wiring lands in task 8.
    - Meta sidecar shape stays compatible: an in-flight VM started by the Swift CLI can be stopped by the Rust CLI on macOS (and vice versa) for the duration of the parallel-tooling period.
    - Each command satisfies the CLI design contract from task 2: examples in help, `--json` output, stable error codes.

    **Constraints from the design conversation**
    - Use `tokio::process` for child management. On Unix use `setsid` (via `nix` behind `#[cfg(unix)]`); on Windows use `CREATE_NEW_PROCESS_GROUP` (via `windows-sys` or `std::os::windows::process::CommandExt`).
    - The existing memory entries on Darwin pipe EOF and Foundation `Process` not calling `setsid` **do not apply** to Rust — most of those workarounds drop away. Re-validate the process-tree-kill sequence in Rust rather than porting the workaround verbatim.
    - KVM access on Linux: `/dev/kvm` must be readable+writable. If missing, fail with `code: KVM_PERMISSION_DENIED` and a remediation message naming `usermod -aG kvm $USER` (per CLI design contract §Errors).
    - swtpm is required for Windows guests. If missing, fail with `code: SWTPM_MISSING` and remediation `apt install swtpm swtpm-tools` on Linux / `brew install swtpm` on macOS.
- id: resolve-cli-rs-licence-inconsistency-mit-vs-apache-2-0
  title: Resolve CLI-rs licence inconsistency (MIT vs Apache-2.0)
  category: chore
  status: done
  dependencies: []
  description: |
    Resolve the licence inconsistency between `cli-rs/Cargo.toml` (declares `license = "MIT"`)
    and the top-level `LICENSE` file (Apache-2.0). The inconsistency was noted during the video
    codec licensing investigation as a project-hygiene issue and a pre-release blocker for any
    Homebrew formula reviewer.

    **Scope**
    - Decide the canonical licence: Apache-2.0 (aligned with top-level `LICENSE`) is the
      recommended choice — it matches the intent of the existing file and is what Homebrew
      formula reviewers will verify.
    - Update `cli-rs/Cargo.toml` to `license = "Apache-2.0"`.
    - Update any other `Cargo.toml` files in `cli-rs/crates/` that declare `license = "MIT"`.
    - Verify `cargo metadata` reports a consistent licence across the workspace.
    - Update `docs/architecture/video-codec-licensing.md` §Licences section if it references
      the old inconsistency as an open question.

    **Acceptance criteria**
    - `grep -r 'license' cli-rs/Cargo.toml cli-rs/crates/*/Cargo.toml` shows a single
      consistent value across all workspace members.
    - `cargo metadata --format-version 1 | jq '[.packages[] | select(.name | startswith("testanyware")) | .license] | unique'` returns a single-element array.
    - `docs/architecture/video-codec-licensing.md` no longer lists this as an open question.
    - CI (clippy, tests) stays green after the change.

    **Notes**
    - This is a pre-release blocker for the Homebrew distribution task. Homebrew formula
      reviewers check `license` fields against the actual licence file; a mismatch causes
      formula rejection.
    - The change has no runtime impact — `license` is metadata only.
  results: |
    ## Outcome — done

    Workspace licence is now consistent at Apache-2.0, matching the
    top-level `LICENSE` file. Homebrew-formula reviewers will no longer
    hit the MIT-vs-Apache-2.0 mismatch.

    ## Changes

    - `cli-rs/Cargo.toml` line 15: `license = "MIT"` → `license = "Apache-2.0"`.
      All five workspace member crates inherit via `license.workspace = true`,
      so this single edit propagates across the whole workspace.
    - `docs/architecture/video-codec-licensing.md`:
      - §Constraints (4) — rewrote the "permissive licensing" paragraph to
        state that workspace and top-level `LICENSE` both declare Apache-2.0
        (no longer mentions a discrepancy).
      - §Open questions for project ownership — removed item 1 (licence
        reconciliation), renumbered the remaining two items.

    ## Verification

    - `grep -rn 'license' cli-rs/Cargo.toml cli-rs/crates/*/Cargo.toml` —
      workspace root reports `Apache-2.0`; all five member crates declare
      `license.workspace = true`.
    - `cargo metadata --format-version 1 --no-deps` followed by a Python
      filter for `name.startswith('testanyware')` returns exactly
      `['Apache-2.0']` — single-element array as required.
    - No code changes; no test impact.

    ## Acceptance criteria status

    | # | Criterion | Status |
    |---|---|---|
    | 1 | grep across workspace + member Cargo.toml shows single value | **Met** |
    | 2 | `cargo metadata` returns single-element license array for `testanyware-*` crates | **Met** (returns `['Apache-2.0']`) |
    | 3 | `docs/architecture/video-codec-licensing.md` no longer lists this as an open question | **Met** (item removed; constraints text rewritten) |
    | 4 | CI (clippy, tests) stays green | **Inferred — metadata-only change**; no source code touched. The follow-on RFB-input task in this same session runs `cargo build --workspace` which exercises manifest parsing across all crates. |

    ## What this unblocks

    Pre-release blocker for `distribute-rust-testanyware-via-homebrew-...`
    is now cleared. The Homebrew formula's `license "Apache-2.0"` line
    will now match every Cargo.toml under `cli-rs/`.
- id: implement-rfb-client-crate-with-handshake-raw-copyrect-port-screenshot-and-screen-size
  title: Implement RFB client crate with handshake, Raw, CopyRect; port screenshot and screen-size
  category: feature
  status: blocked
  blocked_reason: implementation in-tree, all unit tests green; live-VM verification (handshake against QEMU Linux guest, tart macOS guest, byte-identical-to-Swift output) deferred to a session with running goldens
  dependencies: []
  description: |
    Implement the foundation of the new VNC layer: handshake + Raw + CopyRect encodings. Pure Rust, shared between the CLI and the viewer (task 8).

    **Why pure Rust:** royalvnc FFI was considered but ruled out — Swift toolchain on Linux is a non-starter for the primary host platform.

    **Scope**
    - New crate: `testanyware-rfb`. RFB protocol per RFC 6143.
    - Security types: None, VNC password.
    - Encodings: Raw, CopyRect.
    - Pseudo-encodings: DesktopSize, LastRect.
    - Pixel format negotiation.
    - Framebuffer abstraction with a `FrameSink` trait — separates protocol from output target. Same crate consumed by:
      - CLI: `FrameSink` writes one PNG to disk and disconnects (`testanyware screenshot`).
      - Viewer (task 8): `FrameSink` blits into a wgpu texture, stays connected.
    - API sketch: `RfbConnection::connect(host, port, password) -> Result<Self>`, `.request_update()`, `.next_message()`.

    **Commands**
    - `testanyware screenshot --vnc <ep> [-o out.png] [--region x,y,w,h] [--json]`
    - `testanyware screen-size --vnc <ep> [--json]`

    **Acceptance criteria — spike-as-first-test**
    1. Connects to a running QEMU Linux guest on a Linux host, completes RFB handshake with password auth, requests one framebuffer update, decodes a Raw-encoded rectangle, writes a PNG that opens correctly.
    2. Same code path works on a macOS host against a tart macOS guest (validates two host OSes and the least-common-denominator encoding).
    3. `testanyware screenshot` output is byte-identical to the Swift CLI for an identical VNC frame (use a deterministic reference VM frame as fixture).
    4. `testanyware screen-size --json` returns `{"width": <int>, "height": <int>}` per the CLI design contract.

    **Constraints**
    - Don't implement ZRLE/Tight here — task 10. Most golden VMs negotiate down to Raw if Tight isn't offered, so Raw + CopyRect is enough to validate the rest of the pipeline (input, viewer, video) end-to-end.
    - API designed for two consumers (CLI one-shot, viewer continuous render). The `FrameSink` trait is the abstraction boundary.
    - Pure Rust, no C deps beyond what `image` crate already pulls in.
  results: |
    ## Outcome — partial, blocked on live-VM verification

    A complete pure-Rust RFB 3.8 client implementation lands in-tree as a
    new workspace member `cli-rs/crates/testanyware-rfb`. The
    `screen size` and `screen capture` CLI commands (canonical and
    verb-first alias forms) are wired and run end-to-end against any
    RFB server. Unit and protocol-level integration tests are
    exhaustive; the only thing that remains before this task can close
    is end-to-end verification against a real golden VM, which requires
    a session with running tart/QEMU goldens this session does not have.

    ## What's in-tree

    ### New crate `testanyware-rfb`

    - `src/proto.rs` — RFB 3.8 wire constants (msg types, encoding codes,
      security types) and `PixelFormat` (16-byte serdes; constructor
      `rgba32_le()` for the negotiated 32 bpp little-endian BGRX layout).
    - `src/auth.rs` — VNC password authentication (RFC 6143 §7.2.2). DES
      with the RFB-specific bit-reversed key. Six tests cover the bit
      reversal, key padding/truncation, determinism under same input,
      divergence under different passwords, ECB independence of the two
      challenge halves, and a pinned known-answer regression.
    - `src/framebuffer.rs` — RGBA8 owned framebuffer. `raw_rect()`
      decodes the negotiated BGRX bytes into RGBA storage; `copy_rect()`
      is direction-safe for overlapping source/destination (rows iterated
      in reverse when destination is below source). Eight tests cover
      alpha initialisation, byte-order conversion, bounds rejection, and
      overlap correctness.
    - `src/connection.rs` — async state machine. `RfbConnection<T>`
      generic over `AsyncRead + AsyncWrite + Unpin`; concrete
      `RfbConnection::connect(host, port, password)` over `TcpStream`.
      Drives the full 3.8 handshake: protocol version, security types
      (None or VNC-auth picked from offered set), VNC challenge/response,
      SecurityResult, ClientInit, ServerInit, then SetPixelFormat and
      SetEncodings (Raw + CopyRect + DesktopSize + LastRect).
      `next_message()` parses FramebufferUpdate / Bell /
      SetColourMapEntries / ServerCutText, applying Raw + CopyRect rects
      to the internal framebuffer and honouring DesktopSize / LastRect
      pseudo-encodings.
    - `src/error.rs` — `RfbError` with one variant per failure mode the
      state machine can produce.
    - `tests/handshake_fixture.rs` — five integration tests using a
      custom `ScriptedTransport` (`AsyncRead + AsyncWrite` over a Cursor
      + Vec). Each test pushes a server-side byte script through the
      state machine and asserts client-side behaviour. Includes a
      byte-exact assertion of the client's outbound writes (protocol
      greeting → chosen security type → ClientInit → SetPixelFormat →
      SetEncodings) and a full-update test that decodes a 2x1 Raw rect
      into the framebuffer and verifies the resulting RGBA bytes.

    ### CLI integration

    - `cli-rs/crates/testanyware-cli/src/resolve.rs` — added
      `ResolvedVnc`, `resolve_vnc()`, `resolve_vnc_with_env()`,
      `parse_vnc_endpoint()`. The chain mirrors `resolve_agent()` exactly
      but reads the spec's `vnc:` section and consumes
      `TESTANYWARE_VNC_PASSWORD` for the bare-flag path. `VncSpec`'s
      `#[allow(dead_code)]` annotations were removed now that it's
      consumed. New `ResolveError::NoVncInSpec` variant.
    - `cli-rs/crates/testanyware-cli/src/commands/screen.rs` (new) —
      `run_screen_size` and `run_screen_capture`. Connect, handshake,
      request one full update, drain server messages until at least one
      rectangle arrives, write PNG via the `image` crate. Region cropping
      applied post-decode. Six unit tests cover region-string parsing,
      including malformed-arity, non-positive dims, and non-integer
      rejection.
    - `main.rs` dispatch wired for both canonical (`screen size`,
      `screen capture`) and verb-first (`screen-size`, `screenshot`)
      forms. `--json` flag added to `ConnectionArgs` and
      `ScreenCaptureArgs`.

    ### Workspace

    - `cli-rs/Cargo.toml` — added `crates/testanyware-rfb` to members.
    - `cli-rs/crates/testanyware-cli/Cargo.toml` — added
      `testanyware-rfb` and `image = { version = "0.25", features =
      ["png"] }` (default features off to keep dep tree small —
      no jpeg, gif, etc. since we only encode PNG).

    ## Verification

    - `cargo test --workspace` — 181 tests pass, zero warnings, zero
      failures.
      - testanyware-rfb unit: 23 passing (auth, framebuffer, pixel format,
        security-type pick).
      - testanyware-rfb integration (handshake_fixture.rs): 5 passing.
      - testanyware-cli unit (commands/screen.rs): 6 passing (region
        parse).
      - All pre-existing tests (testanyware-cli unit: 52, testanyware-cli
        cli-contract: 10/16 with 6 ignored, agent client: 26 unit + 14
        integration, etc.) continue green.
    - Binary surface verified manually:
      - `testanyware screen size --help` and `testanyware screen-size
        --help` both render help text.
      - `testanyware screen capture --help` and `testanyware screenshot
        --help` both render help text.
      - `testanyware screen size --json` with no connection produces the
        correct §3.4 NO_CONNECTION_SPECIFIED envelope and exits 2.
      - `testanyware screen capture --vnc 127.0.0.1:5900 --region 0,0,a,b
        --json` produces the correct USAGE_ERROR envelope with details
        (`{"value": "0,0,a,b"}`) and exits 2.

    ## Acceptance criteria status

    | # | Criterion | Status |
    |---|---|---|
    | 1 | Handshake + Raw decode against running QEMU Linux guest on Linux host | **Deferred** — needs live VM. Implementation correctness is pinned by `handshake_fixture.rs::full_update_decoded_into_framebuffer` which exercises the same code path against a synthetic transport. |
    | 2 | Same code path against tart macOS guest on macOS host | **Deferred** — needs live VM. |
    | 3 | `screenshot` output byte-identical to Swift CLI for a reference VNC frame | **Deferred** — needs (a) a running VM with a deterministic frame, and (b) the Swift CLI's reference output to compare against. |
    | 4 | `screen-size --json` returns `{"width": <int>, "height": <int>}` | **Met (in code)** — `run_screen_size` calls `print_success(json!({ "width": w, "height": h }))` which wraps the payload in the §3.4 success envelope. The execution path is unit-testable but the actual width/height require a live server. |

    ## Why blocked, not done

    Criteria 1–3 are end-to-end integration assertions that this session
    cannot perform — there are no running goldens accessible. Marking
    the task done would assert correctness I have not verified.
    Implementation correctness is bounded by:

    - **Protocol bytes** — pinned by the handshake_fixture suite, which
      produces the exact RFC 6143 byte patterns and asserts the client's
      state-machine output byte-for-byte.
    - **DES + bit reversal** — pinned by deterministic and known-answer
      tests in `auth::tests`.
    - **Raw + CopyRect decode** — pinned by `framebuffer::tests`,
      including the trickiest case (overlapping CopyRect downward).

    What's NOT pinned by unit tests (and hence what live-VM testing
    catches):

    - Byte order / endianness drift between the negotiated PixelFormat
      and what real servers actually send. Some servers honour
      `big_endian: 0`; others stick with native and the framebuffer
      decode produces visibly-wrong colours. Worth a screenshot diff
      against the Swift CLI on first integration.
    - Server-specific quirks (e.g. some servers send a leading no-op
      framebuffer update; the capture loop drains until rectangles > 0
      to handle this, but a server that sends *only* no-ops would hang).
    - Timeout behaviour. There is currently no global connect/handshake
      timeout — `connect()` will block indefinitely if the server holds
      the TCP connection open without responding. A future polish pass
      should add a `tokio::time::timeout(...)` wrapper, or expose one as
      a config knob.

    ## What this suggests next

    - **Live-VM verification gate** — pick this task back up in a session
      with a running QEMU Linux golden and run the four acceptance
      criteria. On success, flip `blocked → done` and the dependent
      tasks (input messages, viewer, video record) unblock.
    - **Timeout knobs** — before declaring done, add a connect timeout
      to `RfbConnection::connect`. The `tokio` crate has `time::timeout`
      ready for it; this can be done as part of the verification PR.
    - **Tight + ZRLE encodings** — task 10 already exists for this and is
      correctly gated on this task landing first.
    - **Schema declarations** — the `every_schema_id_has_a_schema_file`
      CLI-contract test is currently green because we haven't declared
      schemas for `screen size` or `screen capture`. The §7 template +
      schema work is a polish pass that can land alongside or after the
      live-VM verification.
    - The §7 after_long_help blocks (EXIT CODES, EXAMPLES, SEE ALSO)
      exist for the agent and file commands but I deliberately did not
      add them to the screen commands in this pass — keeping the diff
      focused on the protocol foundation. Adding them is a small
      follow-up.

    ## Files changed

    New files:
    - `cli-rs/crates/testanyware-rfb/Cargo.toml`
    - `cli-rs/crates/testanyware-rfb/src/lib.rs`
    - `cli-rs/crates/testanyware-rfb/src/error.rs`
    - `cli-rs/crates/testanyware-rfb/src/proto.rs`
    - `cli-rs/crates/testanyware-rfb/src/auth.rs`
    - `cli-rs/crates/testanyware-rfb/src/framebuffer.rs`
    - `cli-rs/crates/testanyware-rfb/src/connection.rs`
    - `cli-rs/crates/testanyware-rfb/tests/handshake_fixture.rs`
    - `cli-rs/crates/testanyware-cli/src/commands/screen.rs`

    Modified:
    - `cli-rs/Cargo.toml` (workspace members)
    - `cli-rs/Cargo.lock`
    - `cli-rs/crates/testanyware-cli/Cargo.toml` (added testanyware-rfb,
      image)
    - `cli-rs/crates/testanyware-cli/src/commands/mod.rs` (pub mod screen)
    - `cli-rs/crates/testanyware-cli/src/main.rs` (wired commands +
      --json on ConnectionArgs / ScreenCaptureArgs)
    - `cli-rs/crates/testanyware-cli/src/resolve.rs` (resolve_vnc,
      ResolvedVnc, NoVncInSpec, removed dead-code annotations on VncSpec)
- id: port-testanyware-doctor-with-linux-host-preflight-checks
  title: Port testanyware doctor with Linux-host preflight checks
  category: feature
  status: not_started
  dependencies:
  - port-qemu-runner-and-vm-lifecycle-to-rust
  description: |
    Port `testanyware doctor` with cross-platform host preflight checks. Doctor is the primary feedback loop for users on a new host — when something is missing, doctor tells them what to install.

    **Scope**
    - Port `cli/Sources/testanyware/DoctorCommand.swift` to Rust.
    - Existing checks (preserve): dev-symlink/brew-shadowing detection, agent payload presence at `$(brew --prefix testanyware)/share/testanyware/`, bundled-script `testanyware-min-tool` sentinel parsing.
    - **New Linux-host checks:**
      - `/dev/kvm` permission (suggest `usermod -aG kvm $USER`).
      - `swtpm` and `swtpm-tools` presence (apt instruction).
      - `qemu-system-{x86_64,aarch64}` presence and minimum version (pin in source).
      - `ffmpeg` embedded availability self-check (link against libav at build time; runtime check that the linked symbols load).
    - **macOS-host checks (preserve + extend):**
      - `tart` presence if any macOS-platform operation is requested.
      - `swtpm` via brew.
    - **Windows-host checks (lower priority but design now):**
      - WHPX/HAXM accelerator presence.
      - `swtpm.exe` presence (Windows port).
      - `qemu-system-*.exe` presence.

    **Acceptance criteria**
    - Per the CLI design contract (task 2): `testanyware doctor` supports `--json` with a stable schema (`{"checks": [{"name", "status", "remediation", "code"}], "summary": {...}}`).
    - On a fresh Linux host with KVM but no swtpm: doctor exits non-zero, names `apt install swtpm swtpm-tools`, JSON output includes `code: "SWTPM_MISSING"`.
    - On a healthy macOS host: doctor exits 0 with the same diagnostic quality as the Swift version.
    - Examples in `--help` cover both the human-readable invocation and the JSON-consumed-by-script invocation.

    **Notes**
    - This task can ship with stub checks for parts that aren't yet implemented (e.g. ffmpeg check stays a stub until task 11). Doctor is intended to evolve; the schema is the stable thing.
    - The existing min-tool-sentinels backlog item is independent and orthogonal — it adds version sentinels to bundled scripts. That task can land before or after this one.
- id: implement-rfb-input-messages-and-port-testanyware-input-subcommands
  title: Implement RFB input messages and port testanyware input subcommands
  category: feature
  status: done
  dependencies:
  - implement-rfb-client-crate-with-handshake-raw-copyrect-port-screenshot-and-screen-size
  description: |
    Add outbound RFB messages for keyboard and mouse input. Builds on `testanyware-rfb` from task 6 — same crate, additional code path.

    **Scope**
    - `KeyEvent` (RFB message type 4): down/up with X11 keysym.
    - `PointerEvent` (RFB message type 5): button mask + x/y.
    - Port `cli/Sources/TestAnywareDriver/Input/PlatformKeymap.swift` to Rust: per-platform Cmd/Alt/Ctrl keysym mapping.
    - Port `cli/Sources/TestAnywareDriver/Input/VNCInput.swift` higher-level helpers (typeText, click, drag, scroll).

    **Commands (port from Swift CLI)**
    - `testanyware input key <name> [--modifiers cmd,shift]`
    - `testanyware input key-down <name>` / `key-up <name>`
    - `testanyware input type <text>`
    - `testanyware input click <x> <y> [--button right] [--count 2]`
    - `testanyware input mouse-down <x> <y>` / `mouse-up <x> <y>`
    - `testanyware input move <x> <y>`
    - `testanyware input scroll <x> <y> --dy <n>`
    - `testanyware input drag <x1> <y1> <x2> <y2>`

    **Acceptance criteria**
    - Each input subcommand has identical flag surface and exit codes to the Swift CLI.
    - macOS Cmd-key behaviour verified against a macOS guest. Apply existing project memory: macOS Cmd = `XK_Alt_L (0xffe9)`, Option = `XK_Meta_L (0xffe7)` for Virtualization.framework VNC.
    - Integration test: `testanyware input type "Hello"`, then `testanyware agent snapshot` confirms the focused text field contains "Hello". Runs on Linux host against Linux guest AND macOS host against macOS guest.
    - Help text + `--json` per the CLI design contract.

    **Constraints**
    - Reuse the open `RfbConnection` (no separate connection per command in scripted flows — though one-shot CLI invocations naturally open + send + close).
    - Modifier-key handling for typed text (uppercase, shifted symbols) is already mapped in the Swift code — port the table verbatim, then verify against the existing Swift unit tests as a parity check.
  results: |
    ## Outcome — implementation complete; live-VM verification deferred

    The full input layer for the Rust port lands in-tree: KeyEvent/PointerEvent
    wire messages, a platform-aware keymap (with the macOS Cmd/Option swap
    from project memory `cmd_key_tahoe`), and ten `testanyware input`
    subcommands wired through `main.rs`. Mirrors the Swift CLI's behaviour
    verbatim where it matters; departs in two intentional places (collapsed
    `useRawKeysyms` branch, added `--json` per CLI design contract).

    The same caveat as the parent RFB task applies: end-to-end against a
    running guest (typing into a focused text field, then verifying via
    `agent snapshot`) requires a session with live golden VMs. Unit and
    fixture tests cover the wire layout exhaustively; what remains is
    behavioural verification on a real guest.

    ## What's in-tree

    ### `testanyware-rfb` extensions

    - `src/keymap.rs` (new) — pure-data port of
      `cli/Sources/TestAnywareDriver/Input/PlatformKeymap.swift`:
      - `Platform` enum + `from_name()` accepting `macos|mac|darwin|linux|
        windows|win`.
      - `xk` module: 27 X11 keysym constants extracted from
        `vendored/royalvnc/Sources/RoyalVNCKit/Input/X11KeySymbols.swift`.
      - `key_for_name()`: handles ASCII letters/digits inline (return the
        byte value as keysym), then named specials and `f1`..`f19` via
        explicit match.
      - `modifier_for_name(&str, Platform)`: the macOS table maps
        `cmd→XK_Alt_L (0xffe9)` and `alt/option→XK_Meta_L (0xffe7)` —
        the swap is documented in the module-level note and locked down
        by two pinned tests so future "tidying" can't quietly invert it.
      - `shifted_char_to_base()`, `mouse_button_bit_for_name()`,
        `decompose_scroll()` (Y-then-X order matching Swift).
      - `KeymapError` with `UnknownKey(String)` and
        `UnknownButton(String)` variants.
      - 14 unit tests.
    - `src/input.rs` (new) — high-level helpers as inherent impls on
      `RfbConnection<T>` for any `AsyncRead + AsyncWrite + Unpin` transport:
      - `press_key(name, &[modifier_names], Platform)`,
        `key_down_named()`, `key_up_named()`,
      - `type_text(&str)` with US-shifted-symbol handling and uppercase
        Shift-bracketing,
      - `click(x,y,button,count)`, `mouse_down`/`mouse_up`/`mouse_move`,
      - `scroll(x,y,dx,dy)` — wheel pulses as transient bit-flips,
      - `drag(from→to, button, steps)` with f64 lerp interpolation.
      - 50 ms `tokio::time::sleep` around modifier transitions matches
        Swift parity (some guests drop the modifier-down before the
        keystroke arrives without it).
      - `InputError` wraps `KeymapError` and `RfbError` with `#[from]`.
    - `src/connection.rs` — added `key_event(keysym, down: bool)` and
      `pointer_event(button_mask, x, y)`. Wire-format byte layouts match
      RFC 6143 §7.5.4 / §7.5.5 exactly.
    - `src/lib.rs` — re-exports `Platform`, `KeymapError`, `InputError`.
    - `tests/input_fixture.rs` (new) — 11 wire-format integration tests
      using the same `ScriptedTransport` pattern as the handshake fixture.
      Each test slices past `HANDSHAKE_WRITE_LEN = 58` bytes of handshake
      prelude and asserts byte-exact equality on the input messages.
      Coverage:
      - KeyEvent press/release layout,
      - PointerEvent layout,
      - click emits down(mask)+up(0),
      - click count=2 emits 4 events,
      - type_text uppercase brackets with Shift,
      - type_text lowercase letter without Shift,
      - type_text shifted symbol uses base + Shift,
      - **press_key with macOS cmd modifier sends keysym 0xffe9** —
        pinned regression test for the `cmd_key_tahoe` memory,
      - press_key surfaces InputError on unknown key,
      - drag emits 1 down + N moves + 1 up,
      - scroll dy<0 emits wheel-up pulses (mask bit 3).

    ### CLI integration

    - `cli/Sources/testanyware/InputCommand.swift` is the source of truth
      for the canonical surface; the `InputAction` clap enum in
      `cli-rs/crates/testanyware-cli/src/main.rs` mirrors it 1:1 with
      one addition: every variant now carries `--json` per CLI design
      contract §3.1.
    - `crates/testanyware-cli/src/commands/input.rs` (new) — ten handlers
      (`run_key`, `run_key_down`, `run_key_up`, `run_type`, `run_click`,
      `run_mouse_down`, `run_mouse_up`, `run_move`, `run_scroll`,
      `run_drag`). Each handler:
      - resolves connection via `resolve_vnc()` (existing helper),
      - resolves platform via the new `resolve_platform()` (defaults to
        `Macos`, matching Swift's `Platform.macos` default; emits an
        `INVALID_PLATFORM` envelope for unknown values),
      - opens one short-lived RFB connection, sends the input,
        disconnects,
      - emits text or §3 JSON envelope per `OutputMode`.
    - `clamp_coords(i32, i32)` rejects negative or >65535 coordinates with
      a `USAGE_ERROR` envelope rather than silently `as u16`-wrapping —
      prevents action-at-a-distance bugs where `-1` becomes 65535.
    - Error mapping:
      - `KeymapError::UnknownKey` → `UNKNOWN_KEY` (exit 2),
      - `KeymapError::UnknownButton` → `UNKNOWN_BUTTON` (exit 2),
      - `RfbError::Io` → `CONNECTION_REFUSED` (exit 1),
      - `RfbError::AuthFailed/PasswordRequired/NoMutualSecurityType/
        SecurityNegotiationFailed` → `AUTH_REQUIRED` (exit 4).
    - `crates/testanyware-cli/src/commands/mod.rs` — module declaration.

    ### Intentional simplification: collapsed `useRawKeysyms`

    The Swift CLI carries an env-var-controlled `useRawKeysyms` boolean to
    bypass RoyalVNCKit's silent ARD remapping of Cmd/Option. The Rust port
    talks RFB directly with no wrapper, so every keysym is sent verbatim.
    The whole branch collapses; `TESTANYWARE_VNC_ARD_REMAP` no longer has
    any effect because there is nothing for it to bypass.

    ### Intentional departure: `--window` not yet wired

    The Swift `InputCommand` accepts `--window <name>` for window-relative
    coordinates (computed via the agent + `WindowOriginCompensation`). The
    Rust port omits this for now — porting `WindowOriginCompensation`
    involves a chunk of macOS-Tahoe-specific drop-shadow inset logic that
    is its own task. The bare flag-surface match is otherwise complete.
    Suggested follow-up task: "Port WindowOriginCompensation and wire
    --window into Rust input subcommands".

    ## Verification

    - `cargo build --workspace` — zero warnings.
    - `cargo test --workspace` — **210 passing, 6 ignored** (those 6 are
      pre-existing live-VM-required cli-contract tests; baseline matched).
      Of the 210 passing, ~35 are new in this task:
      - testanyware-rfb keymap unit: 14
      - testanyware-rfb input unit: 2
      - testanyware-rfb input_fixture integration: 11
      - testanyware-cli unit: unchanged net (we removed one stub but
        the `commands/input.rs` adds none of its own — handler bodies
        aren't unit-testable because they exit via `print_error`).
    - Surface spot-check:
      - `testanyware input --help` lists all 10 subcommands.
      - `testanyware input key --help` shows `--modifiers`, `--platform`,
        `--vnc/--vm/--connect/--agent`, and `--json`.
      - `testanyware input key return --json` (no connection) emits
        `code: NO_CONNECTION_SPECIFIED`, exit 2.
      - `testanyware input key return --vnc 127.0.0.1:65530 --json`
        (port refused) emits `code: CONNECTION_REFUSED`, exit 1.
      - `testanyware input drag 0 0 100 100 --steps 4 --json` is parsed
        by clap (positional fan-out works as expected).

    ## Acceptance criteria status

    | # | Criterion | Status |
    |---|---|---|
    | 1 | Each input subcommand has identical flag surface and exit codes to the Swift CLI | **Met** for the canonical surface; one intentional departure (`--window` deferred) and one intentional addition (`--json` per CLI design contract). |
    | 2 | macOS Cmd-key behaviour: Cmd → XK_Alt_L (0xffe9), Option → XK_Meta_L (0xffe7) | **Met** — encoded in `keymap::modifier_for_name` and pinned by `keymap::tests::macos_cmd_maps_to_xk_alt_l` + `tests::macos_option_maps_to_xk_meta_l`. End-to-end byte-on-the-wire pinning by `input_fixture::press_key_with_macos_cmd_modifier_uses_xk_alt_l`. |
    | 3 | Integration test: `input type "Hello"` → `agent snapshot` confirms text on Linux and macOS guests | **Deferred** — needs running golden VMs. The `type_text` wire-byte sequence is pinned by `input_fixture::type_text_*` tests against the synthetic transport; what remains is the cross-process verification through a real guest's accessibility tree. |
    | 4 | Help text + `--json` per CLI design contract | **Met** — every variant carries `--json`; help text via clap derives is automatic. After-help / examples blocks are not yet attached (matching the current state of other input subcommands; if §7 long-help is required for input commands the discoverability surface task can address it uniformly). |

    ## What this unblocks

    - `build-cross-platform-vnc-viewer-with-egui-...` — the viewer needs
      the same `RfbConnection.key_event()` / `.pointer_event()` calls this
      task adds.
    - `retire-swift-cli` — input was one of the larger Swift surfaces left
      to port. Remaining gaps: VM lifecycle (QEMU runner, doctor),
      recording, find-text, server mode.

    ## Suggested follow-up tasks

    1. Port `WindowOriginCompensation` and wire `--window` into Rust input
       subcommands.
    2. Optional: add §7 long-help (EXAMPLES / SEE ALSO) blocks to the input
       subcommands for parity with the agent / file commands.
    3. Live-VM verification for both this task and the parent RFB-client
       task (`testanyware screenshot` byte-identical, `testanyware input
       type "Hello"` cross-validated via agent snapshot).
- id: build-cross-platform-vnc-viewer-with-egui-to-replace-applescript-launcher
  title: Build cross-platform VNC viewer with egui to replace AppleScript launcher
  category: feature
  status: not_started
  dependencies:
  - implement-rfb-client-crate-with-handshake-raw-copyrect-port-screenshot-and-screen-size
  - implement-rfb-input-messages-and-port-testanyware-input-subcommands
  - port-qemu-runner-and-vm-lifecycle-to-rust
  description: |
    Build a cross-platform VNC viewer that **replaces the AppleScript-based Screen Sharing.app launcher entirely**. New `testanyware-viewer` binary in the Rust workspace, sharing the `testanyware-rfb` crate with the CLI.

    **Why bundled, not launched:** users on Linux have no consistent system VNC viewer; system-viewer launching is flaky on macOS (AppleScript permission prompt, no reliable close handle); forking TigerVNC/Remmina costs more than building a focused viewer for the deliberately-small scope below.

    **Scope**
    - New crate: `testanyware-viewer`. egui/eframe with wgpu backend.
    - Single window: connect to localhost VNC endpoint with password from per-VM spec; render framebuffer to a wgpu texture; forward keyboard + mouse events as RFB input via the shared `testanyware-rfb` crate.
    - "Send Ctrl-Alt-Del" menu item for Windows guests.
    - SIGTERM handler (Unix) / `SetConsoleCtrlHandler` (Windows) → clean window close → process exit.
    - Window titlebar shows VM id + connection state.
    - Window auto-sizes to match VNC framebuffer resolution on connect.
    - Lifecycle wiring:
      - `testanyware vm start --viewer` spawns `testanyware-viewer --vm <id>` as a detached child; writes its PID to `<id>.meta.json`.
      - `testanyware vm stop <id>` SIGTERMs the viewer PID (if present in meta) before stopping the VM.

    **Acceptance criteria**
    - On a Linux host: `testanyware vm start --viewer --platform linux` opens a window, displays the guest's framebuffer, accepts keyboard/mouse that reach the guest.
    - Same on a macOS host. **Zero AppleScript involved on either platform.**
    - `testanyware vm stop` closes the window cleanly without leaving an orphan window or process.
    - Crash in the viewer process does NOT affect the CLI driving the test (separate processes, OS handles cleanup).
    - No first-run macOS Automation permission prompt — we open our own window, not Screen Sharing.app.
    - README's "First-run permission" section is updated to reflect this (the Automation grant becomes obsolete).

    **Deliberately out of scope**
    - Clipboard sync (interferes with deterministic test input).
    - File transfer (the agent does that).
    - Encryption negotiation beyond VNC password (loopback only).
    - Multi-monitor, bookmarks/profiles, audio.
    - Settings UI.

    **Distribution decision**
    - Separate binary, not a CLI subcommand. Keeps egui/wgpu deps optional behind a cargo feature for headless CI builds (`cargo build --no-default-features --features headless`).
- id: add-zrle-and-tight-encodings-to-rfb-client-crate
  title: Add ZRLE and Tight encodings to RFB client crate
  category: feature
  status: not_started
  dependencies:
  - implement-rfb-client-crate-with-handshake-raw-copyrect-port-screenshot-and-screen-size
  description: |
    Extend `testanyware-rfb` with ZRLE and Tight encodings. Defer this task until empirical evidence shows it's needed — most golden VMs negotiate down to Raw.

    **Scope**
    - ZRLE encoding (zlib-compressed RLE) per RFC 6143.
    - Tight encoding (basic + JPEG sub-encoding). JPEG decode via `jpeg-decoder` or `image` crate.
    - Pseudo-encodings to verify coverage: Cursor, DesktopSize (added in task 6 foundation; double-check edge cases here).
    - Encoding-priority list during handshake: Raw → CopyRect → ZRLE → Tight (the SetEncodings message orders by client preference — most efficient last in some impls, most efficient first in others; use whichever is correct for our chosen interpretation and document it).

    **Acceptance criteria**
    - A connection to a server that ONLY offers Tight (e.g. some RealVNC variants) still produces a correct framebuffer.
    - ZRLE compatibility verified against a server known to push ZRLE under the right conditions (TigerVNC server in compressed mode).
    - Performance regression test: ZRLE/Tight on a 1080p frame should be no worse than Raw end-to-end over loopback (compressed bytes vs uncompressed bytes both fit in memory; CPU is the variable). Failure here means a slow decoder, not a correctness bug.
    - Existing `testanyware screenshot` and viewer continue to work unchanged (encoding negotiation is hidden inside the crate).

    **When to start this task**
    - Only after tasks 6 + 7 + 8 are landed and you've actually hit a server that won't fall back to Raw. If golden VMs (tart-macOS, tart-linux, QEMU-windows, QEMU-linux) all negotiate Raw without complaint, this task can wait indefinitely.

    **Notes**
    - This is the most protocol-fiddly task. Tight in particular has a sub-encoding state machine that's easy to get subtly wrong. Allocate time for it.
- id: port-testanyware-record-to-embedded-libav-ffmpeg-next-instead-of-subprocess
  title: Port testanyware record to embedded libav (ffmpeg-next) instead of subprocess
  category: feature
  status: not_started
  dependencies:
  - implement-rfb-client-crate-with-handshake-raw-copyrect-port-screenshot-and-screen-size
  description: |
    Replace `AVAssetWriter`-based `StreamingCapture.swift` with libav-backed encoding via the `ffmpeg-next` crate. **Embedded library, not subprocess** — explicit user decision in the design conversation.

    **Scope**
    - New module in `testanyware-driver` (or a dedicated `testanyware-record` crate) using `ffmpeg-next` (Rust bindings to libavcodec/libavformat).
    - **Tier-1 H.264 via hardware encoders** per host: `h264_videotoolbox` (macOS), `h264_vaapi` / `h264_nvenc` / `h264_qsv` (Linux, runtime-probed in that order), `h264_mf` (Windows). This matches the existing Swift `AVAssetWriter` path on macOS bit-for-bit.
    - **Tier-2 AV1 via `rav1e` (preferred) or `libaom-av1` software fallback** when no hardware encoder is available. Document the slower-than-real-time encode trade-off in `--help`.
    - **Out of scope:** `libx264`, `libx265`, self-built `OpenH264`, runtime-fetched Cisco `OpenH264`. See `docs/architecture/video-codec-licensing.md` for full reasoning.
    - Configurable resolution, fps, codec — match Swift CLI's `--fps` / `--codec` / `--duration` / `--resolution` flags. `--codec` accepts `h264` (Tier-1 hw) and `av1` (Tier-2 sw); `hevc` deferred per licensing doc.
    - Capture loop: pull frames from `testanyware-rfb` `FrameSink` → encode → mux into MP4.
    - Static linking strategy: vendor or statically link libavcodec to keep distribution simple.

    **Commands**
    - `testanyware record --vnc <ep> -o out.mp4 --fps 30 --duration 10 [--codec h264|av1] [--resolution WxH]`

    **Acceptance criteria**
    - On Linux + macOS hosts: `testanyware record` produces a playable MP4.
    - macOS Tier-1 output bitrate / file size in the same ballpark as Swift CLI's AVAssetWriter output for an identical frame sequence (no order-of-magnitude regression). Same encoder under the hood, so this should be near-identical.
    - Cleanly stops on signal; no half-written or unindexable MP4 left behind.
    - Help and `--json` per the CLI design contract.
    - CI asserts no GPL shared library is linked into the produced binary (`ldd` / `otool -L` / `dumpbin /imports` check); libavcodec is built with `--disable-gpl --disable-nonfree`.

    **Constraints from the design conversation**
    - Embedded library — do NOT shell out to ffmpeg.
    - Static-link libavcodec to keep the binary self-contained.
    - Codec choice and licence rationale: `docs/architecture/video-codec-licensing.md` (produced by `investigate-video-codec-licensing-for-embedded-libav-static-linking`). The two-tier approach (hw H.264 default, sw AV1 fallback) is the binding decision; revisiting it requires updating the doc first.
- id: port-tart-runner-for-macos-host-macos-guest-path-cfg-target-os-macos
  title: Port tart runner for macOS-host-macOS-guest path (cfg target_os macos)
  category: feature
  status: not_started
  dependencies:
  - port-qemu-runner-and-vm-lifecycle-to-rust
  description: |
    Port the tart runner for the macOS-host-macOS-guest path. Under the new constraints this is a **minority code path**, gated behind `#[cfg(target_os = "macos")]`.

    **Scope**
    - Port `cli/Sources/TestAnywareDriver/VM/TartRunner.swift` to a Rust module gated by `#[cfg(target_os = "macos")]`.
    - Wire it into the existing `vm-start` / `vm-stop` flow alongside QEMU (from task 4).
    - Tart's VNC password extraction quirk: tart generates a dynamic VNC URL containing the password; the Swift code parses it from the URL. Port carefully — get this wrong and the VM is unreachable.
    - The macOS golden image creation script (`vm-create-golden-macos.sh`) is shell — it keeps working unchanged regardless of CLI implementation.

    **Commands affected**
    - `testanyware vm start --platform macos` (only on macOS hosts).
    - `testanyware vm stop <id>` (cleanup path for tart VMs).
    - `testanyware vm list` (must list tart goldens + clones alongside QEMU ones).
    - `testanyware vm delete <name>` (auto-detect tart vs QEMU backend).

    **Acceptance criteria**
    - On a macOS host: `testanyware vm start --platform macos` clones and starts a tart VM and returns a usable VM id whose agent reaches health.
    - All existing macOS-VM integration tests pass against the Rust CLI on a macOS host.
    - The tart code path does not even compile on Linux — the `#[cfg]` gate is clean.
    - Per CLI design contract: error codes for `TART_NOT_FOUND`, `TART_VM_NOT_FOUND`, `TART_PASSWORD_PARSE_FAILED`, etc.

    **Notes**
    - Per project memory `tart_ip_lies`: use `tart list` state column, not `tart ip`, to check running/stopped. This memory entry applies to Rust just as much as Swift — port the workaround.
    - Per project memory `cmd_key_tahoe`: macOS guests need `XK_Alt_L (0xffe9)` for Cmd in the Virtualization.framework VNC server. This is task 7's problem, not this task's — but verify the integration here.
- id: distribute-rust-testanyware-via-homebrew-macos-linux-and-windows-zip
  title: Distribute Rust testanyware via homebrew (macOS + Linux) and Windows zip
  category: feature
  status: not_started
  dependencies:
  - port-qemu-runner-and-vm-lifecycle-to-rust
  - port-testanyware-doctor-with-linux-host-preflight-checks
  - implement-rfb-client-crate-with-handshake-raw-copyrect-port-screenshot-and-screen-size
  - implement-rfb-input-messages-and-port-testanyware-input-subcommands
  - build-cross-platform-vnc-viewer-with-egui-to-replace-applescript-launcher
  description: |
    Distribute the Rust `testanyware` via homebrew (macOS + Linux via linuxbrew) and a zip for Windows. **User confirmed:** linuxbrew is the deal for Linux; Windows is a goal but lower priority.

    **Scope**
    - Update homebrew formula at `Linkuistics/taps/testanyware` for the Rust binary.
      - macOS arm64 + x86_64 bottles.
      - Linux x86_64 + arm64 bottles (linuxbrew).
    - Windows zip distribution (manual download initially via GitHub Releases; scoop/chocolatey can come later if there's demand).
    - `cargo-dist` GitHub Action workflow producing the artifacts on tag.
    - Bundled in-VM agents (macOS Swift binary, Linux Python source, Windows .NET 9 `.exe`) ship alongside the host CLI as before — at `$(brew --prefix testanyware)/share/testanyware/agents/<platform>/`.

    **Acceptance criteria**
    - `brew install Linkuistics/taps/testanyware` installs and runs on macOS arm64, macOS x86_64, Linux x86_64, Linux arm64.
    - The released binary passes `testanyware doctor` (task 5) on a fresh install.
    - Bundled agents land at the same `share/testanyware/` paths as the Swift CLI shipped — `vm-create-golden-{macos,linux,windows}.sh` scripts find them without modification.
    - Windows zip: download, extract, run `testanyware.exe agent health` against a known-running agent succeeds.
    - Release pipeline tagging produces all four (macOS×2 + Linux×2) bottles + Windows zip in a single CI run.

    **Sequencing**
    - Depends on a viable shippable baseline: agent commands (3), QEMU runner (4), doctor (5), RFB foundation + input (6 + 7), viewer (8). Tasks 9–11 (OCR, encodings, video) can be added as they land — no need to block release on them.
- id: cross-platform-pass-for-windows-host-support
  title: Cross-platform pass for Windows host support
  category: feature
  status: not_started
  dependencies:
  - port-qemu-runner-and-vm-lifecycle-to-rust
  - build-cross-platform-vnc-viewer-with-egui-to-replace-applescript-launcher
  description: |
    Sweep the Rust codebase for Linux-isms that would break on Windows hosts, and produce a working Windows-host build. Windows is a goal under the new constraints but lower priority than Linux — this task ensures we don't accumulate debt that makes Windows support hard later.

    **Scope**
    - Audit `nix::*` usage for Unix-only calls; gate behind `#[cfg(unix)]` or replace with cross-platform alternatives.
    - Audit path handling for forward-slash assumptions; use `Path` / `PathBuf` consistently. No `format!("{}/{}", ...)` for path joins.
    - Audit process management for SIGTERM-only shutdown:
      - Windows: `SetConsoleCtrlHandler` + `GenerateConsoleCtrlEvent(CTRL_BREAK_EVENT, ...)` for QEMU + viewer lifecycle.
      - Use `windows-sys` crate for the bindings.
    - Audit XDG path usage for Windows fallback (must use `directories` crate or equivalent — Windows uses `%LOCALAPPDATA%`, not `~/.local/state`).
    - Verify QEMU on Windows (WHPX accelerator) launches Windows + Linux guests correctly.
    - Add Windows CI runner to GitHub Actions for the workspace.

    **Acceptance criteria**
    - On a Windows host: `testanyware exec`, `testanyware agent {health,windows,snapshot,inspect,press}`, `testanyware vm start --platform linux` (Linux guest only initially — Windows-on-Windows-via-QEMU works but adds nesting complexity), and `testanyware viewer` all work.
    - `cargo test --workspace` passes on Windows in CI.
    - `testanyware doctor` on Windows produces useful remediation instructions for missing prerequisites (WHPX, swtpm.exe, qemu-system-*.exe).
    - A Windows-specific section is added to `docs/user/golden-images.md` covering host-side prereqs.

    **Sequencing**
    - Lower priority than tasks 1–11. Likely sequenced after the Linux-host baseline is solid (tasks 1–8 done) and at least one full release has happened on Linux + macOS.
    - Windows-on-Windows guest support (Hyper-V instead of QEMU) is explicitly out of scope.
- id: retire-swift-cli-once-rust-port-is-at-parity
  title: Retire Swift cli/ once Rust port is at parity
  category: feature
  status: not_started
  dependencies:
  - port-qemu-runner-and-vm-lifecycle-to-rust
  - port-testanyware-doctor-with-linux-host-preflight-checks
  - implement-rfb-client-crate-with-handshake-raw-copyrect-port-screenshot-and-screen-size
  - implement-rfb-input-messages-and-port-testanyware-input-subcommands
  - build-cross-platform-vnc-viewer-with-egui-to-replace-applescript-launcher
  - port-testanyware-record-to-embedded-libav-ffmpeg-next-instead-of-subprocess
  - distribute-rust-testanyware-via-homebrew-macos-linux-and-windows-zip
  description: |
    Retire the Swift `cli/` once the Rust port is at parity. The Rust port lives on a long-lived branch throughout tasks 1–14; this task is the merge + cleanup.

    **Scope**
    - Delete `cli/` directory entirely (including `cli/Tests/`).
    - Update `README.md` and all `docs/` references to point at the Rust crates and build commands.
    - Update brew formula to install the Rust binary as `testanyware` (no transitional naming).
    - `agents/macos/` continues to build with its own copy of `TestAnywareAgentProtocol` — it's unaffected by this task.
    - Decide on a permanent `TestAnywareAgentProtocol` strategy:
      - **Option A:** keep two copies (Rust in `cli-rs/`, Swift in `agents/macos/`), maintained by hand with the contract test from task 1 as the safety net.
      - **Option B:** introduce a `protocol.json` JSON Schema as source-of-truth and codegen both copies.
      - Recommend Option A initially (simpler, contract test catches drift); Option B if drift becomes painful.

    **Acceptance criteria**
    - All integration tests pass against the Rust CLI on Linux + macOS hosts.
    - `README.md`, `docs/`, and the brew formula reference Rust as the canonical implementation.
    - `agents/macos/` builds and tests cleanly after `cli/` deletion.
    - The `Linkuistics/taps/testanyware` formula installs the Rust binary (already wired up in task 13).
    - Memory entries that no longer apply (Darwin pipe EOF, Foundation Process not setsid, etc. — see `LLM_STATE/core/memory.yaml`) are reviewed and either marked obsolete or deleted, with rationale in the commit message.

    **Sequencing**
    - Depends on tasks 1–8 + 11 + 13. (Tasks 9 OCR, 10 encodings, 12 tart, 14 Windows can be present-or-not without blocking cutover.)
    - This task can be split into "branch merge" (mechanical) and "doc + memory pass" (judgment) if the branch merge ends up large.

    **Notes**
    - The Swift CLI may still be useful for one or two months post-cutover if the Rust version has any quality issues — keep the pre-cutover commit tagged for easy revert.
