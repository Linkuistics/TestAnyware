tasks:
- id: fix-open-menu-docs-example-file-open-recent-not-file-recent-files
  title: 'Fix --open-menu docs example: File,Open Recent not File,Recent Files'
  category: bug
  status: not_started
  dependencies: []
  description: |
    Fix `--open-menu` docs example: use `"File,Open Recent"` not `"File,Recent Files"`.

    The `--open-menu` flag documentation (and the original `smoke-test-window-compensation-and-open-menu-path-on-tahoe-golden` task description) uses `--open-menu "File,Recent Files"` as a sample path. On macOS Tahoe the actual submenu is named "Open Recent", not "Recent Files". The smoke test confirmed this: `--open-menu "File,Recent Files"` errors with "No menu item matching 'Recent Files'".

    **Files to update:**
    - The `--open-menu` help string in `cli/Sources/testanyware/AgentCommand.swift` (if it names the submenu).
    - Any inline code comments or docstrings referencing `"File,Recent Files"`.
    - `0-docs/` plan files or README sections that quote this example (search for `Recent Files`).
- id: fix-startstoproundtripwindows-integration-test-600-s-timeout
  title: Fix startStopRoundTripWindows() integration test 600 s timeout
  category: bug
  status: not_started
  dependencies: []
  description: |
    Fix `startStopRoundTripWindows()` integration test timeout: 600 s is too tight for cold Windows VM boot.

    A fresh Windows clone needs 8–12 min for first-logon + Task Scheduler + agent startup. The current 600 s (`swift test`) timeout fires before the agent is ready, producing a spurious failure that is unrelated to any code defect.

    **Options (pick one):**
    1. Bump the test timeout to 900 s (simplest fix; matches observed worst-case ~8 min + headroom).
    2. Split the test into a slow "boot" phase (new `startWindowsVm()` helper with 900 s timeout) and a fast "API roundtrip" phase that asserts after the boot completes. Lets CI report the phases separately.

    Whichever option is chosen, the 2 pre-existing QEMU swtpm failures remain; a passing suite shows 20/21 non-Windows + 1/1 Windows = 21/21 (or 270+1=271/272 if QEMU tests are included in the same run).

    **Surfaced during:** P6 end-to-end smoke test integration suite run (step 12), where the Windows test was the sole failure.
- id: investigate-agent-inspect-role-returning-multiple-elements-matched-when-window-is-scoped
  title: Investigate agent inspect --role returning Multiple elements matched when --window is scoped
  category: bug
  status: not_started
  dependencies: []
  description: |
    Investigate and fix `agent inspect --role <role>` returning "Multiple elements matched" even when `--window` is also passed.

    **Bug:** During the P6 `--window` smoke-test on the macOS Tahoe clone, `agent inspect --role <role> --window <name>` errored with "Multiple elements matched" even though `--window` was intended to scope the search to a single window. The window scope apparently does not deduplicate elements that appear in both the text-area and scroll-bar subtrees of the AX role tree.

    **Investigation starting points:**
    - `cli/Sources/TestAnywareDriver/Agent/` — the `inspect` command's `--window` filtering logic.
    - `AXElementWrapper` / AX walker — check whether scroll-bar children inherit the same role as the text area.
    - Reproduce: open TextEdit in the macOS golden clone, then `testanyware agent inspect --role AXTextArea --window "Untitled"`.

    **Acceptance:** `agent inspect --role AXTextArea --window "Untitled"` returns a single match (the text area), not an error. If there are legitimately multiple role matches in a window, the error message should tell the user to add `--index N` rather than failing silently.
- id: virtiofs-serves-stale-cached-files-after-host-update
  title: VirtioFS serves stale cached files after host update
  category: bug
  status: not_started
  dependencies: []
  description: |
    VirtioFS shared filesystem can serve cached (stale) file content
    to the VM even after the host has written an updated version. Current workaround:
    use base64 transfer (`testanyware scp` or inline base64) or restart the VM. A
    `testanyware sync` command or explicit cache-bust mechanism (e.g. `testanyware scp
    --no-virtio-cache`) would eliminate this class of silent transfer error. Affects
    any workflow that edits a source file on the host and then recompiles or re-runs it
    inside the VM. Surfaced on 2026-04-17 during Racket sample app validation.
- id: extend-doctor-verify-bundled-scripts-and-helpers
  title: 'Extend doctor: verify bundled scripts and helpers'
  category: feature
  status: not_started
  dependencies: []
  description: |
    Extend `testanyware doctor` to verify that bundled scripts and helpers exist under the Homebrew prefix.

    **Background:** `BundledAgentsCheck` already verifies three agent binaries under `$(brew --prefix testanyware)/share/testanyware/agents/`. The same `release-build.sh` bundle also stages `scripts/` (vm-*.sh) and `helpers/` (autounattend.xml, etc.) but these directories are not currently verified by doctor.

    **Work to do:**
    - Extend `BundledAgentsCheck` to add script/helper slot verification, or add a sibling `BundledScriptsCheck.swift` in `cli/Sources/TestAnywareDriver/Diagnostics/` using the classify/run split pattern.
    - Check `release-build.sh` bundle staging for the exact list of paths; key candidates:
      - `share/testanyware/scripts/` — presence of vm-*.sh lifecycle scripts
      - `share/testanyware/helpers/` — presence of autounattend.xml and other provisioning helpers
    - Wire any new check into `DoctorCommand.swift`.
    - Add unit tests following the pattern in `BundledAgentsCheckTests.swift`.

    **Promoted from:** `extend-doctor-verify-bundled-agents-exist-and-are-executable` results — "## What this suggests next".
- id: add-version-floor-checks-for-tart-and-qemu-system-aarch64-in-toolavailabilitycheck
  title: Add version-floor checks for tart and qemu-system-aarch64 in ToolAvailabilityCheck
  category: feature
  status: not_started
  dependencies: []
  description: |
    Add minimum-version checks for `tart` and `qemu-system-aarch64` in `ToolAvailabilityCheck`.

    **Background:** `ToolAvailabilityCheck` currently checks only whether tools are present on PATH. The completed `extend-doctor-verify-tart-and-qemu-tool-availability` task noted that version-incompatibility hazards exist for both tart and qemu-system-aarch64 (release notes mention version-specific behavior in `provisioner/scripts/`).

    **Work to do:**
    - Run `tart --version` and `qemu-system-aarch64 --version` in `ToolAvailabilityCheck.run()`.
    - Determine minimum supported versions from `provisioner/scripts/` release notes or CHANGELOG.
    - Extend `classify` to accept optional version strings and compare against the floor.
    - Surface warnings (advisory, not a hard failure) when a resolved tool is below the version floor.
    - Add unit tests covering: version at floor (pass), above floor (pass), below floor (warn), version parse failure (warn gracefully).

    **Promoted from:** `extend-doctor-verify-tart-and-qemu-tool-availability` results — "## What this suggests next".
