tasks:
- id: fix-findliveelement-re-matching-after-dedupedbyidentity-collapses-matches
  title: Fix findLiveElement re-matching after dedupedByIdentity collapses matches
  category: bug
  status: not_started
  dependencies: []
  description: |
    Fix `findLiveElement` re-matching after dedupedByIdentity collapses matches

    **Bug:** `findLiveElement` cannot relocate a deduped element by `--index N` after the initial snapshot/resolve. NSStackView anonymous text fields are the known trigger. `set-value --index N` returns `.notFound` on subsequent calls to the same element even though the element was successfully found in the first resolve pass.

    **Root cause:** The live element relocation pass uses a narrower matching key than `dedupedByIdentity`. After `--index N` resolves a snapshot element from the deduped list, the live walker cannot recover the element because its matching attributes (role + label + id) are insufficient to distinguish it — position + size are not part of the live re-match key.

    **Fix direction:** Extend `findLiveElement` in `agents/macos/Sources/TestAnywareAgent/QueryResolver.swift` to accept a richer matching signature consistent with the dedup key (role + position + size). This closes the loop where `--index N` addresses a deduped element in snapshot space but the live walker cannot find it.

    **Acceptance:** `testanyware agent set-value --role AXTextField --index 1 --window "..."` succeeds on an NSStackView with multiple anonymous text fields. `--index 2` also succeeds.

    **Promoted from:** `investigate-agent-inspect-role-returning-multiple-elements-matched-when-window-is-scoped` results — "What this suggests next" item 2. See memory entry `findLiveElement cannot re-match deduped element via --index N`.
- id: add-provisionerscriptsversioncheck-to-doctor-command
  title: Add ProvisionerScriptsVersionCheck to doctor command
  category: feature
  status: not_started
  dependencies: []
  description: |
    Add ProvisionerScriptsVersionCheck to doctor command

    **Background:** `add-version-floor-checks-for-tart-and-qemu-system-aarch64-in-toolavailabilitycheck` added advisory version-floor checks for `tart` (≥ 2.0.0) and `qemu-system-aarch64` (≥ 8.0.0) to `ToolAvailabilityCheck`. The results section noted that an analogous `ProvisionerScriptsVersionCheck` would compare `release-build.sh`'s pinned tool versions against the bundled golden scripts, giving the doctor a version-coherence view that spans both the running host tools and the scripts packaged in the release.

    **Work to do:**
    - Inspect `scripts/release-build.sh` for explicit tool-version references or minimum-version guards.
    - Inspect `provisioner/scripts/` for any embedded version requirements.
    - Add a `ProvisionerScriptsVersionCheck` in `cli/Sources/TestAnywareDriver/Diagnostics/` using the classify/run split pattern (see memory: `diagnostics-module-uses-classify-run-split-for-testability`).
    - Surface a warning (advisory, matching `ToolAvailabilityCheck` precedent) when the detected host tool version is below what the bundled scripts require.
    - Add unit tests covering: version at floor (pass), below floor (warn), no floor defined in scripts (pass through), parse failure (warn gracefully).

    **Note:** `resolveBrewPrefix()` is currently duplicated across `BundledScriptsCheck`, `BundledAgentsCheck`, and `InstallPathCheck`. If this check becomes a fourth consumer, factor `resolveBrewPrefix()` into a shared `BrewPrefixResolver` helper at the same time (see memory: `resolvebrewprefix-duplicated-across-three-diagnostics-files`).
