tasks:
- id: disable-ssh-in-macos-and-linux-golden-images
  title: Disable SSH in macOS and Linux golden images
  category: feature
  status: done
  dependencies: []
  description: |
    Unblocked after Task 3 P5 landed 2026-04-19.

    The macOS and Linux golden images ship with SSH enabled for the
    `admin` user. Consumers have started reaching into VMs via SSH instead of using
    `testanyware exec`, which teaches anti-patterns: the Windows golden has no SSH at
    all, so any SSH-based workflow is non-portable. Bake SSH-off into the goldens
    after the agent is known-working: `systemsetup -f -setremotelogin off` for macOS,
    `systemctl disable --now ssh` for Linux. Downstream cleanup:
    - `testanyware vm start` (Swift): drop `--no-ssh`, the SSH-wait loop,
      and the `ssh` field from the spec file.
    - `ConnectionSpec.ssh` in Swift: remove (or accept-on-decode, never-encode, if
      old spec files from running VMs need tolerance).
    - README: drop SSH mentions from golden-image descriptions and the spec-file
      schema.
    Requires a golden rebuild for macOS and Linux. Surfaced 2026-04-18 during the
    `guivision vm` refactor brainstorm. SSH wait (~11 s of ~26 s macOS start) is the
    primary motivation for doing this promptly after Task 3 P5 lands.
  results: |
    Implemented + validated end-to-end in the same session.

    ## What was done

    **Provisioner scripts** — bake SSH-off into the goldens:

    - `vm-create-golden-macos.sh`: replaced the final shutdown command with a
      combined SSH-disable + shutdown call —
      `vm_ssh "sudo systemsetup -f -setremotelogin off; osascript -e 'tell application \"System Events\" to shut down'"`.
      Folding both into one `vm_ssh` invocation sidesteps a subtle ordering bug:
      `systemsetup -setremotelogin off` unloads the sshd launchd job and may kill
      the live SSH session, but by the time that happens the System-Events
      shutdown is already queued in the same shell.
    - `vm-create-golden-linux.sh`: similar approach for Linux —
      `vm_ssh "sudo systemctl disable ssh.service; sudo systemctl mask ssh.service; sudo shutdown -h now"`.
      Deliberately omitted `--now` from disable so the running sshd survives long
      enough to queue the shutdown; `mask` writes a `/etc/systemd/system/ssh.service → /dev/null`
      symlink that prevents accidental re-enable across reboots.
    - Both script header comments updated to describe the new mechanism.

    **Swift CLI** — drop SSH plumbing:
    - `VMCommand.swift`: removed the deprecated `--no-ssh` flag and its no-op shim message.
    - `VMLifecycle.swift`: removed the `sshReady` helper, the entire SSH-wait block in `startTart`, and the `sshEndpoint` variable + spec-file population.
    - `VMSpec.swift`: dropped the `ssh: String?` field and parameter from the public initialiser.

    **Tests** — match the new shape:
    - `VMSpecTests.swift`: rewritten to drop `ssh:` from all fixtures, replaced
      `decodesBashProducedSpecJSON` with `decodesLegacySpecWithSshField` (locks in
      forward-compat: legacy spec files containing `"ssh"` still decode because
      `JSONDecoder` ignores unknown keys by default).
    - `TartRunnerTests.swift`: removed `ssh: nil` from 9 fixture sites.

    **Docs** — drop SSH from the spec-file schema and golden descriptions:
    - `README.md`, `LLM_INSTRUCTIONS.md`, `docs/reference/cli-commands.md`,
      `docs/reference/connection-spec.md`, `docs/user/golden-images.md`, and the
      three matching mirrors under `website/docs/`. Each got the same treatment:
      drop the `ssh` field from the spec example/table, drop the `--no-ssh`
      bullet, replace "SSH key auth" golden bullets with "No SSH at runtime"
      bullets that name the disable mechanism, retain the "SSH key" requirements
      row (still needed during golden creation only).

    ## Verification

    ### Static / unit / pre-rebuild integration
    - `swift build` clean.
    - `swift test` — **326/326 passed in 69.3s** against the OLD goldens. This
      proved the Swift-side cleanup is independent of golden rebuild (the
      removed SSH-wait was already a no-op in code paths that mattered).

    ### Live golden rebuilds
    - **Linux golden** (`testanyware-golden-linux-24.04`): rebuilt from scratch
      via `vm-create-golden-linux.sh`. Script exited 0. Total time ~10 min.
    - **macOS golden** (`testanyware-golden-macos-tahoe`): rebuilt from scratch
      via `vm-create-golden-macos.sh`. Script exited 0 — the full 5-boot
      SIP-disable / TCC-grant / SIP-re-enable cycle survived the new SSH-disable
      ordering. Total time ~18 min.

    ### Live clone validation — Linux
    After `vm-start.sh --platform linux` against the new golden:
    - `nc -z -w 3 $ip 22` → connection refused (port 22 unreachable).
    - `systemctl is-enabled ssh.service` → `masked`.
    - `systemctl is-active ssh.service` → `inactive`.
    - `ls -la /etc/systemd/system/ssh.service` → `lrwxrwxrwx ... -> /dev/null`
      (mask symlink in place, persists across reboots).
    - Agent on port 8648 healthy (`accessible: true`).

    ### Live clone validation — macOS
    After `vm-start.sh --platform macos` against the new golden:
    - `nc -z -w 3 $ip 22` → connection refused (port 22 unreachable).
    - `pgrep -l sshd` → exit 1 (no process running).
    - `launchctl print system/com.openssh.sshd` → "Could not find service ... in
      domain for system" (sshd unloaded).
    - `launchctl print-disabled system | grep ssh` →
      `"com.openssh.sshd" => disabled` (canonical persisted launchd state).
    - Agent on port 8648 healthy.

    ### Final integration suite against new goldens
    - `swift test --filter startStopRoundTrip` —
      **3/3 passed** (`startStopRoundTripMacOS`, `startStopRoundTripLinux`,
      `startStopRoundTripWindows`) in 40.5 s for tart, 43.0 s for QEMU.

    ## Backups

    Before the rebuild I cloned both existing goldens to `*-backup` names as a
    safety net. Now that validation is complete, these backup images can be
    deleted:
    - `tart delete testanyware-golden-macos-tahoe-backup`
    - `tart delete testanyware-golden-linux-24.04-backup`

    Left in place for the user to delete at their convenience, since they are
    ~28 GB (macOS) and ~9 GB (linux) of disk.

    ## What this suggests next

    - The `smoke-test-window-compensation-and-open-menu-path-on-tahoe-golden`
      task is now half-unblocked — its other dependency
      (`audit-testanyware-agent-entitlements-for-documents-folder-access-on-tahoe`)
      is still open.
    - The `ssh-wait-dominates-macos-vm-start-latency` memory entry is now
      historical and worth either updating or marking superseded — the wait
      itself is gone from `VMLifecycle.swift` *and* the goldens no longer
      accept SSH connections, so the latency improvement is realised, not just
      potential.
    - Memory notes captured during validation:
      - macOS canonical persisted-disable check: `launchctl print-disabled
        system | grep <service>` returns `"<service>" => disabled` for any
        service that `systemsetup` (or other Apple tooling) has off.
      - Linux mask check: `/etc/systemd/system/<unit> -> /dev/null` is the
        on-disk evidence that `systemctl mask` ran successfully.
    - Combined-shutdown idiom is reusable: any time we need to alter system
      state that may sever the SSH session itself, fold the change into the
      same `vm_ssh` call as the shutdown so the queued shutdown survives.
- id: audit-testanyware-agent-entitlements-for-documents-folder-access-on-tahoe
  title: Audit testanyware-agent entitlements for Documents folder access on Tahoe
  category: bug
  status: not_started
  dependencies: []
  description: |
    During Note Editor VM verification on 2026-04-18, running
    `testanyware exec ls /Users/admin/Documents/` on the Tahoe VM triggered a macOS TCC
    dialog (Transparency, Consent, and Control) on the guest. The agent binary lacks the
    Documents folder (or full-disk access) privacy entitlement or TCC grant on Tahoe.
    This can block automated test scripts that inspect file-save results.

    Remediation options (evaluate in order):
    1. **TCC grant** — grant `testanyware-agent` Documents/full-disk access via `tccutil` or
       the Privacy & Security pane during the Tahoe golden-image build, the same way
       Accessibility is granted.
    2. **Entitlement** — if ad-hoc signing allows it, add `com.apple.security.files.user-selected.read-write`
       or the Documents/Downloads entitlements to the agent binary's entitlement set and
       rebuild the golden.
    3. **Alternate path** — redirect file-inspection commands to paths outside the TCC
       sandbox (e.g. `/tmp`, the agent's own working directory) when Documents inspection
       is not strictly required.

    Requires a golden rebuild for Tahoe once the correct grant is identified. Surfaced
    2026-04-18 during Note Editor verification.
- id: smoke-test-window-compensation-and-open-menu-path-on-tahoe-golden
  title: Smoke-test --window compensation and --open-menu path on Tahoe golden
  category: bug
  status: not_started
  dependencies:
  - disable-ssh-in-macos-and-linux-golden-images
  - audit-testanyware-agent-entitlements-for-documents-folder-access-on-tahoe
  description: |
    Verify the `--window` 40 px drop-shadow compensation and the `--open-menu` comma-path
    drill-down against a real Tahoe VM after the next golden rebuild.

    Both features landed in code but could not be exercised end-to-end in the sessions that
    implemented them because the in-VM agent cannot be hot-swapped without losing TCC
    accessibility (see `agent-hot-swap-does-not-re-grant-tcc-accessibility` memory entry).

    **Checks to perform (fold into whichever session next rebuilds the Tahoe golden):**

    1. `testanyware input click --window <name> 100 100` against a known-position UI control
       (e.g. a button in TextEdit whose screen-absolute position is known).  Confirm the click
       lands on the intended target rather than ~40 px below it.  If the default 40 px inset
       does not match reality, update `WindowOriginCompensation.defaultMacosTopInset` and
       note the correct value in the `window-flag-includes-drop-shadow-in-ax-origin` memory
       entry.

    2. `testanyware agent snapshot --open-menu "File,Recent Files"` against the macOS golden's
       TextEdit or Finder.  Confirm the snapshot includes the recent-files submenu items.
       If the 400 ms per-segment settle is insufficient (submenu not populated at snapshot
       time), apply either the `--menu-settle-ms` flag approach or the poll-and-retry loop
       described in the `open-menu-settle-delay-is-hardcoded-at-400ms` memory entry.

    **Related backlog tasks:** `disable-ssh-in-macos-and-linux-golden-images` and
    `audit-testanyware-agent-entitlements-for-documents-folder-access-on-tahoe` both require
    Tahoe golden rebuilds and are natural opportunities to bundle this smoke-test.
- id: virtiofs-serves-stale-cached-files-after-host-update
  title: VirtioFS serves stale cached files after host update
  category: bug
  status: not_started
  dependencies: []
  description: |
    VirtioFS shared filesystem can serve cached (stale) file content
    to the VM even after the host has written an updated version. Current workaround:
    use base64 transfer (`testanyware scp` or inline base64) or restart the VM. A
    `testanyware sync` command or explicit cache-bust mechanism (e.g. `testanyware scp
    --no-virtio-cache`) would eliminate this class of silent transfer error. Affects
    any workflow that edits a source file on the host and then recompiles or re-runs it
    inside the VM. Surfaced on 2026-04-17 during Racket sample app validation.
- id: brainstorm-and-plan-local-homebrew-binary-distribution
  title: Brainstorm and plan local Homebrew binary distribution
  category: chore
  status: not_started
  dependencies: []
  description: |
    The `local-homebrew-binary-distribution-tap-no-client-builds` backlog task
    explicitly states "Needs brainstorm + plan before execution" and enumerates
    seven open sub-phases. No work phase should pick it up directly — it requires
    design alignment on Developer ID / notarisation, cross-arch build strategy,
    formula template authoring, and golden-script changes before any code is written.

    This task makes the brainstorm prerequisite visible as standalone executable
    work so it can be scheduled ahead of the implementation task.

    **Scope of the brainstorm session:**
    1. Apple Developer ID and notarisation requirements (ad-hoc signing sufficiency?).
    2. Cross-arch macOS builds: arm64-only vs universal2, feasibility without x86_64 host.
    3. Artifact inventory: CLI + 3 agent binaries — build pipeline for each.
    4. Tap repo authoring: reuse `Linkuistics/homebrew-taps` (already used by Ravel-Lite).
    5. Formula template: sed-driven SHA injection pattern (mirror Ravel-Lite's `.rb.tmpl`).
    6. Golden-script update strategy: switch from `swift build` inside VM to brew-artifact
       copy during golden build, accounting for TCC re-grant constraint
       (`agent-hot-swap-does-not-re-grant-tcc-accessibility` memory entry).
    7. README install instructions update scope.

    **Output of the brainstorm:** a written implementation plan with phases,
    files to create/modify, and ordering constraints — suitable for input to the
    `writing-plans` skill.
- id: local-homebrew-binary-distribution-tap-no-client-builds
  title: Local Homebrew binary distribution (tap, no client builds)
  category: feature
  status: not_started
  dependencies:
  - brainstorm-and-plan-local-homebrew-binary-distribution
  description: |
    Mirror Ravel-Lite's local-build pattern so users can install testanyware
    (and the in-VM agents the goldens consume) without running `swift build`,
    `dotnet build`, or any other compiler on their machine.

    **Reference implementation:** `~/Development/Ravel-Lite/scripts/release-build.sh`
    + `release-publish.sh` + `scripts/templates/ravel-lite.rb.tmpl`. Entirely
    local: `cargo release` tags → `release-build.sh` produces per-target
    tarballs and renders the formula → `release-publish.sh` does
    `gh release create` and copies the formula into the
    `~/Development/homebrew-taps` clone. No GitHub Actions.

    **Distribution scope (likely):**
    - Host CLI (`testanyware`, Swift, macOS arm64 + x86_64 — though x86_64 may
      not be feasible without an x86_64 host or universal-bin work).
    - macOS in-VM agent (`testanyware-agent`, Swift, arm64 only).
    - Windows in-VM agent (C# / .NET 9 self-contained, win-arm64) — already
      produces a standalone binary.
    - Linux in-VM agent (Python source — no compile, just bundle).
    - Vision pipeline ships as Python source via `uv` regardless.

    **Constraints surfaced by memory:**
    - `agent-hot-swap-does-not-re-grant-tcc-accessibility`: TCC pins the
      accessibility grant to the original binary's csreq. A brew-installed
      agent cannot just replace the in-VM binary — golden image creation
      must consume the brew-shipped artifact at golden-build time and
      re-grant TCC then. Plan must address this.
    - macOS golden creation currently does `swift build` inside the VM via
      `vm-create-golden-macos.sh`. Once the agent is brew-distributed, the
      golden script copies the prebuilt artifact instead.

    **Why it's a multi-phase feature (not a one-task work phase):**
    1. Ada Apple Developer ID + notarisation? (open question)
    2. Cross-arch macOS builds (arm64 only? universal2?).
    3. Three artifact classes to bundle (CLI + 3 agents).
    4. Tap repo authoring (`Linkuistics/homebrew-taps` already exists per
       Ravel-Lite usage — reuse it).
    5. Formula template + sed-driven SHA injection.
    6. Updates to golden-image scripts to consume brew-shipped agents.
    7. README install instructions update.

    Needs brainstorm + plan before execution.
