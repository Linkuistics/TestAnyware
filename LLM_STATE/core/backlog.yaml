tasks:
- id: add-ubuntu-ci-matrix-entry-for-cargo-build-test-linux-build-verification
  title: Add Ubuntu CI matrix entry for cargo build/test (Linux build verification)
  category: chore
  status: not_started
  dependencies: []
  description: |
    Add Ubuntu CI matrix entry for cargo build/test (Linux build verification)

    **Background:** The Rust workspace at `cli-rs/` was bootstrapped on macOS arm64 only. The workspace uses only cross-platform crates (tokio, reqwest/rustls, clap, serde, directories, anyhow/thiserror) so Linux compilation should succeed — but this is unverified. The bootstrap task results explicitly flag: "Linux build verification… I do not have a Linux host on hand. Recommend running `cargo build --workspace` on linuxbrew or a dev VM in the next session as cheap insurance."

    **Scope**
    - Add a GitHub Actions workflow job (or extend an existing CI matrix) that runs:
      - `cargo build --workspace` on Ubuntu x86_64
      - `cargo test --workspace` on Ubuntu x86_64
      - `cargo clippy --workspace --all-targets -- -D warnings` on Ubuntu x86_64
    - Place the workflow in `.github/workflows/ci.yml` (create if absent) or extend the existing one.
    - Ubuntu arm64 runner is optional (GitHub-hosted arm64 Ubuntu runners are available but billed). x86_64 is sufficient for early drift detection.

    **Acceptance criteria**
    - The CI job runs on every push and pull_request to the relevant branches.
    - `cargo build --workspace` and `cargo test --workspace` pass green on Ubuntu x86_64.
    - Any Linux-specific compilation error (missing crate feature, cfg gate issue, path-handling bug) is surfaced immediately.
    - The cross-language contract tests (14 JSON fixtures) pass on Ubuntu — this is the first Linux validation of the Swift↔Rust protocol compatibility.

    **Notes**
    - This is cheap insurance: catches Linux drift before any of the Linux-primary port tasks (agent commands, QEMU runner, doctor) begin in earnest.
    - Does NOT require a live VM or QEMU; just `cargo test --workspace` (unit + contract tests).
    - Extracted from `bootstrap-rust-workspace-and-shared-protocol-crate` results — "Suggestions for next session" item 2.
- id: investigate-video-codec-licensing-for-embedded-libav-static-linking
  title: Investigate video codec licensing for embedded libav static linking
  category: chore
  status: not_started
  dependencies: []
  description: |
    Investigate video codec licensing for embedded libav static linking in the Rust CLI.

    **Background:** `port-testanyware-record-to-embedded-libav-ffmpeg-next-instead-of-subprocess` requires statically linking libavcodec to keep the Rust binary self-contained. The canonical H.264 encoder (libx264) is GPL-licensed. Statically linking GPL code into a project that isn't fully GPL is legally contentious and may block distribution via Homebrew bottles.

    **Decision needed (runs independently of all code tasks):**
    - Determine whether static linking libx264 into the `testanyware` binary is compatible with the project's distribution model (Homebrew formula, linuxbrew, Windows zip).
    - Assess the LGPL-only alternative: libopenh264 (Cisco's OpenH264). LGPL permits static linking with non-GPL projects; bitrate and quality may differ.
    - Assess vendored x264 with a separate GPL-licensed Linux build variant (would require Homebrew to bottle separate GPL and non-GPL variants).
    - If neither is acceptable, assess HEVC-only (libx265 is LGPL for the main library).

    **Deliverable:**
    Write `docs/architecture/video-codec-licensing.md` documenting:
    1. Chosen codec set and rationale.
    2. Licensing implications for the distribution model.
    3. Any platform-specific differences (e.g. hardware encoder fallbacks on macOS/Linux).

    **Acceptance criteria:**
    - `docs/architecture/video-codec-licensing.md` exists and names a specific codec decision.
    - The decision is referenced from the recording task description's "Constraints" section.

    **Why extracted:** This is a legal/licensing research spike buried inside the recording implementation task. It requires no code, has no dependencies, and can run in parallel with any task in the Rust port arc. Starting the recording task without this decision risks a mid-implementation pivot on codec choice.
- id: realign-macos-agent-error-strings-to-cli-design-contract-4-5
  title: Realign macOS agent error strings to CLI design contract §4.5
  category: chore
  status: not_started
  dependencies: []
  description: |
    Realign macOS agent error strings to CLI design contract §4.5

    **Background:** The Linux Python agent error strings were realigned to §4.5 in `realign-linux-agent-error-strings-to-cli-design-contract-4-5`. The macOS Swift agent (`agents/macos/Sources/testanyware-agent/AgentServer.swift`) still emits human-readable strings. Known offending lines: 224, 226, 230, 295, 308, 310, 314, 330, 350, 365, 380, 403, 486.

    The CLI design contract (§4.5) requires all three agent implementations to emit canonical wire tokens. The macOS agent is the last agent remaining unaligned (Windows is tracked separately).

    **Scope:**
    - Audit `agents/macos/Sources/testanyware-agent/AgentServer.swift` for all `error` strings in HTTP responses.
    - Compare against the canonical error code mapping in `docs/architecture/cli-design-contract.md` §4.5.
    - Update the Swift agent to emit the canonical wire tokens (e.g. `not_found`, `ambiguous`, `window_not_found`).
    - Move human-readable prose to `details` where genuinely informative (mirror the Linux agent pattern).
    - Verify with the existing cross-language contract test fixture suite.

    **Acceptance criteria:**
    - Every `error` string emitted by the macOS Swift agent matches a canonical code in §4.5.
    - No host-side translation map is introduced.
    - Cross-language contract fixtures pass without modification.
    - `AgentServer.swift` emits only snake_case token strings in the `error` field, not English prose.

    **Notes:**
    - Extracted from `realign-linux-agent-error-strings-to-cli-design-contract-4-5` results — Cross-impact section.
    - Scope mirrors the Linux realignment task. The same §4.5 token map applies.
    - The macOS agent may also need `action_unsupported` and `accessibility_unavailable` wired for cases where those paths exist in Swift — review with the Linux "out of scope intentional" list as a guide.
- id: realign-windows-agent-error-strings-to-cli-design-contract-4-5
  title: Realign Windows agent error strings to CLI design contract §4.5
  category: chore
  status: not_started
  dependencies: []
  description: |
    Realign Windows agent error strings to §4.5 of the CLI design contract

    **Background:** The CLI design contract (§4.5, `docs/architecture/cli-design-contract.md`) pins a single canonical wire→code mapping for agent error strings. The three agent implementations (macOS Swift, Linux Python, Windows C#) currently use different `error` field values. The contract requires Linux and Windows agents to be brought into line; host-side translation maps are explicitly disallowed.

    Unknown wire strings surfacing as `AGENT_ERROR_UNKNOWN` is the fallback — any Windows agent error string not in the canonical mapping would surface as `AGENT_ERROR_UNKNOWN` on the host CLI, breaking structured error handling and LLM-readable error codes.

    **Scope**
    - Audit `agents/windows/` (C# .NET 9 agent) for all `error` strings returned in HTTP responses.
    - Compare against the canonical error code mapping in `docs/architecture/cli-design-contract.md` §4.
    - Update the C# agent to emit the canonical error strings.
    - Verify with the existing contract test fixture suite (cross-language JSON fixtures in `cli-rs/`).

    **Acceptance criteria**
    - Every error string emitted by the Windows C# agent matches a canonical code in §4.5.
    - No host-side translation map is introduced.
    - Cross-language contract fixtures for Windows-agent errors pass without modification.

    **Notes**
    - Promoted from `audit-current-cli-and-define-rust-cli-design-contract` results — "What this suggests next" item 2.
    - This task affects `agents/windows/` only; no changes to host CLI or other agents.
- id: add-pyproject-toml-and-ruff-pytest-config-to-agents-linux-for-ci-lint-and-test-coverage
  title: Add pyproject.toml and ruff/pytest config to agents/linux/ for CI lint and test coverage
  category: chore
  status: not_started
  dependencies: []
  description: |
    Add pyproject.toml and ruff/pytest config to agents/linux/ for CI lint and test coverage

    **Background:** The Linux agent at `agents/linux/` uses system Python with no venv (by design), but currently has no `pyproject.toml` or static analysis configuration. Changes like the error string realignment have no automated quality gate in CI — correctness was verified by manual `grep` and `py_compile` only.

    **Scope:**
    - Add `pyproject.toml` under `agents/linux/` with:
      - `ruff` configuration for linting (rules appropriate for a small production Python service).
      - `pytest` as the test runner.
    - Add at least minimal pytest tests verifying that canonical error tokens are emitted correctly — specifically the 17 sites changed in the realignment (the `not_found`, `ambiguous`, `window_not_found`, `download_failed` paths in `accessibility.py` and `system_endpoints.py`).
    - Extend the existing CI workflow (`.github/workflows/`) to run `ruff check` and `pytest` on `agents/linux/` on every push and pull request.

    **Acceptance criteria:**
    - `ruff check agents/linux/` passes in CI.
    - `pytest agents/linux/` runs at least the token-emission tests and passes.
    - The existing "no venv: uses system Python" deployment model is unchanged — `pyproject.toml` is a development tooling file only.
    - A future error string change that introduces a non-canonical token causes a test failure rather than a silent regression.

    **Notes:**
    - Extracted from `realign-linux-agent-error-strings-to-cli-design-contract-4-5` results — "Suggestions for next session" item 2.
    - Keep test scope narrow: the agent's HTTP server doesn't need to be spun up — unit tests mocking the AT-SPI2 layer or driving response-construction functions directly are sufficient to cover the token emission paths.
- id: port-agent-only-cli-commands-exec-upload-download-agent-to-rust
  title: Port agent-only CLI commands (exec, upload, download, agent *) to Rust
  category: feature
  status: not_started
  dependencies: []
  description: |
    Port commands that talk only to the in-VM agent over HTTP. No VNC, no OCR, no video. This delivers end-to-end value for the primary use case (Linux host driving Linux/Windows guests headlessly) before any RFB work begins.

    **Scope**
    - `testanyware exec` — run a command in the guest, capture stdout/stderr/exit code.
    - `testanyware upload`, `testanyware download` — file transfer through the agent.
    - `testanyware agent health`, `agent windows`, `agent snapshot` (with `--mode interact|full`, `--window`, `--open-menu`), `agent inspect` (`--role`, `--label`), `agent press`.
    - Connection resolution chain (must mirror the priority order in README.md):
      1. `--connect <path>`
      2. `--vm <id>`
      3. `--vnc` / `--agent` / `--platform`
      4. `TESTANYWARE_VM_ID`
      5. `TESTANYWARE_VNC` / `TESTANYWARE_VNC_PASSWORD` / `TESTANYWARE_AGENT` / `TESTANYWARE_PLATFORM`
      6. Error
    - Per-VM spec file reading from `${XDG_STATE_HOME:-~/.local/state}/testanyware/vms/<id>.json` (with `directories` crate for cross-platform path resolution; `%LOCALAPPDATA%` on Windows).

    **Acceptance criteria**
    - All listed commands behave identically to the Swift CLI in flag names, output format, and exit codes.
    - Each command's `--help` includes ≥2 concrete examples per the CLI design contract (task 2).
    - Each command supports `--json` per the design contract.
    - Errors emit stable `code` fields in JSON mode.
    - IntegrationTests-equivalent suite runs against a live golden VM (Linux or Windows) on a Linux host.

    **Notes**
    - This task is the first concrete validation that Linux-host headless work is viable. Run the test suite from a Linux box against a QEMU Linux guest before declaring done.
    - Reuse `testanyware-agent-client` crate from task 1.
    - The Swift CLI's JSON output shapes are the de-facto schema; lock them down in `docs/reference/cli-schemas/` per task 2.
- id: port-8-discoverability-commands-capabilities-schema-llm-instructions-to-rust
  title: Port §8 discoverability commands (capabilities, schema, llm-instructions) to Rust
  category: feature
  status: done
  dependencies: []
  description: |
    Port §8 discoverability commands (capabilities, schema, llm-instructions) to Rust

    **Background:** The Rust CLI now has stubs for three top-level §8 discoverability commands added during the noun-first migration: `testanyware capabilities`, `testanyware schema`, `testanyware llm-instructions`. CLI design contract §8 specifies the expected output shape for each:
    - `capabilities` — machine-readable list of supported commands and features
    - `schema` — JSON schema for structured output
    - `llm-instructions` — instructions for LLM tool-calling consumers

    The stubs exist in `cli-rs/crates/testanyware-cli/src/main.rs` and dispatch to `unimplemented!(...)`. Each is a self-contained one-session task per the §8 sub-section of the design contract.

    **Scope:**
    - Implement `testanyware capabilities` to emit a machine-readable command/feature catalogue (per §8.1).
    - Implement `testanyware schema` to emit the JSON output schemas for all implemented commands (per §8.2).
    - Implement `testanyware llm-instructions` to emit the LLM tool-calling guidance block (per §8.3).
    - Each command must support `--json` and produce output per the §8 design contract spec.
    - Remove the `#[ignore]` from the `§8_discoverability_commands_are_reachable` contract test (or equivalent §8 test) in `cli-rs/crates/testanyware-cli/tests/cli-contract.rs`.

    **Acceptance criteria:**
    - `testanyware capabilities --json` exits 0 and produces a valid JSON object.
    - `testanyware schema --json` exits 0 and produces a valid JSON schema.
    - `testanyware llm-instructions` exits 0 and produces LLM-tool-calling guidance text.
    - The §8 contract test (currently ignored) passes without `#[ignore]`.
    - `cargo test --workspace` stays green.

    **Notes:**
    - Promoted from `migrate-rust-cli-surface-to-noun-first-command-structure-1-alignment` results — "What this suggests next" item 4: "consider whether they deserve their own entries (each is a self-contained one-session task with a §8 sub-section to satisfy)."
    - The stubs already exist; this task implements the bodies.
    - Independent of agent port tasks — no VM connectivity required.
  results: |
    ## What landed

    `testanyware capabilities`, `testanyware schema <command>`, and
    `testanyware llm-instructions` are now implemented in the Rust port and
    behave per contract §8.

    ### New files

    - `cli-rs/crates/testanyware-cli/src/lib.rs` — converts the bin-only
      crate to also expose a library, so the canonical surface is shared
      between `main.rs` and `cli-contract.rs`.
    - `cli-rs/crates/testanyware-cli/src/surface.rs` — single source of
      truth for the canonical command list, alias tables, top-level groups,
      and the §4+§8.2 error-code catalogue.
    - `cli-rs/crates/testanyware-cli/src/discoverability.rs` — the three
      command handlers. Each schema file under
      `docs/reference/cli-schemas/` is embedded via `include_str!` per §8.2
      with a path → schema-id lookup table.
    - `cli-rs/crates/testanyware-cli/src/llm_instructions.md` — embedded
      manual; ~115 lines, well under the §8.3 ~3000-token cap.

    ### Edits

    - `cli-rs/crates/testanyware-cli/src/main.rs`:
      - dispatches `Capabilities`/`Schema`/`LlmInstructions` to the new
        handlers (replaces the `unimplemented(...)` stubs);
      - adds §7-template `long_about` (description) and `after_long_help`
        (OUTPUT/EXIT CODES/EXAMPLES/SEE ALSO) on each of the three commands.
        This is the in-tree reference template future port tasks will copy.
      - `Capabilities` accepts a no-op `--json` flag for symmetry; default
        output is JSON regardless.
    - `cli-rs/crates/testanyware-cli/Cargo.toml`: promotes `serde_json` from
      dev-dep to regular dep (capabilities/schema construct JSON envelopes
      at runtime).
    - `cli-rs/crates/testanyware-cli/tests/cli-contract.rs`: enables the
      three §8 tests (`capabilities_lists_full_surface`,
      `schema_command_emits_json_schema_for_each_command`,
      `llm_instructions_command_emits_manual`) — they now run instead of
      being `#[ignore]`'d.

    ### Behaviour

    - `testanyware capabilities` emits a JSON envelope with
      `schema_version`, `ok`, `version` (from `CARGO_PKG_VERSION`),
      `git_revision` (from `option_env!("TESTANYWARE_GIT_REVISION")`,
      defaults to `"unknown"` at dev-build time — release pipeline will
      populate this), `subcommands` (9 top-level groups), `aliases` (11
      entries; verb-first + synonym), `output_formats`, `features`,
      `platforms`, and `error_codes` (44 entries spanning §4.1–§4.6 plus
      `SCHEMA_NOT_FOUND` from §8.2). Exit 0.
    - `testanyware schema <command...>` matches the path against
      `CANONICAL_COMMANDS` and emits the embedded schema JSON. On miss
      (unknown path or no declared schema), emits a `SCHEMA_NOT_FOUND` JSON
      error envelope with distinct `details.reason` for the two miss cases
      and exits 3. On empty path, emits a usage hint to stderr and exits 2.
    - `testanyware llm-instructions` prints the embedded manual and exits 0.

    ### Verification

    - `cargo test -p testanyware-cli`: 10 passed, 6 ignored, 0 failed
      (was 7 passed, 9 ignored before this task — three §8 tests
      graduated).
    - `cargo clippy -p testanyware-cli --all-targets -- -D warnings`: clean.
    - `cargo build --workspace` and `cargo test --workspace`: clean.
    - Manual smoke: `capabilities | jq` shows correct counts (9 groups, 44
      codes, 11 aliases). `schema vm list` matches the on-disk file
      byte-for-byte (the contract test enforces semantic equality). `schema
      does not exist` exits 3 with a `SCHEMA_NOT_FOUND` envelope.
    - `--help` for each of the three commands renders the §7 sections in
      order: summary → description → `Usage:` → `Options:` → OUTPUT → EXIT
      CODES → EXAMPLES → SEE ALSO.

    ## What worked

    - Adding `lib.rs` to a `[[bin]]`-only crate works seamlessly with cargo
      — no `Cargo.toml` `[lib]` block needed; both targets build. Lets us
      share the canonical surface table between the runtime and tests
      without packaging gymnastics.
    - The `long_about` + `after_long_help` split maps cleanly onto the §7
      template ordering. Clap renders the auto-generated `Usage:` and
      `Options:` between them, satisfying the contract sections 1–8 in
      order. This is the reference pattern for all subsequent port tasks.
    - `include_str!` for schema files makes the contract gate enforceable
      with byte-level fidelity: `testanyware schema X` and the on-disk file
      cannot drift, because the file IS the binary's source.

    ## What didn't / open hazards

    - `git_revision` is a stub (`"unknown"` from `option_env!`). The Swift
      CLI's release pipeline regenerates `Version.swift` from
      `git describe`; the Rust port needs an analogous mechanism. This is
      appropriate to fold into the "Distribute Rust testanyware via
      homebrew" backlog task, which already owns the release pipeline.
    - The `SCHEMA_NOT_FOUND` code is now in the Rust catalogue but is not
      yet listed in `docs/architecture/cli-design-contract.md` §4. The
      contract document mentions it in §8.2 prose only. Worth a small
      doc-only follow-up to add it to §4.7 ("Discoverability") or a new §4.8
      for completeness. Not blocking.
    - `cli-contract.rs` still has its own copy of `CANONICAL_COMMANDS`,
      `VERB_FIRST_ALIASES`, and `SYNONYM_ALIASES`. The new
      `testanyware_cli::surface` module duplicates them. Refactoring the
      test to consume the lib's tables would eliminate the dual source of
      truth; out of scope for this task because it touches every ignored
      test.
    - 6 contract tests remain `#[ignore]`'d. They are gated on per-command
      port tasks (real `--json` output, `--dry-run`, listing/truncation,
      identifier round-trip, error-code mapping, §7 template walk). None
      block this task.

    ## Suggested next

    - "Implement RFB client crate with handshake, Raw, CopyRect; port
      screenshot and screen-size" (no deps): now that §7 + §8 land as a
      reference pattern, the smallest data-producing command (`screen
      size`) is the natural next pick — a single canonical command port can
      flip `each_subcommand_help_follows_template`, `each_data_command_supports_json`
      for that command, and exercise the `screen-size` schema (turning the
      stub into real content).
    - Folding `SCHEMA_NOT_FOUND` into §4 of the design contract doc.
    - Once one or two more commands land, refactoring `cli-contract.rs` to
      consume `testanyware_cli::surface` tables instead of duplicating them.
- id: implement-cli-side-agent-error-code-mapper-in-rust-cli-for-canonical-token-display
  title: Implement CLI-side agent error code mapper in Rust CLI for canonical token display
  category: feature
  status: not_started
  dependencies:
  - port-agent-only-cli-commands-exec-upload-download-agent-to-rust
  description: |
    Implement CLI-side agent error code mapper in Rust CLI for canonical token display

    **Background:** §4.5 of the CLI design contract specifies that "the host CLI maps [agent error tokens] 1:1 to a `code`" for structured error output. The Linux and macOS agents have been (or are being) realigned to emit canonical wire tokens (`not_found`, `ambiguous`, `window_not_found`, etc.). Until the CLI-side mapper lands, the Rust CLI surfaces raw snake_case tokens directly to users and LLMs rather than the structured `code` field specified by the contract.

    **Scope:**
    - In the Rust CLI's agent response handling layer, map canonical agent error tokens to structured CLI error codes per §4.5.
    - Cover the full §4.5 canonical token set: `not_found`, `ambiguous`, `window_not_found`, `download_failed`, `action_unsupported`, `accessibility_unavailable`, `exec_failed`, `upload_failed`.
    - For any unrecognised token: surface as `AGENT_ERROR_UNKNOWN` with the raw token preserved for diagnostics (per contract fallback).
    - JSON output (`--json` mode) emits the structured `code` field (e.g. `"AGENT_NOT_FOUND"`) not the raw wire token (`"not_found"`).
    - Human-readable output translates the token to a friendly message.

    **Acceptance criteria:**
    - All canonical tokens from §4.5 map to named CLI error codes in the Rust implementation.
    - `--json` output contains a `code` field that matches the §4.5 code catalogue.
    - `AGENT_ERROR_UNKNOWN` fires correctly for any unrecognised token, with the raw token in `details`.
    - Unit tests cover the full mapping table.

    **Notes:**
    - Extracted from `realign-linux-agent-error-strings-to-cli-design-contract-4-5` results — "Suggestions for next session" item 3.
    - This task is the other half of the agent error realignment work; the agent side (Linux + macOS + Windows) emits canonical tokens, this task ensures the CLI consumer maps them to the contract-defined `code` values.
    - Depends on `port-agent-only-cli-commands-exec-upload-download-agent-to-rust` since the mapper lives inside the Rust CLI's agent response handling.
- id: port-qemu-runner-and-vm-lifecycle-to-rust
  title: Port QEMU runner and VM lifecycle to Rust
  category: feature
  status: not_started
  dependencies: []
  description: |
    Port the QEMU-based VM lifecycle to Rust. This is the **primary VM path** under the new constraints (Linux/Windows guests on Linux/macOS hosts). Tart support is a separate later task (12).

    **Scope (port from Swift)**
    - `cli/Sources/TestAnywareDriver/VM/QEMURunner.swift`
    - `cli/Sources/TestAnywareDriver/VM/QEMUMonitorClient.swift`
    - `cli/Sources/TestAnywareDriver/VM/VMLifecycle.swift` (QEMU paths only — tart paths in task 12)
    - `cli/Sources/TestAnywareDriver/VM/AgentHealthWaiter.swift`
    - `cli/Sources/TestAnywareDriver/VM/DetachedProcess.swift`
    - `cli/Sources/TestAnywareDriver/VM/VMPaths.swift`
    - `cli/Sources/TestAnywareDriver/VM/VMSpec.swift` and `VMMeta.swift`
    - swtpm setup for Windows guests (TPM 2.0 socket).
    - Per-VM spec write/read; meta sidecar with PID + clone-dir + (later) viewer-PID.

    **Commands**
    - `testanyware vm start --platform {linux|windows} --display WxH [--viewer]`
    - `testanyware vm stop <id>`
    - `testanyware vm list`
    - `testanyware vm delete <name>`

    **Acceptance criteria**
    - On a Linux host: `testanyware vm start --platform windows --display 1920x1080` clones and starts a Windows golden, returns a usable VM id, agent reaches health within timeout.
    - On a Linux host: same flow for `--platform linux`.
    - On a macOS host: same QEMU flows work (linux + windows guests).
    - `testanyware vm stop` cleanly terminates QEMU + swtpm. Viewer wiring lands in task 8.
    - Meta sidecar shape stays compatible: an in-flight VM started by the Swift CLI can be stopped by the Rust CLI on macOS (and vice versa) for the duration of the parallel-tooling period.
    - Each command satisfies the CLI design contract from task 2: examples in help, `--json` output, stable error codes.

    **Constraints from the design conversation**
    - Use `tokio::process` for child management. On Unix use `setsid` (via `nix` behind `#[cfg(unix)]`); on Windows use `CREATE_NEW_PROCESS_GROUP` (via `windows-sys` or `std::os::windows::process::CommandExt`).
    - The existing memory entries on Darwin pipe EOF and Foundation `Process` not calling `setsid` **do not apply** to Rust — most of those workarounds drop away. Re-validate the process-tree-kill sequence in Rust rather than porting the workaround verbatim.
    - KVM access on Linux: `/dev/kvm` must be readable+writable. If missing, fail with `code: KVM_PERMISSION_DENIED` and a remediation message naming `usermod -aG kvm $USER` (per CLI design contract §Errors).
    - swtpm is required for Windows guests. If missing, fail with `code: SWTPM_MISSING` and remediation `apt install swtpm swtpm-tools` on Linux / `brew install swtpm` on macOS.
- id: fix-swtpm-socket-path-length-limit-causing-2-qemu-integration-test-failures
  title: Fix swtpm socket-path length limit causing 2 QEMU integration test failures
  category: chore
  status: not_started
  dependencies: []
  description: |
    Fix swtpm socket-path length limit causing 2 QEMU integration test failures

    **Background:** `QEMURunnerIntegrationTests` has 2 pre-existing failures caused by macOS `sun_path` length limit for the swtpm (software TPM) socket path. macOS limits `sun_path` to 104 bytes; the swtpm socket path constructed from XDG state paths can exceed this limit, causing the swtpm process to fail to bind.

    This is a known expected baseline: a passing full suite shows 270/272. These 2 failures are independent of all other work.

    **Scope:**
    - Diagnose the exact path construction that overflows `sun_path`.
    - Shorten the path (e.g. use a hash or shorter temp directory) or move the swtpm socket to `$TMPDIR` which is always short on macOS.
    - Verify the fix by running `QEMURunnerIntegrationTests` on macOS and confirming all 272 tests pass (not just 270/272).

    **Acceptance criteria:**
    - `QEMURunnerIntegrationTests` passes all 272 tests on macOS (no `sun_path` failures).
    - The swtpm socket path is always within `sun_path` limits on both macOS and Linux.
    - No change to Windows guest behaviour.

    **Notes:**
    - Tracked as "backlog Task 12" in prior session memory (`2-qemu-integration-tests-fail-from-swtpm-sun-path-limit`).
    - Independent of all other work — can run in any order.
    - Low priority: does not block any other task; treat 270/272 as the acceptable baseline until this is addressed.
- id: port-testanyware-doctor-with-linux-host-preflight-checks
  title: Port testanyware doctor with Linux-host preflight checks
  category: feature
  status: not_started
  dependencies:
  - port-agent-only-cli-commands-exec-upload-download-agent-to-rust
  - port-qemu-runner-and-vm-lifecycle-to-rust
  description: |
    Port `testanyware doctor` with cross-platform host preflight checks. Doctor is the primary feedback loop for users on a new host — when something is missing, doctor tells them what to install.

    **Scope**
    - Port `cli/Sources/testanyware/DoctorCommand.swift` to Rust.
    - Existing checks (preserve): dev-symlink/brew-shadowing detection, agent payload presence at `$(brew --prefix testanyware)/share/testanyware/`, bundled-script `testanyware-min-tool` sentinel parsing.
    - **New Linux-host checks:**
      - `/dev/kvm` permission (suggest `usermod -aG kvm $USER`).
      - `swtpm` and `swtpm-tools` presence (apt instruction).
      - `qemu-system-{x86_64,aarch64}` presence and minimum version (pin in source).
      - `ffmpeg` embedded availability self-check (link against libav at build time; runtime check that the linked symbols load).
    - **macOS-host checks (preserve + extend):**
      - `tart` presence if any macOS-platform operation is requested.
      - `swtpm` via brew.
    - **Windows-host checks (lower priority but design now):**
      - WHPX/HAXM accelerator presence.
      - `swtpm.exe` presence (Windows port).
      - `qemu-system-*.exe` presence.

    **Acceptance criteria**
    - Per the CLI design contract (task 2): `testanyware doctor` supports `--json` with a stable schema (`{"checks": [{"name", "status", "remediation", "code"}], "summary": {...}}`).
    - On a fresh Linux host with KVM but no swtpm: doctor exits non-zero, names `apt install swtpm swtpm-tools`, JSON output includes `code: "SWTPM_MISSING"`.
    - On a healthy macOS host: doctor exits 0 with the same diagnostic quality as the Swift version.
    - Examples in `--help` cover both the human-readable invocation and the JSON-consumed-by-script invocation.

    **Notes**
    - This task can ship with stub checks for parts that aren't yet implemented (e.g. ffmpeg check stays a stub until task 11). Doctor is intended to evolve; the schema is the stable thing.
    - The existing min-tool-sentinels backlog item is independent and orthogonal — it adds version sentinels to bundled scripts. That task can land before or after this one.
- id: implement-rfb-client-crate-with-handshake-raw-copyrect-port-screenshot-and-screen-size
  title: Implement RFB client crate with handshake, Raw, CopyRect; port screenshot and screen-size
  category: feature
  status: not_started
  dependencies: []
  description: |
    Implement the foundation of the new VNC layer: handshake + Raw + CopyRect encodings. Pure Rust, shared between the CLI and the viewer (task 8).

    **Why pure Rust:** royalvnc FFI was considered but ruled out — Swift toolchain on Linux is a non-starter for the primary host platform.

    **Scope**
    - New crate: `testanyware-rfb`. RFB protocol per RFC 6143.
    - Security types: None, VNC password.
    - Encodings: Raw, CopyRect.
    - Pseudo-encodings: DesktopSize, LastRect.
    - Pixel format negotiation.
    - Framebuffer abstraction with a `FrameSink` trait — separates protocol from output target. Same crate consumed by:
      - CLI: `FrameSink` writes one PNG to disk and disconnects (`testanyware screenshot`).
      - Viewer (task 8): `FrameSink` blits into a wgpu texture, stays connected.
    - API sketch: `RfbConnection::connect(host, port, password) -> Result<Self>`, `.request_update()`, `.next_message()`.

    **Commands**
    - `testanyware screenshot --vnc <ep> [-o out.png] [--region x,y,w,h] [--json]`
    - `testanyware screen-size --vnc <ep> [--json]`

    **Acceptance criteria — spike-as-first-test**
    1. Connects to a running QEMU Linux guest on a Linux host, completes RFB handshake with password auth, requests one framebuffer update, decodes a Raw-encoded rectangle, writes a PNG that opens correctly.
    2. Same code path works on a macOS host against a tart macOS guest (validates two host OSes and the least-common-denominator encoding).
    3. `testanyware screenshot` output is byte-identical to the Swift CLI for an identical VNC frame (use a deterministic reference VM frame as fixture).
    4. `testanyware screen-size --json` returns `{"width": <int>, "height": <int>}` per the CLI design contract.

    **Constraints**
    - Don't implement ZRLE/Tight here — task 10. Most golden VMs negotiate down to Raw if Tight isn't offered, so Raw + CopyRect is enough to validate the rest of the pipeline (input, viewer, video) end-to-end.
    - API designed for two consumers (CLI one-shot, viewer continuous render). The `FrameSink` trait is the abstraction boundary.
    - Pure Rust, no C deps beyond what `image` crate already pulls in.
- id: implement-rfb-input-messages-and-port-testanyware-input-subcommands
  title: Implement RFB input messages and port testanyware input subcommands
  category: feature
  status: not_started
  dependencies:
  - implement-rfb-client-crate-with-handshake-raw-copyrect-port-screenshot-and-screen-size
  description: |
    Add outbound RFB messages for keyboard and mouse input. Builds on `testanyware-rfb` from task 6 — same crate, additional code path.

    **Scope**
    - `KeyEvent` (RFB message type 4): down/up with X11 keysym.
    - `PointerEvent` (RFB message type 5): button mask + x/y.
    - Port `cli/Sources/TestAnywareDriver/Input/PlatformKeymap.swift` to Rust: per-platform Cmd/Alt/Ctrl keysym mapping.
    - Port `cli/Sources/TestAnywareDriver/Input/VNCInput.swift` higher-level helpers (typeText, click, drag, scroll).

    **Commands (port from Swift CLI)**
    - `testanyware input key <name> [--modifiers cmd,shift]`
    - `testanyware input key-down <name>` / `key-up <name>`
    - `testanyware input type <text>`
    - `testanyware input click <x> <y> [--button right] [--count 2]`
    - `testanyware input mouse-down <x> <y>` / `mouse-up <x> <y>`
    - `testanyware input move <x> <y>`
    - `testanyware input scroll <x> <y> --dy <n>`
    - `testanyware input drag <x1> <y1> <x2> <y2>`

    **Acceptance criteria**
    - Each input subcommand has identical flag surface and exit codes to the Swift CLI.
    - macOS Cmd-key behaviour verified against a macOS guest. Apply existing project memory: macOS Cmd = `XK_Alt_L (0xffe9)`, Option = `XK_Meta_L (0xffe7)` for Virtualization.framework VNC.
    - Integration test: `testanyware input type "Hello"`, then `testanyware agent snapshot` confirms the focused text field contains "Hello". Runs on Linux host against Linux guest AND macOS host against macOS guest.
