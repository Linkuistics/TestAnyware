tasks:
- id: smoke-test-window-compensation-and-open-menu-path-on-tahoe-golden
  title: Smoke-test --window compensation and --open-menu path on Tahoe golden
  category: bug
  status: not_started
  dependencies: []
  description: |
    Verify the `--window` 40 px drop-shadow compensation and the `--open-menu` comma-path
    drill-down against a real Tahoe VM after the next golden rebuild.

    Both features landed in code but could not be exercised end-to-end in the sessions that
    implemented them because the in-VM agent cannot be hot-swapped without losing TCC
    accessibility (see `agent-hot-swap-does-not-re-grant-tcc-accessibility` memory entry).

    **Checks to perform (fold into whichever session next rebuilds the Tahoe golden):**

    1. `testanyware input click --window <name> 100 100` against a known-position UI control
       (e.g. a button in TextEdit whose screen-absolute position is known).  Confirm the click
       lands on the intended target rather than ~40 px below it.  If the default 40 px inset
       does not match reality, update `WindowOriginCompensation.defaultMacosTopInset` and
       note the correct value in the `window-flag-includes-drop-shadow-in-ax-origin` memory
       entry.

    2. `testanyware agent snapshot --open-menu "File,Recent Files"` against the macOS golden's
       TextEdit or Finder.  Confirm the snapshot includes the recent-files submenu items.
       If the 400 ms per-segment settle is insufficient (submenu not populated at snapshot
       time), apply either the `--menu-settle-ms` flag approach or the poll-and-retry loop
       described in the `open-menu-settle-delay-is-hardcoded-at-400ms` memory entry.

    **Related backlog tasks:** `disable-ssh-in-macos-and-linux-golden-images` and
    `audit-testanyware-agent-entitlements-for-documents-folder-access-on-tahoe` both require
    Tahoe golden rebuilds and are natural opportunities to bundle this smoke-test.
- id: virtiofs-serves-stale-cached-files-after-host-update
  title: VirtioFS serves stale cached files after host update
  category: bug
  status: not_started
  dependencies: []
  description: |
    VirtioFS shared filesystem can serve cached (stale) file content
    to the VM even after the host has written an updated version. Current workaround:
    use base64 transfer (`testanyware scp` or inline base64) or restart the VM. A
    `testanyware sync` command or explicit cache-bust mechanism (e.g. `testanyware scp
    --no-virtio-cache`) would eliminate this class of silent transfer error. Affects
    any workflow that edits a source file on the host and then recompiles or re-runs it
    inside the VM. Surfaced on 2026-04-17 during Racket sample app validation.
- id: local-homebrew-binary-distribution-tap-no-client-builds
  title: Local Homebrew binary distribution (tap, no client builds)
  category: feature
  status: not_started
  dependencies: []
  description: |
    Mirror Ravel-Lite's local-build pattern so users can install testanyware
    (and the in-VM agents the goldens consume) without running `swift build`,
    `dotnet build`, or any other compiler on their machine.

    **Reference implementation:** `~/Development/Ravel-Lite/scripts/release-build.sh`
    + `release-publish.sh` + `scripts/templates/ravel-lite.rb.tmpl`. Entirely
    local: `cargo release` tags → `release-build.sh` produces per-target
    tarballs and renders the formula → `release-publish.sh` does
    `gh release create` and copies the formula into the
    `~/Development/homebrew-taps` clone. No GitHub Actions.

    **Distribution scope (likely):**
    - Host CLI (`testanyware`, Swift, macOS arm64 + x86_64 — though x86_64 may
      not be feasible without an x86_64 host or universal-bin work).
    - macOS in-VM agent (`testanyware-agent`, Swift, arm64 only).
    - Windows in-VM agent (C# / .NET 9 self-contained, win-arm64) — already
      produces a standalone binary.
    - Linux in-VM agent (Python source — no compile, just bundle).
    - Vision pipeline ships as Python source via `uv` regardless.

    **Constraints surfaced by memory:**
    - `agent-hot-swap-does-not-re-grant-tcc-accessibility`: TCC pins the
      accessibility grant to the original binary's csreq. A brew-installed
      agent cannot just replace the in-VM binary — golden image creation
      must consume the brew-shipped artifact at golden-build time and
      re-grant TCC then. Plan must address this.
    - macOS golden creation currently does `swift build` inside the VM via
      `vm-create-golden-macos.sh`. Once the agent is brew-distributed, the
      golden script copies the prebuilt artifact instead.

    **Why it's a multi-phase feature (not a one-task work phase):**
    1. Ada Apple Developer ID + notarisation? (open question)
    2. Cross-arch macOS builds (arm64 only? universal2?).
    3. Three artifact classes to bundle (CLI + 3 agents).
    4. Tap repo authoring (`Linkuistics/homebrew-taps` already exists per
       Ravel-Lite usage — reuse it).
    5. Formula template + sed-driven SHA injection.
    6. Updates to golden-image scripts to consume brew-shipped agents.
    7. README install instructions update.

    Needs brainstorm + plan before execution.
