entries:
- id: darwin-pipe-eof-requires-all-write-fd-holders-to-exit
  title: Darwin pipe EOF requires all write-FD holders to exit
  body: |
    `readDataToEndOfFile()` blocks until every process holding the write end of the pipe exits, not just the direct child. Long-lived bash descendants inherit the write FD and prevent EOF from ever arriving.
- id: processrunner-uses-temp-file-capture-not-pipes
  title: ProcessRunner uses temp-file capture, not pipes
  body: |
    `TestAnywareAgent.ProcessRunner` writes stdout/stderr to temp files instead of pipes. This removes the all-holders-must-exit invariant and is the correct pattern for capturing output from commands that spawn subprocesses.
- id: foundation-process-does-not-call-setsid-or-setpgrp
  title: Foundation Process does not call setsid or setpgrp
  body: |
    `Process` leaves children in the same process group as the parent. When bash exits, its children are reparented to launchd; the process tree is unrecoverable at that point.
- id: pgrep-p-snapshot-must-precede-killing-bash
  title: pgrep -P snapshot must precede killing bash
  body: |
    Take a `pgrep -P <pid>` snapshot before terminating bash. Descendants reparented to launchd after bash exits cannot be found by PID tree traversal afterward.
- id: process-tree-kill-after-exec-is-best-effort
  title: Process-tree kill after exec is best-effort
  body: |
    Descendants spawned between the `pgrep -P` snapshot and the kill signal can leak as orphans. Foundation `Process` cannot place children in their own process group, so there is no race-free solution.
- id: testanyware-vm-stop-requires-explicit-vm-id
  title: testanyware vm stop requires explicit VM id
  body: |
    `testanyware vm stop` takes a required VM id; no auto-discovery because QEMU has no registry. VNC viewer close is handled in Swift by `VMLifecycle.stop`.
- id: urlsession-timeout-must-exceed-agent-exec-deadline
  title: URLSession timeout must exceed agent exec deadline
  body: |
    `AgentTCPClient` passes `timeout + 10s` to URLSession for exec calls. If URLSession and the agent deadline are equal, URLSession can fire first and report a client-side timeout before the agent's `timedOut: true` response arrives.
- id: exec-http-response-carries-timedout-field
  title: exec HTTP response carries timedOut field
  body: |
    The `/exec` response includes `timedOut: Bool` to distinguish a deadline-expired run from a non-zero exit code. A timed-out exec returns `timedOut: true` and `exitCode: -1`.
- id: ocr-dispatch-vision-in-process-on-macos-bridged-on-others
  title: 'OCR dispatch: Vision in-process on macOS, bridged on others'
  body: |
    `TestAnywareServer` sends `/ocr` to `Vision.framework` in-process on macOS. On Linux and Windows it uses `OCRChildBridge`, a stdin/stdout JSON protocol to a Python EasyOCR daemon started with `--daemon`. Set `TESTANYWARE_OCR_FALLBACK=1` to force the bridge path on macOS.
- id: exec-fix-works-for-long-running-commands-in-vm
  title: exec handles long-running VM commands correctly
  body: |
    Long-running commands (e.g. package installs) exit cleanly with correct exit codes. No golden rebuild is needed for exec-only verification; scp + launchctl unload/load against a running tart VM suffices.
- id: agent-hot-swap-does-not-re-grant-tcc-accessibility
  title: Agent hot-swap does not re-grant TCC accessibility
  body: |
    Replacing `/usr/local/bin/testanyware-agent` and reloading the LaunchAgent leaves `/health` returning `accessible: false`. TCC pins the grant to the original binary's csreq (CDHash for adhoc-signed binaries). Exec, upload, and download still work; AX tests require a golden rebuild or explicit TCC re-grant.
- id: vm-start-sh-writes-xdg-compliant-connect-spec-per-vm
  title: vm-start.sh writes XDG-compliant connect spec per VM
  body: |
    vm-start.sh writes spec + meta sidecar under $XDG_STATE_HOME/testanyware/vms/<id>/; vm-stop.sh removes it. Each VM gets its own directory; concurrent vm-start.sh runs are safe.
- id: vm-ids-use-testanyware-hex8-format
  title: VM ids use testanyware-<hex8> format
  body: |
    `vm-start.sh` generates `testanyware-<hex8>` identifiers for each VM clone. All lifecycle scripts and the Swift CLI use this id to address a specific VM.
- id: cli-vm-resolution-connect-vm-flags-env-error
  title: 'CLI VM resolution: --connect → --vm → flags → env → error'
  body: |
    `ConnectionOptions.resolve()` tries in order: `--connect` (explicit spec path), `--vm` (named id), explicit host/port flags, `TESTANYWARE_VM_ID` env var, XDG connect-spec file, then error. Subshells and fresh terminals can pick up the running VM without explicit plumbing.
- id: testanyware-paths-sh-is-shared-by-lifecycle-scripts
  title: _testanyware-paths.sh is shared by lifecycle scripts
  body: |
    All VM lifecycle shell scripts source `_testanyware-paths.sh` for consistent XDG path computation. Scripts are normal subprocesses, not sourced fragments.
- id: xdg-state-holds-ephemeral-vm-files-data-holds-persistent-files
  title: XDG state holds ephemeral VM files; data holds persistent files
  body: |
    VM spec and meta sidecar files are written under `$XDG_STATE_HOME/testanyware/vms/` and removed by `vm-stop.sh`. Clone directories and golden images are written under `$XDG_DATA_HOME/testanyware/` and persist across VM lifecycle.
- id: findtextcommand-delegates-ocr-to-server
  title: FindTextCommand delegates OCR to server
  body: |
    `FindTextCommand` calls the server's `/ocr` endpoint rather than Vision.framework in-process. The command has no platform-specific code; OCR platform selection happens entirely in `TestAnywareServer`.
- id: vm-spec-meta-writers-use-temp-file-chmod-0600-replaceitemat
  title: VM spec/meta writers use temp-file, chmod 0600, replaceItemAt
  body: |
    `VMMeta.writeAtomic(to:)` and `VMSpec.writeAtomic(to:)` write JSON to a sibling `.tmp` file, chmod it to 0600, then call `replaceItemAt` with a `moveItem` fallback. All VM-owned files are readable only by the owner.
- id: vmmeta-pid-and-vmspec-platform-are-non-optional
  title: VMMeta.pid and VMSpec.platform are non-optional
  body: |
    `VMMeta.pid` is `Int` (not `Int?`) and `VMSpec.platform` is `Platform` (not `Platform?`). bash-written files with null fields get rewritten on next run; Swift-side creation always supplies real values.
- id: vmspec-wraps-vncspec-agentspec-platform-directly
  title: VMSpec wraps VNCSpec, AgentSpec, Platform directly
  body: |
    `VMSpec` holds `vnc: VNCSpec`, `agent: AgentSpec?`, and `platform: Platform` without duplicating those types. Changes to `VNCSpec`/`AgentSpec` propagate automatically; do not introduce parallel wrapper types.
- id: all-vm-tests-use-swift-testing-not-xctest
  title: All VM tests use swift-testing, not XCTest
  body: |
    Unit tests (`VMPathsTests`, `VMMetaTests`, `VMSpecTests`) and integration tests (`VMLifecycleTests`) use swift-testing (`@Test`, `#expect`). XCTest and swift-testing cannot coexist in the same target. Plan sketches referencing XCTest for this suite are incorrect.
- id: virtiofs-can-serve-stale-cached-content
  title: VirtioFS can serve stale cached content
  body: |
    VirtioFS does not always propagate host-side file updates to the guest immediately. Workaround: transfer files via `testanyware scp` (base64 over SSH) or restart the VM. Do not rely on VirtioFS for files that are edited on the host and read back in the VM within the same session.
- id: menu-bar-accessibility-tree-is-lazy
  title: Menu bar accessibility tree is lazy
  body: |
    `testanyware agent snapshot --window "Menu Bar"` only exposes top-level menu bar items. Submenus do not appear until the menu is open. Use `testanyware agent snapshot --open-menu <label>` to click the named menu item via VNC (400 ms settle), then capture; the menu is left open for follow-up `agent press` commands. The 400 ms settle delay is best-effort — may need tuning if submenus are not yet populated at snapshot time.
- id: vmtypes-swift-extends-platform-instead-of-defining-vmplatform
  title: VMTypes.swift extends Platform instead of defining VMPlatform
  body: |
    Platform enum (in VM/VMTypes.swift) has defaultBase: String and backend: VMBackend properties. No VMPlatform type exists; plan text using VMPlatform(rawValue:) should be read as Platform(rawValue:).
- id: ocrchildbridge-tempfilecleanedupaftercall-is-flaky-under-parallel-tests
  title: OCRChildBridge tempFileCleanedUpAfterCall is flaky under parallel tests
  body: |
    `OCRChildBridgeTests.tempFileCleanedUpAfterCall` scans `NSTemporaryDirectory()` for leftover `testanyware-ocr-*.png` files, so a parallel OCR test writing its own temp PNG can cause a false failure. Passes in isolation. Not a regression; do not chase.
- id: tartrunner-swallows-external-schema-errors-at-the-boundary
  title: TartRunner swallows external-schema errors at the boundary
  body: |
    `TartRunner.parseList` returns `[]` on malformed JSON or schema mismatch, and `runList` returns `[]` on non-zero exit or a missing `tart` binary. Deliberate: a future `tart list --format json` upgrade must not break `testanyware vm list`. The leniency lives only at the tart boundary — internal Swift parsers stay strict. `parseVNCURL`, by contrast, throws `TartRunnerError.vncURLMalformed` because a bad VNC URL means we cannot connect at all, so the caller must know.
- id: tartrunner-tartvm-uses-codingkeys-for-pascalcase-json
  title: TartRunner.TartVM uses CodingKeys for PascalCase JSON
  body: |
    The private `TartVM` Decodable struct in `TartRunner.swift` declares properties in camelCase (`name`, `state`, `disk`) and maps them to tart's `Name`/`State`/`Disk` keys via `CodingKeys`. Mirrors VMMeta's `clone_dir` → `cloneDir` mapping. Do not reintroduce PascalCase Swift properties to match the JSON verbatim; it triggers Swift linter warnings.
- id: vmlistformatter-column-widths-are-byte-for-byte-parity-with-vm-list-sh
  title: VMListFormatter column widths are byte-for-byte parity with vm-list.sh
  body: |
    `VMListFormatter.render` reproduces `scripts/macos/vm-list.sh`'s printf format strings exactly: goldens `"  %-8s %-40s %-8s %s"`, running `"  %-20s %-8s %-30s %-24s PID %s"`. Nil `sizeGB` renders as `"? GB"`; nil `pid` renders as `"?"`. Changing widths breaks downstream grep/awk consumers.
- id: vm-list-calls-tartrunner-runlist-once-and-partitions
  title: vm list calls TartRunner.runListAll once
  body: |
    VMCommand.List.run() calls TartRunner.runListAll() once — one tart list --format json subprocess returning both a partitioned VMListEntry view and a [TartVMSummary] full catalog. adoptedRunning(allVMs:paths:knownNames:) uses the full catalog to discover non-prefix running VMs with spec sidecars. One subprocess call is deliberate; two would be redundant.
- id: vm-list-start-stop-delete-sh-are-thin-exec-wrappers
  title: vm-list/start/stop/delete.sh are thin exec wrappers
  body: |
    vm-list.sh, vm-start.sh, vm-stop.sh, and vm-delete.sh each exec testanyware vm <subcommand> "$@". Logic lives in VM/QEMURunner.swift, TartRunner.swift, and VMListFormatter.swift. Column-width parity is preserved for grep/awk consumers.
- id: task-sleep-cross-executor-cancel-crashes-in-o-builds
  title: Task.sleep cross-executor cancel crashes in -O builds
  body: |
    Cancelling `Task.sleep(for: Duration)` from a different executor in optimised builds triggers a `swift_task_dealloc` LIFO violation → SIGABRT. Fix: use a monotonic epoch counter; bump it to invalidate in-flight sleeps; each fire-and-forget task checks epoch on wake and no-ops if stale.
- id: recordingtask-uses-cancel-sleep-pattern-latent-crash-risk
  title: recordingTask uses epoch-counter pattern, not Task.cancel
  body: |
    `recordingEpoch: UInt64` actor-isolated field; `handleRecordStart` bumps and captures the epoch before launching the detached loop; the loop checks `isRecordingEpochCurrent(_:)` on each iteration and breaks on stale epoch; `finishRecording()` and `shutdown()` bump the epoch instead of calling `recordingTask?.cancel()`. `recordingTask` is still nil-tested in `handleRecordStart` as the "is recording active?" guard — it is not used to terminate the running loop. See `task-sleep-cross-executor-cancel-crashes-in-o-builds`.
- id: macos-ps-does-not-support-the-sid-keyword
  title: macOS ps does not support the sid keyword
  body: |
    `ps -o sid=` works on Linux but not on macOS — `ps` rejects it with "keyword not found" (valid alternatives: `sess`, `pgid`, `tpgid`). For session-ID assertions in Swift, call `Darwin.getsid(pid_t(pid))` on the child while it's still alive. The `DetachedProcessTests.spawnsAProcessInItsOwnSession` test uses this pattern. Do not reintroduce `ps -o sid`.
- id: detachedprocess-is-the-setsid-escape-hatch
  title: DetachedProcess is the setsid escape hatch
  body: |
    `VM/DetachedProcess.swift` uses `posix_spawn` + `POSIX_SPAWN_SETSID` to spawn children that are session + process-group leaders. Memory notes "Foundation Process does not call setsid or setpgrp" and "pgrep -P snapshot must precede killing bash" describe the problem this solves. Use `DetachedProcess.spawn` for any VM-lifecycle child that must outlive the Swift parent. Do not substitute Foundation `Process` for long-running VM processes.
- id: vmlifecycle-delete-auto-detects-backend-refuses-if-clones-present
  title: VMLifecycle.delete auto-detects backend; refuses if clones present
  body: |
    `VMLifecycle.delete(name:force:)` picks tart if the name appears in `TartRunner.runList()`, else QEMU if a `.qcow2` exists. Refuses with `runningClonesPresent` when live clones are detected unless `--force` is passed. Error cases: `goldenNotFound`, `runningClonesPresent`, `tartDeleteFailed`. No `.notFound` case — mirror `VMLifecycleError.stopFailed` precedent.
- id: backingfile-uses-qemu-img-info-json-not-python3
  title: backingFile uses qemu-img info JSON, not python3
  body: |
    `QEMURunner.backingFile(ofQcow2:)` runs `qemu-img info --output=json` and parses the result with `JSONSerialization`. Replaces the bash approach of `python3 -c`. Path to `qemu-img` discovered via `TartRunner.which("qemu-img")` with homebrew fallback — consistent with `QEMURunner.start` pattern.
- id: 2-qemu-integration-tests-fail-from-swtpm-sun-path-limit
  title: 2 QEMU integration tests fail from swtpm sun_path limit
  body: |
    `QEMURunnerIntegrationTests` has 2 pre-existing failures caused by macOS `sun_path` length limit for the swtpm socket path. Tracked as backlog Task 12; independent of all other work. A passing suite shows 270/272; treat 2 QEMU integration failures as expected baseline.
- id: qemurunner-discovers-vms-by-directory-scan
  title: QEMURunner discovers VMs by directory scan
  body: |
    `QEMURunner` finds golden images by scanning `$XDG_DATA_HOME/testanyware/goldens/` for `.qcow2` files, and running clones by scanning `$XDG_DATA_HOME/testanyware/clones/` subdirectories for a `monitor.sock` file. No registry; presence of the socket means the VM is live.
- id: tart-vnc-url-appends-trailing-ellipsis
  title: tart vnc-url appends trailing ellipsis
  body: |
    `tart`'s `vnc-url` subcommand appends `...` to URLs to indicate truncation. `TartRunner.parseVNCURL` strips the trailing `...` before handing the string to `URL(string:)`. Raw tart output is not a valid URL.
- id: vncviewer-uses-applescript-no-unit-tests
  title: VNCViewer uses AppleScript; no unit tests
  body: |
    `VM/VNCViewer.swift` opens, captures a window reference, and closes VNC Viewer via AppleScript. Unit tests are explicitly excluded from the plan for this file — AppleScript UI automation cannot be exercised without a live display.
- id: testhealthserver-uses-raw-bsd-sockets
  title: TestHealthServer uses raw BSD sockets
  body: |
    TestHealthServer (AgentHealthWaiterTests.swift) binds and accepts connections via BSD socket calls directly, without URLSession or NWListener.
- id: kill-pid-0-probes-pid-ownership-before-sigterm
  title: kill(pid, 0) probes pid ownership before SIGTERM
  body: |
    `VMLifecycle.stop` calls `kill(pid, 0)` before sending `SIGTERM`. A zero-signal kill fails if the pid has been recycled, preventing an unintended signal to a wrong process. Omitting this step is a correctness bug.
- id: p3-plan-code-sketches-use-outdated-constructors
  title: P3 plan code sketches use outdated constructors
  body: |
    VNCSpec and AgentSpec init signatures in P3 plan sketches differ from the landed Swift implementations. Cross-reference: "VMTypes.swift extends Platform instead of defining VMPlatform" and "VMSpec wraps VNCSpec, AgentSpec, Platform directly". Treat all P3/P4 plan code as guidance; compile-check against landed types before use.
- id: vmlifecycleerror-has-stopfailed-not-notfound
  title: VMLifecycleError has stopFailed, not notFound
  body: |
    `VMLifecycle.stop` throws `VMLifecycleError.stopFailed` for absent tart VMs. No `.notFound` case exists. Plan sketches expecting `.notFound` are incorrect.
- id: swift-testing-lifecycle-tests-use-do-cleanup-on-throw-guard
  title: swift-testing lifecycle tests use do/cleanup-on-throw guard
  body: |
    swift-testing has no `setUp`/`tearDown` hooks. `VMLifecycleTests` uses a do block: start the VM, assert, then run cleanup on both the success path and any throw path before re-throwing. Works uniformly across all lifecycle tests without per-test teardown.
- id: linux-tart-vms-boot-38-faster-than-macos
  title: Linux tart VMs boot ~38% faster than macOS
  body: |
    Smaller disk + lighter desktop: Linux round-trip is ~11.7 s vs macOS ~19 s. Set integration test time limits accordingly; the current 5-minute limit has headroom on both platforms.
- id: ssh-wait-dominates-macos-vm-start-latency
  title: SSH wait dominates macOS VM start latency
  body: |
    SSH readiness polling accounts for ~11s of the ~26s macOS start round-trip. Disabling SSH in the golden image (backlog Task 5) would eliminate this cost entirely.
- id: vmlifecycle-stop-runs-vnc-viewer-close-for-missing-ids
  title: VMLifecycle.stop runs VNC-viewer close for missing ids
  body: |
    `VMLifecycle.stop` executes the VNCViewer close prelude even when the tart VM id does not exist. The TCC gate short-circuits the rest; no user-visible failure, but the path is longer than necessary.
- id: ax-walker-descends-through-nsstackview-correctly
  title: AX walker descends through NSStackView correctly
  body: |
    AXElementWrapper traverses NSStackView children without barriers. Anonymous NSTextField instances inside NSStackView lack AX labels; label() falls through to kAXPlaceholderValueAttribute when both title and description are empty.
- id: set-value-index-is-1-based-0-returns-notfound
  title: set-value --index is 1-based; 0 returns .notFound
  body: |
    `--index 0` always returns `.notFound`. Users encountering "Multiple elements matched" must pass `--index 1` (or higher). Zero is not a valid index value.
- id: window-flag-includes-drop-shadow-in-ax-origin
  title: '`--window` flag includes drop-shadow in AX origin'
  body: |
    On Tahoe, the AX-reported window origin includes the drop-shadow inset. Coords passed with `--window <name>` to `testanyware input click` land ~40 px below the intended position. Use screen-absolute coords from a full-screen `testanyware screenshot` instead of window-relative coords when click precision matters. Documented in `--window` help text and README Gotchas.
- id: swift-testing-enabled-if-evaluates-at-discovery-time
  title: swift-testing .enabled(if:) evaluates at discovery time
  body: |
    `.enabled(if:)` conditions on a `@Test` or `@Suite` are evaluated when the test runner discovers tests, not at execution time. Use it for TCC checks and env-var gates; do not rely on runtime guards inside the test body for skipping.
- id: testanyware-agent-lacks-tcc-documents-access-on-tahoe-golden
  title: testanyware-agent lacks TCC Documents access on Tahoe golden
  body: |
    `testanyware exec ls /Users/admin/Documents/` triggers a TCC privacy dialog on the Tahoe VM. The agent binary does not have a Documents folder or full-disk access TCC grant on Tahoe. Automated scripts that inspect file-save results in Documents will stall waiting for the dialog. Backlog Task 10 tracks the fix (TCC grant or entitlement during golden build).
- id: unifiedrole-swift-is-duplicated-both-copies-must-stay-in-sync
  title: UnifiedRole.swift is duplicated; both copies must stay in sync
  body: |
    `UnifiedRole.swift` exists in both the CLI target and the agent-side target. Adding or removing a `UnifiedRole` case requires updating both files. `TestAnywareAgentProtocolTests` checks all six files in the `TestAnywareAgentProtocol` module for byte-level identity and will fail if either copy diverges. The shared-module approach was rejected because `agents/macos/Package.swift` forbids path-dependencies on `cli/`.
- id: qemumonitorclient-speaks-hmp-via-nc-u-not-nwconnection
  title: QEMUMonitorClient speaks HMP via nc -U, not NWConnection
  body: |
    `QEMUMonitorClient.send` pipes `command\n` through `/bin/sh -c "(printf ...; sleep) | /usr/bin/nc -U $sock"`, with the command, timeout, and socket path passed as positional `sh -c` args (`$1`, `$2`, `$3`). Matches the original bash byte-for-byte and avoids `Network.framework`'s idiosyncratic Unix-socket semantics. When the subshell's sleep expires, the pipe EOFs, nc closes its end, QEMU sees EOF and flushes — giving a clean response terminus without prompt sniffing. Pure parsers (`parseAgentPort`, `parseVNCPort`) are `static` for unit testability.
- id: qemu-backend-uses-detachedprocess-for-qemu-foundation-process-for-swtpm
  title: QEMU backend uses DetachedProcess for qemu, Foundation Process for swtpm
  body: |
    `QEMURunner.start` spawns the `qemu-system-aarch64` binary via `DetachedProcess` (posix_spawn + SETSID) so the VM outlives the parent cleanly. swtpm, by contrast, goes via a plain Foundation `Process` run synchronously because it daemonises itself (`--daemon`) and exits — there's nothing for the parent to hold open.
- id: swtpm-teardown-path-is-under-clone-id-tpm-not-clone-tpm
  title: swtpm teardown path is under clone/<id>-tpm, not clone/tpm
  body: |
    QEMURunner.stop locates swtpm via pgrep -f "swtpm.*<cloneDir>/<cloneName>-tpm". Using <cloneDir>/tpm/sock does not match this path and leaks an orphan swtpm process per run.
- id: swift-6-disallows-thread-sleep-in-async-contexts
  title: Swift 6 disallows Thread.sleep in async contexts
  body: |
    All three in-`async`-function delays in `QEMURunner.start` use `try? await Task.sleep(nanoseconds:)`. `Thread.sleep(forTimeInterval:)` emits `Class method 'sleep' is unavailable from asynchronous contexts` under Swift 6. Remains valid in synchronous functions like `QEMURunner.stop`.
- id: vmexists-uses-parseallvmnames-not-runlist
  title: vmExists uses parseAllVMNames, not runList
  body: |
    `TartRunner.vmExists(name:)` calls `parseAllVMNames(tartJSON:)`, which returns every name in the tart catalog regardless of prefix or state. `tartVMExists` and the tart stop branch in `VMLifecycle.swift` route through `vmExists`; `runList`/`parseList` (filtered to `testanyware-*` running clones) is reserved for `vm list` display only. Non-prefixed tart ids are now addressable by all lifecycle operations.
- id: starttart-removes-stale-clones-before-tart-clone
  title: startTart removes stale clones before tart clone
  body: |
    `startTart`'s collision branch always removes the stale clone before calling `tart clone`. Before this fix, a persisted macOS VM left a stale clone that caused `tart clone` to fail silently for Linux targets.
- id: vm-list-omits-non-prefix-id-vms
  title: vm list shows non-prefix running VMs with spec sidecar
  body: |
    vm list surfaces "adopted" tart VMs: non-prefix names that are running AND have a spec sidecar under <vmsDir>/<name>.json. Populated from sidecar (agent, vnc, pid, platform); missing meta degrades pid to nil. Non-running or sidecar-absent non-prefix VMs remain invisible. Adopted entries flow through the same VMListFormatter codepath, preserving column-width parity.
- id: usr-local-bin-testanyware-symlink-requires-manual-rebuild
  title: /usr/local/bin/testanyware symlink requires manual rebuild
  body: |
    `/usr/local/bin/testanyware` is a symlink to a specific `swift build -c release` output artifact. Commits to the repo are not reflected until the binary is rebuilt (`swift build -c release`) and the symlink updated. A discrepancy between `swift test` results and live `testanyware` behavior indicates a stale symlink.
- id: enrichrunningfromsidecar-covers-tart-and-qemu-platform-column-not-yet-enriched
  title: enrichRunningFromSidecar populates platform from spec sidecar
  body: |
    `enrichRunningFromSidecar` is platform-agnostic: it enriches tart running entries (via vm list) and QEMU running entries (via `QEMURunner.scanClonesDir`). It populates `agent`, `vnc`, `pid`, and `platform` columns from spec sidecars. When `platform` is `"unknown"`, it is overwritten from `spec.platform`; existing non-unknown values are preserved.
