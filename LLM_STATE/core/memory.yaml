entries:
- id: darwin-pipe-eof-requires-all-write-fd-holders-to-exit
  title: Darwin pipe EOF requires all write-FD holders to exit
  body: |
    `readDataToEndOfFile()` blocks until every process holding the write end of the pipe exits, not just the direct child. Long-lived bash descendants inherit the write FD and prevent EOF from ever arriving.
- id: processrunner-uses-temp-file-capture-not-pipes
  title: ProcessRunner uses temp-file capture, not pipes
  body: |
    `TestAnywareAgent.ProcessRunner` writes stdout/stderr to temp files instead of pipes. This removes the all-holders-must-exit invariant and is the correct pattern for capturing output from commands that spawn subprocesses.
- id: foundation-process-does-not-call-setsid-or-setpgrp
  title: Foundation Process does not call setsid or setpgrp
  body: |
    `Process` leaves children in the same process group as the parent. When bash exits, its children are reparented to launchd; the process tree is unrecoverable at that point.
- id: pgrep-p-snapshot-must-precede-killing-bash
  title: pgrep -P snapshot must precede killing bash
  body: |
    Take a `pgrep -P <pid>` snapshot before terminating bash. Descendants reparented to launchd after bash exits cannot be found by PID tree traversal afterward.
- id: process-tree-kill-after-exec-is-best-effort
  title: Process-tree kill after exec is best-effort
  body: |
    Descendants spawned between the `pgrep -P` snapshot and the kill signal can leak as orphans. Foundation `Process` cannot place children in their own process group, so there is no race-free solution.
- id: testanyware-vm-stop-requires-explicit-vm-id
  title: testanyware vm stop requires explicit VM id
  body: |
    `testanyware vm stop` takes a required VM id; no auto-discovery because QEMU has no registry. VNC viewer close is handled in Swift by `VMLifecycle.stop`.
- id: urlsession-timeout-must-exceed-agent-exec-deadline
  title: URLSession timeout must exceed agent exec deadline
  body: |
    `AgentTCPClient` passes `timeout + 10s` to URLSession for exec calls. If URLSession and the agent deadline are equal, URLSession can fire first and report a client-side timeout before the agent's `timedOut: true` response arrives.
- id: exec-http-response-carries-timedout-field
  title: exec HTTP response carries timedOut field
  body: |
    The `/exec` response includes `timedOut: Bool` to distinguish a deadline-expired run from a non-zero exit code. A timed-out exec returns `timedOut: true` and `exitCode: -1`.
- id: ocr-dispatch-vision-in-process-on-macos-bridged-on-others
  title: 'OCR dispatch: Vision in-process on macOS, bridged on others'
  body: |
    `TestAnywareServer` sends `/ocr` to `Vision.framework` in-process on macOS. On Linux and Windows it uses `OCRChildBridge`, a stdin/stdout JSON protocol to a Python EasyOCR daemon started with `--daemon`. Set `TESTANYWARE_OCR_FALLBACK=1` to force the bridge path on macOS.
- id: exec-fix-works-for-long-running-commands-in-vm
  title: exec handles long-running VM commands correctly
  body: |
    Long-running commands (e.g. package installs) exit cleanly with correct exit codes. No golden rebuild is needed for exec-only verification; scp + launchctl unload/load against a running tart VM suffices.
- id: agent-hot-swap-does-not-re-grant-tcc-accessibility
  title: Agent hot-swap does not re-grant TCC accessibility
  body: |
    Replacing `/usr/local/bin/testanyware-agent` and reloading the LaunchAgent leaves `/health` returning `accessible: false`. TCC pins the grant to the original binary's csreq (CDHash for adhoc-signed binaries). Exec, upload, and download still work; AX tests require a golden rebuild or explicit TCC re-grant.
- id: vm-start-sh-writes-xdg-compliant-connect-spec-per-vm
  title: vm-start.sh writes XDG-compliant connect spec per VM
  body: |
    vm-start.sh writes spec + meta sidecar under $XDG_STATE_HOME/testanyware/vms/<id>/; vm-stop.sh removes it. Each VM gets its own directory; concurrent vm-start.sh runs are safe.
- id: vm-ids-use-testanyware-hex8-format
  title: VM ids use testanyware-<hex8> format
  body: |
    `vm-start.sh` generates `testanyware-<hex8>` identifiers for each VM clone. All lifecycle scripts and the Swift CLI use this id to address a specific VM.
- id: cli-vm-resolution-connect-vm-flags-env-error
  title: 'CLI VM resolution: --connect → --vm → flags → env → error'
  body: |
    `ConnectionOptions.resolve()` tries in order: `--connect` (explicit spec path), `--vm` (named id), explicit host/port flags, `TESTANYWARE_VM_ID` env var, XDG connect-spec file, then error. Subshells and fresh terminals can pick up the running VM without explicit plumbing.
- id: testanyware-paths-sh-is-shared-by-lifecycle-scripts
  title: _testanyware-paths.sh is shared by lifecycle scripts
  body: |
    All VM lifecycle shell scripts source `_testanyware-paths.sh` for consistent XDG path computation. Scripts are normal subprocesses, not sourced fragments.
- id: xdg-state-holds-ephemeral-vm-files-data-holds-persistent-files
  title: XDG state holds ephemeral VM files; data holds persistent files
  body: |
    VM spec and meta sidecar files are written under `$XDG_STATE_HOME/testanyware/vms/` and removed by `vm-stop.sh`. Clone directories and golden images are written under `$XDG_DATA_HOME/testanyware/` and persist across VM lifecycle.
- id: findtextcommand-delegates-ocr-to-server
  title: FindTextCommand delegates OCR to server
  body: |
    `FindTextCommand` calls the server's `/ocr` endpoint rather than Vision.framework in-process. The command has no platform-specific code; OCR platform selection happens entirely in `TestAnywareServer`.
- id: vm-spec-meta-writers-use-temp-file-chmod-0600-replaceitemat
  title: VM spec/meta writers use temp-file, chmod 0600, replaceItemAt
  body: |
    `VMMeta.writeAtomic(to:)` and `VMSpec.writeAtomic(to:)` write JSON to a sibling `.tmp` file, chmod it to 0600, then call `replaceItemAt` with a `moveItem` fallback. All VM-owned files are readable only by the owner.
- id: vmmeta-pid-and-vmspec-platform-are-non-optional
  title: VMMeta.pid and VMSpec.platform are non-optional
  body: |
    `VMMeta.pid` is `Int` (not `Int?`) and `VMSpec.platform` is `Platform` (not `Platform?`). bash-written files with null fields get rewritten on next run; Swift-side creation always supplies real values.
- id: vmspec-wraps-vncspec-agentspec-platform-directly
  title: VMSpec wraps VNCSpec, AgentSpec, Platform directly
  body: |
    `VMSpec` holds `vnc: VNCSpec`, `agent: AgentSpec?`, and `platform: Platform` without duplicating those types. Changes to `VNCSpec`/`AgentSpec` propagate automatically; do not introduce parallel wrapper types.
- id: all-vm-tests-use-swift-testing-not-xctest
  title: All VM tests use swift-testing, not XCTest
  body: |
    Unit tests (`VMPathsTests`, `VMMetaTests`, `VMSpecTests`) and integration tests (`VMLifecycleTests`) use swift-testing (`@Test`, `#expect`). XCTest and swift-testing cannot coexist in the same target. Plan sketches referencing XCTest for this suite are incorrect.
- id: virtiofs-can-serve-stale-cached-content
  title: VirtioFS can serve stale cached content
  body: |
    VirtioFS does not always propagate host-side file updates to the guest immediately. TestAnyware does not configure VirtioFS itself — the bug bites when callers stack a tart `--dir` mount on top of a TestAnyware VM. Workaround: bypass the share with `testanyware upload <local> <remote>` / `testanyware download <remote> <local>`, which transfer bytes over the in-VM HTTP agent on port 8648 and never touch the shared-folder cache. Restarting the VM also clears the cache. Do not rely on VirtioFS for files edited on the host and read back in the VM within the same session. Documented in `docs/user/troubleshooting.md`.
- id: menu-bar-accessibility-tree-is-lazy
  title: Menu bar accessibility tree is lazy
  body: |
    `testanyware agent snapshot --window "Menu Bar"` only exposes top-level menu bar items. Submenus do not appear until the menu is open. Use `testanyware agent snapshot --open-menu <path>` to click the named menu item via VNC (400 ms settle), then capture; the menu is left open for follow-up `agent press` commands. `<path>` is a comma-separated label sequence for submenu drill-down (e.g., `"File,Open Recent"`); each segment clicks the matching item, re-snapshots at increasing depth, then proceeds to the next. The 400 ms settle delay is best-effort — may need tuning if submenus are not yet populated at snapshot time.
- id: vmtypes-swift-extends-platform-instead-of-defining-vmplatform
  title: VMTypes.swift extends Platform instead of defining VMPlatform
  body: |
    Platform enum (in VM/VMTypes.swift) has defaultBase: String and backend: VMBackend properties. No VMPlatform type exists; plan text using VMPlatform(rawValue:) should be read as Platform(rawValue:).
- id: ocrchildbridge-tempfilecleanedupaftercall-is-flaky-under-parallel-tests
  title: OCRChildBridge tempFileCleanedUpAfterCall is flaky under parallel tests
  body: |
    `OCRChildBridgeTests.tempFileCleanedUpAfterCall` scans `NSTemporaryDirectory()` for leftover `testanyware-ocr-*.png` files, so a parallel OCR test writing its own temp PNG can cause a false failure. Passes in isolation. Not a regression; do not chase.
- id: tartrunner-swallows-external-schema-errors-at-the-boundary
  title: TartRunner swallows external-schema errors at the boundary
  body: |
    `TartRunner.parseList` returns `[]` on malformed JSON or schema mismatch, and `runList` returns `[]` on non-zero exit or a missing `tart` binary. Deliberate: a future `tart list --format json` upgrade must not break `testanyware vm list`. The leniency lives only at the tart boundary — internal Swift parsers stay strict. `parseVNCURL`, by contrast, throws `TartRunnerError.vncURLMalformed` because a bad VNC URL means we cannot connect at all, so the caller must know.
- id: tartrunner-tartvm-uses-codingkeys-for-pascalcase-json
  title: TartRunner.TartVM uses CodingKeys for PascalCase JSON
  body: |
    The private `TartVM` Decodable struct in `TartRunner.swift` declares properties in camelCase (`name`, `state`, `disk`) and maps them to tart's `Name`/`State`/`Disk` keys via `CodingKeys`. Mirrors VMMeta's `clone_dir` → `cloneDir` mapping. Do not reintroduce PascalCase Swift properties to match the JSON verbatim; it triggers Swift linter warnings.
- id: vmlistformatter-column-widths-are-byte-for-byte-parity-with-vm-list-sh
  title: VMListFormatter column widths are byte-for-byte parity with vm-list.sh
  body: |
    `VMListFormatter.render` reproduces `scripts/macos/vm-list.sh`'s printf format strings exactly: goldens `"  %-8s %-40s %-8s %s"`, running `"  %-20s %-8s %-30s %-24s PID %s"`. Nil `sizeGB` renders as `"? GB"`; nil `pid` renders as `"?"`. Changing widths breaks downstream grep/awk consumers.
- id: vm-list-calls-tartrunner-runlist-once-and-partitions
  title: vm list calls TartRunner.runListAll once
  body: |
    VMCommand.List.run() calls TartRunner.runListAll() once — one tart list --format json subprocess returning both a partitioned VMListEntry view and a [TartVMSummary] full catalog. adoptedRunning(allVMs:paths:knownNames:) uses the full catalog to discover non-prefix running VMs with spec sidecars. One subprocess call is deliberate; two would be redundant.
- id: vm-list-start-stop-delete-sh-are-thin-exec-wrappers
  title: vm-list/start/stop/delete.sh are thin exec wrappers
  body: |
    vm-list.sh, vm-start.sh, vm-stop.sh, and vm-delete.sh each exec testanyware vm <subcommand> "$@". Logic lives in VM/QEMURunner.swift, TartRunner.swift, and VMListFormatter.swift. Column-width parity is preserved for grep/awk consumers.
- id: task-sleep-cross-executor-cancel-crashes-in-o-builds
  title: Task.sleep cross-executor cancel crashes in -O builds
  body: |
    Cancelling `Task.sleep(for: Duration)` from a different executor in optimised builds triggers a `swift_task_dealloc` LIFO violation → SIGABRT. Fix: use a monotonic epoch counter; bump it to invalidate in-flight sleeps; each fire-and-forget task checks epoch on wake and no-ops if stale.
- id: recordingtask-uses-cancel-sleep-pattern-latent-crash-risk
  title: recordingTask uses epoch-counter pattern, not Task.cancel
  body: |
    `recordingEpoch: UInt64` actor-isolated field; `handleRecordStart` bumps and captures the epoch before launching the detached loop; the loop checks `isRecordingEpochCurrent(_:)` on each iteration and breaks on stale epoch; `finishRecording()` and `shutdown()` bump the epoch instead of calling `recordingTask?.cancel()`. `recordingTask` is still nil-tested in `handleRecordStart` as the "is recording active?" guard — it is not used to terminate the running loop. See `task-sleep-cross-executor-cancel-crashes-in-o-builds`.
- id: macos-ps-does-not-support-the-sid-keyword
  title: macOS ps does not support the sid keyword
  body: |
    `ps -o sid=` works on Linux but not on macOS — `ps` rejects it with "keyword not found" (valid alternatives: `sess`, `pgid`, `tpgid`). For session-ID assertions in Swift, call `Darwin.getsid(pid_t(pid))` on the child while it's still alive. The `DetachedProcessTests.spawnsAProcessInItsOwnSession` test uses this pattern. Do not reintroduce `ps -o sid`.
- id: detachedprocess-is-the-setsid-escape-hatch
  title: DetachedProcess is the setsid escape hatch
  body: |
    `VM/DetachedProcess.swift` uses `posix_spawn` + `POSIX_SPAWN_SETSID` to spawn children that are session + process-group leaders. See `Foundation Process does not call setsid or setpgrp` and `pgrep -P snapshot must precede killing bash` for the underlying problem. Use `DetachedProcess.spawn` for any VM-lifecycle child that must outlive the Swift parent. Do not substitute Foundation `Process` for long-running VM processes.
- id: vmlifecycle-delete-auto-detects-backend-refuses-if-clones-present
  title: VMLifecycle.delete auto-detects backend; refuses if clones present
  body: |
    `VMLifecycle.delete(name:force:)` picks tart if the name appears in `TartRunner.runList()`, else QEMU if a `.qcow2` exists. Refuses with `runningClonesPresent` when live clones are detected unless `--force` is passed. Error cases: `goldenNotFound`, `runningClonesPresent`, `tartDeleteFailed`. No `.notFound` case — mirror `VMLifecycleError.stopFailed` precedent.
- id: backingfile-uses-qemu-img-info-json-not-python3
  title: backingFile uses qemu-img info JSON, not python3
  body: |
    `QEMURunner.backingFile(ofQcow2:)` runs `qemu-img info --output=json` and parses the result with `JSONSerialization`. Replaces the bash approach of `python3 -c`. Path to `qemu-img` discovered via `TartRunner.which("qemu-img")` with homebrew fallback — consistent with `QEMURunner.start` pattern.
- id: 2-qemu-integration-tests-fail-from-swtpm-sun-path-limit
  title: 2 QEMU integration tests fail from swtpm sun_path limit
  body: |
    `QEMURunnerIntegrationTests` has 2 pre-existing failures caused by macOS `sun_path` length limit for the swtpm socket path. Tracked as backlog Task 12; independent of all other work. A passing suite shows 270/272; treat 2 QEMU integration failures as expected baseline.
- id: qemurunner-discovers-vms-by-directory-scan
  title: QEMURunner discovers VMs by directory scan
  body: |
    `QEMURunner` finds golden images by scanning `$XDG_DATA_HOME/testanyware/goldens/` for `.qcow2` files, and running clones by scanning `$XDG_DATA_HOME/testanyware/clones/` subdirectories for a `monitor.sock` file. No registry; presence of the socket means the VM is live.
- id: tart-vnc-url-appends-trailing-ellipsis
  title: tart vnc-url appends trailing ellipsis
  body: |
    `tart`'s `vnc-url` subcommand appends `...` to URLs to indicate truncation. `TartRunner.parseVNCURL` strips the trailing `...` before handing the string to `URL(string:)`. Raw tart output is not a valid URL.
- id: vncviewer-uses-applescript-no-unit-tests
  title: VNCViewer uses AppleScript; no unit tests
  body: |
    `VM/VNCViewer.swift` opens, captures a window reference, and closes VNC Viewer via AppleScript. Unit tests are explicitly excluded from the plan for this file — AppleScript UI automation cannot be exercised without a live display.
- id: testhealthserver-uses-raw-bsd-sockets
  title: TestHealthServer uses raw BSD sockets
  body: |
    TestHealthServer (AgentHealthWaiterTests.swift) binds and accepts connections via BSD socket calls directly, without URLSession or NWListener.
- id: kill-pid-0-probes-pid-ownership-before-sigterm
  title: kill(pid, 0) probes pid ownership before SIGTERM
  body: |
    `VMLifecycle.stop` calls `kill(pid, 0)` before sending `SIGTERM`. A zero-signal kill fails if the pid has been recycled, preventing an unintended signal to a wrong process. Omitting this step is a correctness bug.
- id: p3-plan-code-sketches-use-outdated-constructors
  title: P3 plan code sketches use outdated constructors
  body: |
    VNCSpec and AgentSpec init signatures in P3 plan sketches differ from the landed Swift implementations. Cross-reference: "VMTypes.swift extends Platform instead of defining VMPlatform" and "VMSpec wraps VNCSpec, AgentSpec, Platform directly". Treat all P3/P4 plan code as guidance; compile-check against landed types before use.
- id: vmlifecycleerror-has-stopfailed-not-notfound
  title: VMLifecycleError has stopFailed, not notFound
  body: |
    `VMLifecycle.stop` throws `VMLifecycleError.stopFailed` for absent tart VMs. No `.notFound` case exists. Plan sketches expecting `.notFound` are incorrect.
- id: swift-testing-lifecycle-tests-use-do-cleanup-on-throw-guard
  title: swift-testing lifecycle tests use do/cleanup-on-throw guard
  body: |
    swift-testing has no `setUp`/`tearDown` hooks. `VMLifecycleTests` uses a do block: start the VM, assert, then run cleanup on both the success path and any throw path before re-throwing. Works uniformly across all lifecycle tests without per-test teardown.
- id: linux-tart-vms-boot-38-faster-than-macos
  title: Linux tart VMs boot ~38% faster than macOS
  body: |
    Smaller disk + lighter desktop: Linux round-trip is ~11.7 s vs macOS ~19 s. Set integration test time limits accordingly; the current 5-minute limit has headroom on both platforms.
- id: vmlifecycle-stop-runs-vnc-viewer-close-for-missing-ids
  title: VMLifecycle.stop runs VNC-viewer close for missing ids
  body: |
    `VMLifecycle.stop` executes the VNCViewer close prelude even when the tart VM id does not exist. The TCC gate short-circuits the rest; no user-visible failure, but the path is longer than necessary.
- id: ax-walker-descends-through-nsstackview-correctly
  title: AX walker descends through NSStackView correctly
  body: |
    AXElementWrapper traverses NSStackView children without barriers. Anonymous NSTextField instances inside NSStackView lack AX labels; label() falls through to kAXPlaceholderValueAttribute when both title and description are empty.
- id: set-value-index-is-1-based-0-returns-notfound
  title: set-value --index is 1-based; 0 returns .notFound
  body: |
    `--index 0` always returns `.notFound`. Users encountering "Multiple elements matched" must pass `--index 1` (or higher). Zero is not a valid index value.
- id: window-flag-includes-drop-shadow-in-ax-origin
  title: '`--window` auto-compensates Tahoe 40 px drop-shadow'
  body: |
    On Tahoe, the AX-reported window origin includes a ~40 px structural drop-shadow inset on the y axis. `WindowOriginCompensation.offset(for:platform:environment:)` (`cli/Sources/TestAnywareDriver/Agent/WindowOriginCompensation.swift`) subtracts `defaultMacosTopInset` (40 px) from the window's y position for `.macos` platform; non-macOS and nil platforms pass through unchanged. All six `--window`-relative input commands (click, mouse-down, mouse-up, move, scroll, drag) share a single async `windowOffset(connection:spec:windowFilter:)` helper that applies this compensation. Override via `TESTANYWARE_WINDOW_TOP_INSET=<int>`. Validated on the Tahoe golden.
- id: swift-testing-enabled-if-evaluates-at-discovery-time
  title: swift-testing .enabled(if:) evaluates at discovery time
  body: |
    `.enabled(if:)` conditions on a `@Test` or `@Suite` are evaluated when the test runner discovers tests, not at execution time. Use it for TCC checks and env-var gates; do not rely on runtime guards inside the test body for skipping.
- id: testanyware-agent-lacks-tcc-documents-access-on-tahoe-golden
  title: macOS golden script grants accessibility and FDA to agent
  body: |
    `vm-create-golden-macos.sh` grants both `kTCCServiceAccessibility` and `kTCCServiceSystemPolicyAllFiles` (FDA) to the agent binary; the function is named `grant_tcc_permissions()`. Goldens built before this change lack FDA: `testanyware exec ls /Users/admin/Documents/` triggers a TCC privacy dialog on pre-fix goldens. Rebuild the golden to get the FDA grant.
- id: unifiedrole-swift-is-duplicated-both-copies-must-stay-in-sync
  title: UnifiedRole.swift is duplicated; both copies must stay in sync
  body: |
    `UnifiedRole.swift` exists in both the CLI target and the agent-side target. Adding or removing a `UnifiedRole` case requires updating both files. `TestAnywareAgentProtocolTests` checks all six files in the `TestAnywareAgentProtocol` module for byte-level identity and will fail if either copy diverges. The shared-module approach was rejected because `agents/macos/Package.swift` forbids path-dependencies on `cli/`.
- id: qemumonitorclient-speaks-hmp-via-nc-u-not-nwconnection
  title: QEMUMonitorClient speaks HMP via nc -U, not NWConnection
  body: |
    `QEMUMonitorClient.send` pipes `command\n` through `/bin/sh -c "(printf ...; sleep) | /usr/bin/nc -U $sock"`, with the command, timeout, and socket path passed as positional `sh -c` args (`$1`, `$2`, `$3`). Matches the original bash byte-for-byte and avoids `Network.framework`'s idiosyncratic Unix-socket semantics. When the subshell's sleep expires, the pipe EOFs, nc closes its end, QEMU sees EOF and flushes — giving a clean response terminus without prompt sniffing. Pure parsers (`parseAgentPort`, `parseVNCPort`) are `static` for unit testability.
- id: qemu-backend-uses-detachedprocess-for-qemu-foundation-process-for-swtpm
  title: QEMU backend uses DetachedProcess for qemu, Foundation Process for swtpm
  body: |
    `QEMURunner.start` spawns the `qemu-system-aarch64` binary via `DetachedProcess` (posix_spawn + SETSID) so the VM outlives the parent cleanly. swtpm, by contrast, goes via a plain Foundation `Process` run synchronously because it daemonises itself (`--daemon`) and exits — there's nothing for the parent to hold open.
- id: swtpm-teardown-path-is-under-clone-id-tpm-not-clone-tpm
  title: swtpm teardown path is under clone/<id>-tpm, not clone/tpm
  body: |
    QEMURunner.stop locates swtpm via pgrep -f "swtpm.*<cloneDir>/<cloneName>-tpm". Using <cloneDir>/tpm/sock does not match this path and leaks an orphan swtpm process per run.
- id: swift-6-disallows-thread-sleep-in-async-contexts
  title: Swift 6 disallows Thread.sleep in async contexts
  body: |
    All three in-`async`-function delays in `QEMURunner.start` use `try? await Task.sleep(nanoseconds:)`. `Thread.sleep(forTimeInterval:)` emits `Class method 'sleep' is unavailable from asynchronous contexts` under Swift 6. Remains valid in synchronous functions like `QEMURunner.stop`.
- id: vmexists-uses-parseallvmnames-not-runlist
  title: vmExists uses parseAllVMNames, not runList
  body: |
    `TartRunner.vmExists(name:)` calls `parseAllVMNames(tartJSON:)`, which returns every name in the tart catalog regardless of prefix or state. `tartVMExists` and the tart stop branch in `VMLifecycle.swift` route through `vmExists`; `runList`/`parseList` (filtered to `testanyware-*` running clones) is reserved for `vm list` display only. Non-prefixed tart ids are now addressable by all lifecycle operations.
- id: starttart-removes-stale-clones-before-tart-clone
  title: startTart removes stale clones before tart clone
  body: |
    `startTart`'s collision branch removes the stale clone before calling `tart clone`. A stale macOS clone causes `tart clone` to fail silently when starting a Linux target.
- id: vm-list-omits-non-prefix-id-vms
  title: vm list shows non-prefix running VMs with spec sidecar
  body: |
    vm list surfaces "adopted" tart VMs: non-prefix names that are running AND have a spec sidecar under <vmsDir>/<name>.json. Populated from sidecar (agent, vnc, pid, platform); missing meta degrades pid to nil. Non-running or sidecar-absent non-prefix VMs remain invisible. Adopted entries flow through the same VMListFormatter codepath, preserving column-width parity.
- id: usr-local-bin-testanyware-symlink-requires-manual-rebuild
  title: /usr/local/bin/testanyware symlink requires manual rebuild
  body: |
    `/usr/local/bin/testanyware` is a symlink to a specific `swift build -c release` output artifact. Commits to the repo are not reflected until the binary is rebuilt and the symlink updated. A discrepancy between `swift test` results and live `testanyware` behavior indicates a stale symlink. Before brew-install testing, remove the symlink so `which testanyware` resolves to the brew-installed binary. Run `testanyware doctor` to detect the shadow scenario automatically. See `testanyware doctor detects brew-shadow install-path hazard`.
- id: enrichrunningfromsidecar-covers-tart-and-qemu-platform-column-not-yet-enriched
  title: enrichRunningFromSidecar populates platform from spec sidecar
  body: |
    `enrichRunningFromSidecar` is platform-agnostic: it enriches tart running entries (via vm list) and QEMU running entries (via `QEMURunner.scanClonesDir`). It populates `agent`, `vnc`, `pid`, and `platform` columns from spec sidecars. When `platform` is `"unknown"`, it is overwritten from `spec.platform`; existing non-unknown values are preserved.
- id: open-menu-settle-delay-is-hardcoded-at-400ms
  title: open-menu settle delay is hardcoded at 400ms
  body: |
    The `--open-menu` flag in `testanyware agent snapshot` uses a hardcoded 400 ms settle delay after each VNC click before capturing the AX tree. Validated on the Tahoe golden: comma-path drill-down navigates submenus and snapshots correctly at 400 ms. If future VMs show submenus not yet populated at snapshot time, fix options are:
    - Add a `--menu-settle-ms <int>` option to `AgentSnapshotCmd` (trivial — one `@Option` in `AgentCommand.swift`)
    - Replace the fixed sleep with a poll-and-retry loop on the AX tree

    Code location: `cli/Sources/testanyware/AgentCommand.swift` — `openMenuBarPath(rawPath:)`.
- id: ssh-disabled-in-both-tart-golden-images
  title: SSH disabled in both tart golden images
  body: |
    Both tart goldens disable SSH at golden-build time. `VMSpec.ssh`, `sshReady`, and all `sshEndpoint` plumbing are removed from the Swift CLI. The formerly ~11s macOS SSH-readiness poll in `startTart` is eliminated. Old spec files carrying an `ssh` field still decode correctly (`JSONDecoder` ignores unknown keys). The timing numbers in `linux-tart-vms-boot-38-faster-than-macos` predate SSH removal.
- id: macos-golden-folds-ssh-off-into-shutdown-call
  title: macOS golden folds SSH-off into shutdown call
  body: |
    `vm-create-golden-macos.sh` passes `systemsetup -f -setremotelogin off` in the same `vm_ssh` call as the System Events shutdown command. A separate call would risk the SSH session dying mid-flight after SSH is disabled, before shutdown completes.
- id: linux-golden-masks-ssh-service-to-block-re-enable
  title: Linux golden masks ssh.service to block re-enable
  body: |
    `vm-create-golden-linux.sh` runs `systemctl disable ssh.service && systemctl mask ssh.service && shutdown` in a single SSH call. `mask` writes a `/dev/null` symlink; `systemctl enable` cannot re-enable it. `disable` alone is insufficient.
- id: decodeslegacyspecwithsshfield-guards-ssh-removal-compat
  title: decodesLegacySpecWithSshField guards ssh-removal compat
  body: |
    `VMSpecTests.decodesLegacySpecWithSshField` verifies old spec files with an `ssh` field still decode without error. `JSONDecoder` ignores unknown keys by default; this test will catch any future migration to a strict decoder.
- id: homebrew-formula-bundles-cli-agents-and-scripts-in-one-tarball
  title: Homebrew formula bundles CLI, agents, and scripts in one tarball
  body: |
    Single-tarball bundle covers CLI binary, all three agents (macOS arm64, Linux, Windows), and golden scripts. Eliminates per-artifact `gh release download` dependency. Ad-hoc signing only; arm64-only macOS distribution. Tap: `Linkuistics/homebrew-taps`.

    Release pipeline scripts:
    - `scripts/release-doctor.sh` — preflight checks (git clean, tools present)
    - `scripts/release-build.sh` — builds CLI (`swift build`) + macOS agent, Windows agent (`dotnet publish`), stages Linux agent source; packages into `.tar.xz`; renders formula from template
    - `scripts/release-publish.sh` — creates GitHub release via `gh`, copies rendered formula into tap
    - `scripts/templates/testanyware.rb.tmpl` — single-tarball Homebrew formula template

    Plan: `0-docs/plans/HomebrewDistribution.plan.md`.
- id: golden-scripts-resolve-agent-cli-from-brew-prefix-by-default
  title: golden scripts resolve agent/CLI from brew prefix by default
  body: |
    `vm-create-golden-macos.sh`, `vm-create-golden-linux.sh`, and `vm-create-golden-windows.sh` resolve agent and CLI binaries from `$(brew --prefix testanyware)/share/testanyware/agents/<platform>/...` by default. All in-script `swift build`, `dotnet publish`, `_PROJECT_ROOT`, and `_PROJECT_DIR` references are removed.

    Contributor override: set `TESTANYWARE_AGENT_BIN_OVERRIDE` (path to the agent binary) and/or `TESTANYWARE_CLI_BIN_OVERRIDE` (path to the CLI binary) before running a golden script to bypass the brew-prefix resolution. Both vars are independent.
- id: tcc-csreq-correctness-for-brew-installed-agent-is-unverified
  title: 'TCC-csreq verified: brew-installed agent retains TCC after golden grants it'
  body: |
    When the in-VM agent binary arrives via `brew install testanyware` rather than `swift build`, its CDHash changes. TCC pins accessibility grants to the original binary's csreq (CDHash for adhoc-signed binaries). The golden-build scripts grant TCC (accessibility + FDA) to the brew-installed binary's CDHash during golden creation; the VM boots with TCC already pinned to the correct binary. No re-grant required at run time.

    See also: `agent-hot-swap-does-not-re-grant-tcc-accessibility` (direct binary replacement case) and `testanyware-agent-lacks-tcc-documents-access-on-tahoe-golden` (FDA grant in golden).
- id: build-cli-must-bundle-libroyalvnckit-dylib-with-the-binary
  title: build_cli must bundle libRoyalVNCKit.dylib with the binary
  body: |
    RoyalVNCKit is a dynamic library by design (required by its `Bindings/{dotnet,kotlin}/` consumers). `swift build` outputs `libRoyalVNCKit.dylib` alongside the CLI binary. `release-build.sh`'s `build_cli` function must copy `libRoyalVNCKit.dylib` into `bin/` alongside the CLI; the formula's install block must use `bin.install Dir["bin/*"]`. Omitting the dylib causes `dyld: Library not loaded: @rpath/libRoyalVNCKit.dylib` at runtime on a brew-installed CLI.
- id: release-build-sh-captured-functions-must-write-progress-to-stderr
  title: release-build.sh captured functions must write progress to stderr
  body: |
    Subshells capturing return values via `$(...)` receive all stdout. Progress `echo` calls inside such functions, and `swift build` / `dotnet publish` invocations, must redirect output to `>&2`. Without this, dotnet's first-run welcome banner pollutes the captured archive path and causes `sha256sum` to fail.
- id: brew-audit-non-executable-warning-in-bin-is-harmless
  title: brew audit non-executable warning in bin is harmless
  body: |
    `bin.install Dir["bin/*"]` places `libRoyalVNCKit.dylib` in Homebrew's `bin/` directory alongside the CLI binary. `brew audit` emits a non-fatal warning about a non-executable file in `bin/`. The warning is cosmetic and harmless.
- id: release-build-sh-generates-version-swift-from-git-describe
  title: release-build.sh generates Version.swift from git describe
  body: |
    `cli/scripts/generate-version.sh` shells out to `git describe --tags --always --dirty` and writes `cli/Sources/testanyware/Version.swift`. `release-build.sh` calls this script before `swift build` and reverts the file on EXIT (trapping both success and failure paths). Non-release builds leave the dev-stub values unchanged.
- id: brew-tap-force-push-rebase-corruption
  title: brew-tap-force-push-rebase-corruption
  body: |
    Never force-push to a Homebrew tap once it has been installed by real users (including the maintainer's own host). Force-pushing leaves every user's local `/opt/homebrew/Library/Taps/<tap>/` clone stuck in a rebase replaying its now-deleted local commit. `brew update` cannot recover automatically. Manual recovery: `cd /opt/homebrew/Library/Taps/linkuistics/homebrew-taps && git rebase --abort && git reset --hard origin/main`.

    If a bad release needs retraction, publish a corrected release (bump the version) rather than force-pushing. Only force-push a tap that has zero real-user installs (pre-first-release development).
- id: open-menu-deep-path-untested
  title: open-menu-deep-path-untested
  body: |
    The `--open-menu` 400 ms per-segment settle delay is validated for depth ≤ 2 (single-level and two-level menu paths). Three-or-more-segment paths are untested; macOS may defer lazy-loading of deeply nested items beyond 400 ms.

    If a 3+ segment `--open-menu` path fails (submenu not populated at snapshot time): add `--menu-settle-ms <int>` to `AgentSnapshotCmd` (one `@Option` in `cli/Sources/testanyware/AgentCommand.swift`, `openMenuBarPath(rawPath:)`) or replace the fixed sleep with a poll-and-retry loop.
- id: testanyware-doctor-detects-brew-shadow-install-path-hazard
  title: testanyware doctor detects brew-shadow install-path hazard
  body: |
    `testanyware doctor` checks whether `/usr/local/bin/testanyware` (a dev symlink) shadows the Homebrew-installed binary. Uses raw `which` output — not `realpath` — so the remediation hint names the symlink itself (`sudo rm /usr/local/bin/testanyware`). Exits non-zero when a problem is detected. See `usr-local-bin-testanyware-symlink-requires-manual-rebuild` for the underlying hazard.
- id: diagnostics-module-uses-classify-run-split-for-testability
  title: Diagnostics module uses classify/run split for testability
  body: |
    `cli/Sources/TestAnywareDriver/Diagnostics/` holds install-path and future doctor checks. Each check uses a classify/run split: `classify` is a pure function (no I/O, unit-testable without a real Homebrew install), `run` is the subprocess-driven entry point. `DoctorCommand.swift` is a thin ArgumentParser wrapper. Add new checks to this directory without redesigning `DoctorCommand`.
- id: doctor-ocrstatusfile-clear-on-recovery-is-aspirational-not-yet-wired
  title: 'Doctor: OCRStatusFile clear-on-recovery is aspirational (not yet wired)'
  body: |
    `OCRStatusFile.swift` line 4 carries an aspirational comment stating the file is "cleared by `testanyware doctor` on recovery" — this wiring was never implemented.

    Strategic intent: a future doctor check should clear a degraded OCR status file on recovery, giving users a self-service path out of a stuck OCR state. The OCR status infrastructure is in place; the doctor wiring is not.

    Design note: new doctor checks go in `cli/Sources/TestAnywareDriver/Diagnostics/` using the classify/run split pattern (see `diagnostics-module-uses-classify-run-split-for-testability`). The check would read the OCR status file, detect a degraded flag, clear it, and print a remediation message.
- id: bundledagentscheck-verifies-three-agent-slots-under-brew-prefix
  title: BundledAgentsCheck verifies three agent slots under brew prefix
  body: |
    `BundledAgentsCheck` verifies three agent slots under `$(brew --prefix testanyware)/share/testanyware/agents/`: `macos/testanyware-agent` (executable bit required), `windows/testanyware-agent.exe` (presence only), `linux/testanyware_agent/__main__.py` (presence only). Returns `noHomebrew` verdict when Homebrew is absent, skipping the check entirely. Hard failure: any slot missing or non-executable.
- id: toolavailabilitycheck-is-advisory-missing-tools-don-t-fail-doctor
  title: ToolAvailabilityCheck is advisory; missing tools don't fail doctor
  body: |
    `ToolAvailabilityCheck` probes `tart`, `qemu-system-aarch64`, and `swtpm` via `which`, then runs `--version` probes for `tart` (floor 2.0.0) and `qemu-system-aarch64` (floor 8.0.0). Advisory only: `isOK` stays `true` regardless of what is missing or below the version floor. Missing or out-of-date tools surface under the "Host tools" section with `!` prefix and an install/upgrade hint, but do not cause `testanyware doctor` to exit non-zero. `versionProbe` closure is injectable for deterministic testing.
- id: doctor-exits-non-zero-only-for-install-path-or-bundled-agent-failures
  title: doctor exits non-zero for install-path, bundled-agents, bundled-scripts, or provisioner-scripts
  body: |
    `testanyware doctor` exits non-zero when `InstallPathCheck`, `BundledAgentsCheck`, `BundledScriptsCheck`, or `ProvisionerScriptsVersionCheck` flag a hard issue. `ToolAvailabilityCheck` ("Host tools") failures are advisory only — they never contribute to a non-zero exit.
- id: bundledscriptscheck-verifies-scripts-and-helpers-under-brew-prefix
  title: BundledScriptsCheck verifies scripts and helpers under brew prefix
  body: |
    `BundledScriptsCheck` verifies bundled scripts and XML helpers under `$(brew --prefix testanyware)/share/testanyware/`. `requiresExecutable` is set per-file on `FileProbe`: scripts require the executable bit; XML helpers do not. Returns `noHomebrew` verdict when Homebrew is absent, skipping the check entirely. Hard failure when any expected file is missing or a required-executable file lacks the exec bit. Resides in `cli/Sources/TestAnywareDriver/Diagnostics/` as a sibling to `BundledAgentsCheck`.
- id: windows-qemu-cold-boot-tests-need-15-minute-timeout
  title: Windows QEMU cold-boot tests need 15-minute timeout
  body: |
    Both `startStopRoundTripWindows` and `qemuMonitorDiscoversAgentPort` in `VMLifecycleQEMUTests.swift` use `.minutes(15)`. These tests share the same cold-boot path; the limit must be applied to both — applying it to only one leaves the sibling flaky. Prior `.minutes(10)` limit was too tight for cold Windows QEMU boot.
- id: queryresolver-deduplicates-by-role-label-id-position-size
  title: QueryResolver deduplicates by role/label/id/position/size
  body: |
    `QueryResolver.dedupedByIdentity` deduplicates `--role` (and other windowed-search) results using `role | label | id | platformRole | position | size` as identity key. Coordinate-gated: elements without position/size (synthetic) pass through undeduped. When multiple matches remain after dedup, `AgentServer.swift` returns an error directing the caller to use `--index N`.
- id: findliveelement-cannot-re-match-deduped-element-via-index-n
  title: LiveElementMatcher uses dedupedByIdentity key for re-matching
  body: |
    LiveElementMatcher (`agents/macos/Sources/TestAnywareAgent/LiveElementMatcher.swift`) uses `role | label | id | platformRole | position | size` as identity key — the same key as `dedupedByIdentity`. `AgentServer.findLiveElement` delegates to it. NSStackView anonymous text fields can be relocated after a dedup-based `--index N` selection. See `QueryResolver deduplicates by role/label/id/position/size`.
- id: versionprobe-helper-deferred-until-third-tool-needs-version-aware-check
  title: VersionProbe helper deferred until third tool needs version-aware check
  body: |
    Consider a shared `VersionProbe` helper when a third tool needs version-aware checks in `ToolAvailabilityCheck`. The `--version` probe pattern (`/usr/bin/env <tool> --version` → first dotted-numeric token, ignoring year-only tokens) is already duplicated across the `tart` and `qemu-system-aarch64` checks. Current count: 2 tools. Factor into a `VersionProbe` struct when a third tool is added.

    Code location: `cli/Sources/TestAnywareDriver/Diagnostics/ToolAvailabilityCheck.swift` — `parseVersion`, `compareVersion`, and the `versionProbe: (String) -> String?` injectable closure.
- id: provisionerscriptsversioncheck-reads-min-tool-sentinels
  title: ProvisionerScriptsVersionCheck reads min-tool sentinels
  body: |
    `ProvisionerScriptsVersionCheck` reads `# testanyware-min-tool: <tool> <version>` comment lines from scanned `.sh` files and verifies installed tool versions meet declared floors. Follows classify/run split pattern. A hard check: triggers non-zero exit when a declared version floor is not met.

    Script sources: brew-bundled scripts under `$(brew --prefix testanyware)/share/testanyware/scripts/`, plus source-tree `scripts/release-build.sh` when running from a dev source tree (see `ProvisionerScriptsVersionCheck scans source-tree release-build.sh`).

    `scripts/release-build.sh` declares sentinels for swift (≥6.0) and dotnet (≥9.0). Both produce `ok`/`belowFloor` verdicts via `ProbeCustomization` entries in the check (see `ProvisionerScriptsVersionCheck ProbeCustomization handles sentinel-only tools`).
- id: brewprefixresolver-is-canonical-brew-prefix-resolver-for-diagnostics
  title: BrewPrefixResolver is canonical brew-prefix resolver for diagnostics
  body: |
    `BrewPrefixResolver` is the canonical brew-prefix resolver for all diagnostics checks in `cli/Sources/TestAnywareDriver/Diagnostics/`. It was extracted when `ProvisionerScriptsVersionCheck` was added as a fourth consumer of the brew-prefix logic.

    `BrewPrefixResolver.swift` resolves the brew prefix via `brew --prefix`, with an injectable candidates list for deterministic tests. Future diagnostic checks must not roll their own `resolveBrewPrefix` — delegate to `BrewPrefixResolver` instead. The three original duplicates (`BundledAgentsCheck`, `BundledScriptsCheck`, `InstallPathCheck`) were refactored to use it.
- id: royalvnc-ffi-is-off-the-table-on-linux
  title: RoyalVNC FFI is off the table on Linux
  body: |
    `royalvnc` FFI requires the Swift toolchain, which is a non-starter on Linux. The Rust CLI port must use a pure-Rust RFB client; no Swift bridging layer is possible. See `build_cli must bundle libRoyalVNCKit.dylib with the binary` for the Swift CLI's current RoyalVNCKit dependency.
- id: rust-port-embeds-ffmpeg-via-ffmpeg-next-crate
  title: Rust port embeds ffmpeg via ffmpeg-next crate
  body: |
    `ffmpeg-next` crate links ffmpeg as a library, not a subprocess. Recording and frame capture in the Rust CLI use this embedded path.
- id: rust-port-uses-directories-crate-for-state-paths
  title: Rust port uses directories crate for state paths
  body: |
    The `directories` crate provides `XDG_STATE_HOME` on Linux and `%LOCALAPPDATA%` on Windows. All Rust CLI state paths route through it; do not use `std::env` directly for platform state directories.
- id: rust-port-targets-linux-primary-macos-tart-is-cfg-gated
  title: Rust port targets Linux primary; macOS tart is cfg-gated
  body: |
    Linux is the primary host target for the Rust CLI. All macOS-specific tart VM paths are gated behind `#[cfg(target_os = "macos")]`. Windows is a lower-priority stretch goal.
- id: rust-cli-distributes-via-homebrew-and-cargo-dist-windows-zip
  title: Rust CLI distributes via Homebrew and cargo-dist Windows zip
  body: |
    Rust CLI distribution: Homebrew for macOS (and linuxbrew for Linux), `cargo-dist` for a Windows `.zip`. Same tap as the Swift CLI (`Linkuistics/homebrew-taps`). See `Homebrew formula bundles CLI, agents, and scripts in one tarball` for the current Swift CLI release pipeline — the Rust release pipeline is separate.
- id: swift-cli-retired-only-after-rust-reaches-parity
  title: Swift CLI retired only after Rust reaches parity
  body: |
    The Swift CLI at `cli/` coexists with the Rust workspace until Rust reaches feature parity. Retirement is task 15 of the Rust CLI port arc; do not remove Swift CLI code before that task is complete.
- id: swift-jsonencoder-emits-integer-literals-for-whole-number-doubles
  title: Swift JSONEncoder emits integer literals for whole-number Doubles
  body: |
    Swift `JSONEncoder` serializes `Double` values like `8.0` as `8`, not `8.0`. serde-json always emits `8.0`. Cross-language contract tests must use semantic value comparison (`serde_json::Value`) rather than string or byte equality.
- id: filepath-in-swift-tests-resolves-from-package-root
  title: '#filePath in Swift tests resolves from Package root'
  body: |
    `#filePath` in Swift test source resolves relative to the Swift Package root directory, not the `.swift` file location. Both Swift and Rust test suites can share the same fixture directory by constructing paths from `#filePath` on the Swift side.
- id: rust-workspace-at-cli-rs-has-three-crates
  title: Rust workspace at cli-rs/ has three crates
  body: |
    `cli-rs/` workspace contains three crates: `testanyware-protocol` (shared types + serde), `testanyware-agent-client` (HTTP client), and `testanyware-cli` (ArgumentParser equivalent). `testanyware-protocol` is the canonical source for cross-language contract fixtures shared with the Swift test suite.
- id: cli-design-contract-is-at-docs-architecture-cli-design-contract-md
  title: CLI design contract is at docs/architecture/cli-design-contract.md
  body: |
    `docs/architecture/cli-design-contract.md` is the canonical spec for the Rust CLI port. Covers: noun-first command names with verb-first aliases, frozen flag vocabulary, error-code catalogue, bucketed exit codes (0–7, slot 7 reserved for timeouts), CI gate (≥ 2 help examples per public subcommand), required discoverability commands (`capabilities`, `schema <cmd>`, `llm-instructions`), and per-command idempotency table. Schema stub files are written to `docs/reference/cli-schemas/` — see `docs-reference-cli-schemas-stubs-needed-to-unblock-contract-test`.
- id: swift-cli-gap-report-maps-failures-to-rust-port-acceptance-criteria
  title: Swift CLI gap report maps failures to Rust-port acceptance criteria
  body: |
    §10 of `docs/architecture/cli-design-contract.md` records the six axes on which the Swift CLI fails the contract (JSON coverage, help examples, error structure, verb/noun convention, behaviour gaps, discoverability) and maps each to the Rust-port acceptance criterion for the implementing task. Port-task authors read §10; no re-audit of the Swift CLI is needed.
- id: linux-agent-error-responses-use-code-details-split
  title: Linux agent error responses use code + details split
  body: |
    `accessibility.py` and `system_endpoints.py` return `{"error": "<code>", "details": "..."}`. Error codes are snake_case with no interpolation: `not_found`, `ambiguous`, `window_not_found`, `download_failed`. Callers match on `error`; `details` is diagnostic context only. The live AT-SPI2 re-location failure returns `not_found` with a `details` string explaining the snapshot-vs-live discrepancy.
- id: cli-contract-rs-is-the-rust-cli-contract-test-skeleton
  title: cli-contract.rs is the Rust CLI contract test skeleton
  body: |
    `cli-rs/crates/testanyware-cli/tests/cli-contract.rs` contains per-subcommand contract assertions keyed to §1–§11 of `docs/architecture/cli-design-contract.md`. Eight tests are now active: `binary_exists_and_top_level_help_succeeds`, `version_flag_succeeds`, `each_present_subcommand_help_succeeds`, `every_schema_id_has_a_schema_file`, `every_canonical_command_is_present`, `verb_first_aliases_match_canonical`, `synonym_aliases_match_canonical`, `each_canonical_command_help_succeeds`; 8 remain `#[ignore = "§N"]` with `todo!("filled in by <task>")`, surfacing remaining port gaps via `cargo test -- --ignored` without blocking CI. Uses `env!("CARGO_BIN_EXE_testanyware")` for binary path; schema path helpers use `CARGO_MANIFEST_DIR` to resolve `docs/reference/cli-schemas/` (same pattern as protocol crate fixture tests).
- id: canonical-commands-table-encodes-39-noun-first-commands
  title: CANONICAL_COMMANDS table encodes 39 noun-first commands
  body: |
    `CANONICAL_COMMANDS` (39 entries) in `cli-contract.rs` encodes the noun-first target surface with `mutating`, `data_producing`, and `schema_id` fields. Two alias tables cover verb-first and synonym aliases. Reusable by all §3, §6, and §9 gate tests in the contract file. See `cli-design-contract-is-at-docs-architecture-cli-design-contract-md`.
- id: docs-reference-cli-schemas-stubs-needed-to-unblock-contract-test
  title: every_schema_id_has_a_schema_file is enabled; schema stubs need real content
  body: |
    `every_schema_id_has_a_schema_file` in `cli-contract.rs` is now active (no longer `#[ignore]`). Twenty distinct stub files exist under `docs/reference/cli-schemas/<schema-id>.json`, each containing `{"schema_version": "1.0", "$comment": "TODO"}`. The test deduplicates `schema_id` values via `BTreeSet`, asserts file existence and valid JSON parse, and accumulates all failures before asserting. Evolve stubs to real JSON Schema documents as commands are ported.
- id: first-port-task-should-adopt-7-help-template-as-reference
  title: First port task should adopt §7 help template as reference
  body: |
    When the first "real" command port lands (beyond the existing stub), it should adopt the full §7 help template structure (`USAGE` / `OUTPUT` / `EXIT CODES` / `EXAMPLES` ≥ 2 / `SEE ALSO`). Doing so lets subsequent port tasks copy the pattern from an in-tree example rather than from the spec document alone.

    Best candidates (smallest scope):
    - `screen size` — smallest data-producing command
    - `agent health` — smallest agent command

    One of these ports landing with §7 template will let the `each_subcommand_help_follows_template` test in `cli-contract.rs` come off `#[ignore]` for that command, and serve as the reference for all subsequent ports.
- id: rust-cli-noun-first-surface-migration-complete
  title: Rust CLI noun-first surface migration complete
  body: |
    The clap command tree in `cli-rs/crates/testanyware-cli/src/main.rs` matches the §1 CANONICAL_COMMANDS table (39 commands). Top-level noun groups: `Screen` (capture, record, size, find-text), `File` (upload, download, exec), `Vm`, `Agent` (expanded with wait, set-value, focus, show-menu, window-focus/resize/move/close/minimize), `Capabilities`, `Schema`, `LlmInstructions`. Verb-first names retained as separate enum variants with §7.2 alias announcements. All 39 commands have stubs; behavior is not yet implemented.
- id: clap-aliases-propagates-to-help-verb-first-as-enum-member
  title: clap aliases propagates to help; verb-first as enum member
  body: |
    clap `aliases` attribute on `#[command]` propagates synonym aliases to the canonical's help body, satisfying the synonym-help-equality check in `cli-contract.rs`. Verb-first variants (e.g. `screenshot`, `record`, `screen-size`) are separate enum members with custom doc comments — this satisfies §7.2 alias-announcement without special macro machinery. Shared `Args` structs (`ConnectionArgs`, `ScreenCaptureArgs`, `ScreenRecordArgs`, etc.) deduplicate field definitions between canonical and alias variants.
- id: provisionerscriptsversioncheck-scans-source-tree-release-build-sh
  title: ProvisionerScriptsVersionCheck scans source-tree release-build.sh
  body: |
    `ProvisionerScriptsVersionCheck` locates `scripts/release-build.sh` by walking ancestor directories from the running binary's path. Brew installs naturally return nil — there is no `scripts/release-build.sh` above `<brewPrefix>/bin/`. Dev source tree runs see the script; end-user installs do not. Three tests cover the locator: happy path, absent-script path, and root-walk bound.
- id: parseversion-greedy-matches-first-dotted-token
  title: parseVersion greedy-matches first dotted token
  body: |
    `parseVersion` in `ToolAvailabilityCheck` returns the first dotted-numeric token from `--version` output. Latent hazard: any future tool added to `ToolAvailabilityCheck.knownTools` whose `--version` output leads with a non-version prefix will parse incorrectly. Currently only tart and qemu-system-aarch64 are in `knownTools`; both output version as the first token. `ProvisionerScriptsVersionCheck` uses its own `ProbeCustomization` mechanism for sentinel-declared tools not in `knownTools` — see `ProvisionerScriptsVersionCheck ProbeCustomization handles sentinel-only tools`.
- id: macos-tmp-symlink-requires-resolvingsymlinksinpath-in-tests
  title: macOS /tmp symlink requires resolvingSymlinksInPath in tests
  body: |
    macOS `/tmp` is a symlink to `/private/tmp`. Test path comparisons involving temp file paths require `resolvingSymlinksInPath()` on both sides to avoid false inequality.
- id: release-doctor-sh-self-enforcing-sentinel-design-intent
  title: release-doctor.sh self-enforcing sentinel design intent
  body: |
    ---
    name: release-doctor-sh-self-enforcing-sentinel-design-intent
    description: Strategic intent for release-doctor.sh to self-enforce release-build.sh sentinel floors, separate from testanyware doctor
    type: project
    ---

    `release-doctor.sh` currently only prints `swift --version` for visual inspection. The design intent (from session 27 work on release-build.sh sentinels) is that it could be taught to read its sibling `release-build.sh`'s `# testanyware-min-tool:` sentinels and fail fast if a host floor is below them.

    **Why:** This would be a release-pipeline-internal cross-check, independent of `testanyware doctor`. The doctor surface is end-user-oriented; release-doctor.sh is developer/CI-oriented. Two separate enforcement surfaces.

    **How to apply:** When revisiting `scripts/release-doctor.sh`, consider adding a sentinel-validation pass that sources release-build.sh sentinel lines and compares against installed tool versions. This is a shell-script-only change; no Swift/Rust required. Not yet concrete enough for a standalone backlog task — needs a decision on failure mode (hard-fail vs. advisory) and how to extract sentinels in bash.
- id: more-release-tool-sentinels-follow-on-gh-xz-after-per-tool-probe-lands
  title: 'More release-tool sentinels follow-on: gh, xz'
  body: |
    `ProbeCustomization` mechanism in `ProvisionerScriptsVersionCheck` is in place for sentinel-declared tools with non-standard `--version` output. Next: add `# testanyware-min-tool:` sentinel lines for `gh` (used by `release-publish.sh`) and `xz` (used by `release-build.sh`). Both need a minimum version floor determined before sentinel lines can be added.

    Tools with standard first-token `--version` output need no `ProbeCustomization` entry — `parseVersion` handles them.
- id: swift-version-driver-line-goes-to-stderr
  title: swift --version driver line goes to stderr
  body: |
    `swift --version` sends `swift-driver version: X.Y` to stderr; stdout starts with `Apple Swift version X.Y.Z ...`. `ProvisionerScriptsVersionCheck.parseSwiftVersion` uses an anchored `Apple Swift version` match — correct for current behavior and defensive if the driver line ever moves to stdout.
- id: provisionerscriptsversioncheck-probecustomization-handles-sentinel-only-tools
  title: ProvisionerScriptsVersionCheck ProbeCustomization handles sentinel-only tools
  body: |
    Sentinel-declared tools absent from `ToolAvailabilityCheck.knownTools` (currently swift, dotnet) are probed via `probeCustomizations` static table in `ProvisionerScriptsVersionCheck`. Each `ProbeCustomization` supplies a custom command and custom parser. `collectHostVersions(forFloors:)` routes unknown tools through `resolveExtraHostVersion(forTool:)` instead of producing `hostVersionUnknown`. `testanyware doctor` reports `ok`/`belowFloor` for swift and dotnet. See `parseVersion greedy-matches first dotted token` for the `ToolAvailabilityCheck` hazard this bypasses.
- id: swift-version-driver-line-is-stderr-compiler-line-is-stdout
  title: 'swift --version: driver line is stderr, compiler line is stdout'
  body: |
    `swift --version` emits the `swift-driver version: X.Y` line to **stderr** and the `Apple Swift version X.Y.Z` line to **stdout**. `ProvisionerScriptsVersionCheck.runProbe` discards stderr via `proc.standardError = Pipe()`, so greedy first-token parsing of stdout actually works for swift. The per-tool `ProbeCustomization` table and anchored `"Apple Swift version "` parser were added anyway for defence against Apple ever moving the driver line to stdout. If stdout output format changes, the anchored parser returns `nil` and version comparison fails loudly rather than silently picking the driver version.
