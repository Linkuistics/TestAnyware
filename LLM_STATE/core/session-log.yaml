    ### Session 28 (2026-05-04T02:47:53Z) — Add per-tool version-probe customisation to ProvisionerScriptsVersionCheck

    - **What was attempted:** Added a per-tool probe customisation table to `ProvisionerScriptsVersionCheck` so sentinel-declared tools not covered by `ToolAvailabilityCheck.knownTools` (today: `swift`, `dotnet`) are probed and parsed correctly instead of producing `hostVersionUnknown` verdicts.
    - **What worked:** All changes landed cleanly. `ProbeCustomization` struct, `probeCustomizations` static table, `parseSwiftVersion(from:)`, `runProbe(tool:arguments:)`, and `resolveExtraHostVersion(forTool:)` were added. `collectHostVersions()` was refactored to `collectHostVersions(forFloors:)` so it can compute which tools to probe dynamically. 5 new tests added (399 total passing). `testanyware doctor` now reports `ok`/`belowFloor` for swift and dotnet instead of `hostVersionUnknown`.
    - **Key learning/discovery:** The task description had a subtle misanalysis: `swift --version` sends the `swift-driver version:` line to **stderr**, which the probe discards, so stdout actually starts cleanly with `Apple Swift version X.Y.Z`. The greedy parser would have extracted the right token. The real cause of `hostVersionUnknown` was that swift/dotnet aren't in `ToolAvailabilityCheck.knownTools` at all — they were never probed. The anchored swift parser is still correct, but for a different reason: defence against a future toolchain moving the driver line to stdout. This rationale is now documented in the parser's doc-comment.
    - **What this suggests trying next:** The mechanism is in place for future sentinel tools (e.g. `gh`, `python3`). The `swift-driver` stderr placement is a quiet platform contract — if it ever shifts to stdout, the anchored parser protects version extraction but a real-probe integration test would catch the drift. Not urgent; noted as a hazard.
