    ### Session 15 (2026-04-28T05:28:24Z) — Add testanyware doctor install-path diagnostics

    - Implemented `testanyware doctor` as a new top-level subcommand to catch the P6 hazard: a stale `/usr/local/bin/testanyware` dev symlink shadowing the Homebrew-installed binary.
    - Created `cli/Sources/TestAnywareDriver/Diagnostics/InstallPathCheck.swift` with a pure `classify` function (no I/O) plus a subprocess-driven `run` entry point. The classify/run split allows deterministic unit testing without a real Homebrew install.
    - Created `cli/Sources/testanyware/DoctorCommand.swift` as a thin ArgumentParser wrapper. Prints a fixed-format report and exits non-zero when a problem is detected.
    - Created `cli/Tests/TestAnywareDriverTests/Diagnostics/InstallPathCheckTests.swift` with 11 swift-testing cases covering: Apple Silicon healthy path, Intel healthy path, dev symlink under `/usr/local/bin`, swift-build artifact, adversarial near-prefix `/opt/homebrew2`, trailing-slash prefix, no Homebrew, not on PATH (with and without Homebrew), and `CheckResult.isOK` mapping.
    - Wired `DoctorCommand.self` into `TestAnywareCLI.subcommands`.
    - Documented in `README.md` (CLI section), `docs/reference/cli-commands.md` (top-level table + dedicated section), and `LLM_INSTRUCTIONS.md` (VM lifecycle section).
    - All 316 tests pass (`swift test --skip IntegrationTests`); manual shadow simulation verified.
    - Key design choice: path comparison uses the raw `which` result, not `realpath`, so the remediation hint names the symlink itself (`sudo rm /usr/local/bin/testanyware`) rather than the build artifact it points to.
    - What this suggests next: extend doctor with additional checks — OCR status recovery, bundled-agent existence under brew prefix, `tart`/`qemu` availability. The Diagnostics module structure supports this without redesign.
