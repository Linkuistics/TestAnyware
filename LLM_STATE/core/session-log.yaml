      - `royalvnc` FFI is off the table — Swift toolchain on Linux is a non-starter; RFB client must be pure Rust.
      - ffmpeg is embedded as a library (`ffmpeg-next` crate), not called as a subprocess.
      - Rust workspace lives at `cli-rs/` alongside the existing `cli/`; the Swift CLI is retired only after Rust reaches parity (task 15).
      - Distribution is homebrew (macOS + linuxbrew on Linux) plus a Windows zip via `cargo-dist`.
      - Linux is the primary host target; macOS guests via tart are confined to a `#[cfg(target_os = "macos")]` path (task 12).
      - Use the `directories` crate for cross-platform state paths (XDG_STATE_HOME / %LOCALAPPDATA%) throughout.

    - **What this suggests trying next:** Begin with task 1 (bootstrap Rust workspace), then task 2 (CLI design contract) to lock in flag vocabulary and output schema before any command is ported.
