    - Updated README with a new `## Install (Homebrew)` section (chosen invocation: `bash "$(brew --prefix testanyware)/share/testanyware/scripts/vm-create-golden-*.sh"`), reframed `## Building from Source` as a contributor section, and documented the override env vars.
