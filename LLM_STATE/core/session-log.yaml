    - Added `scripts/release-doctor.sh` (preflight checks), `scripts/release-build.sh` (builds CLI + macOS agent via swift, Windows agent via dotnet, stages Linux agent source, packages into `.tar.xz`, renders the formula), `scripts/release-publish.sh` (creates GitHub release, copies formula into tap), and `scripts/templates/testanyware.rb.tmpl` (single-tarball Homebrew formula, arm64 macOS only).
