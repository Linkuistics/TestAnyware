    ### Session 6 (2026-04-27T13:20:39Z) — Remove namedSpecPath, add sidecar enrichment, add protocol sync tests

    - Completed three chore tasks: deduplicated agent protocol synchrony detection, consolidated `ConnectionSpec.namedSpecPath` into `VMPaths`, and populated agent/vnc/pid columns for prefixed running VMs from their sidecars.
    - All three tasks passed their unit-test suites without incident. One pre-existing integration test (`startStopRoundTripWindows`) exceeded its 600s QEMU time limit; unrelated to this session's changes.
    - The `consolidate-connectionspec-namedspecpath-with-vmpaths` task closed a silent bug: `ConnectionSpec.namedSpecPath` passed an empty `XDG_STATE_HOME` string verbatim (producing a path rooted at `/`), while `VMPaths` correctly falls back to `~/.local/state`. No new test was needed — `stateDirFallsBackToHomeLocalStateWhenXDGEmpty` already covered the correct behaviour.
    - `enrichRunningFromSidecar` was scoped wider than the task description: the helper is platform-agnostic and also enriches QEMU (Windows) running entries from `QEMURunner.scanClonesDir`.
    - The shared-module approach for deduplicating `UnifiedRole.swift` was rejected because `agents/macos/Package.swift` explicitly forbids a path-dependency on `cli/`; a byte-identity test suite was added instead, covering all six files in the `TestAnywareAgentProtocol` module.
    - What to try next: the platform-column asymmetry (prefixed running VMs still report `"unknown"` platform) is an open follow-up; extend `enrichRunningFromSidecar` to overwrite `platform` from `spec.platform` when the current value is `"unknown"`.
- id: session-7
  timestamp: 2026-04-27T13:39:56Z
  phase: work
  body: |
    ### Session 7 (2026-04-27T13:39:56Z) — Platform enrichment fix and --open-menu snapshot flag

    - Worked two independent tasks in one session.
    - First: extended `TartRunner.enrichRunningFromSidecar` to overwrite `platform: "unknown"` entries
      from the sidecar spec's `platform` field. Previously prefixed-clone rows showed `"unknown"`
      while adopted VMs showed the correct platform — an asymmetry now closed. Two new unit tests
      in `TartRunnerTests.swift` cover the overwrite and the preserve-existing-value paths; existing
      enrichment test augmented with a platform assertion.
    - Second: added `--open-menu <label>` to `testanyware agent snapshot`. The flag clicks a named
      top-level menu-bar item via VNC (using a new `MenuBarLocator` helper for case-insensitive
      depth-first search across `[WindowInfo]`), sleeps 400 ms for the AppKit animation to settle,
      then runs the normal snapshot. The menu is left open so follow-up `agent press` commands can
      act on the now-visible submenu items. New file `MenuBarLocator.swift` (host-side orchestration,
      no agent protocol changes); 10 unit tests in `MenuBarLocatorTests.swift`. README and
      `docs/reference/cli-commands.md` updated with the flag and the lazy-AX-tree explanation.
    - All 310 tests pass including VM lifecycle integration.
    - The 400 ms settle delay is a best-effort estimate — may need tuning or a poll-until-stable
      approach if real-VM runs show menu submenus not yet populated at snapshot time.
    - What to try next: tune or make the settle delay configurable if real-VM flakiness is observed;
      consider a comma-separated `--open-menu` path for nested submenu drill-down in a future session.
- id: session-8
  timestamp: 2026-04-28T00:01:31Z
  phase: work
  body: |
    ### Session 8 (2026-04-28T00:01:31Z) — Fix window-relative input offset and add submenu drill-down path

    - Worked two independent tasks that both improve reliability of macOS Tahoe UI automation.
    - **Task 1 (VNC click offset fix):** All six `--window`-relative input commands (click, mouse-down, mouse-up, move, scroll, drag) were independently computing `(Int(win.position.x), Int(win.position.y))` as the offset. On Tahoe, the AX frame includes a ~40 px structural drop-shadow inset in its y origin, causing every `--window` click to land ~40 px below intent. Fix: introduced `WindowOriginCompensation.offset(for:platform:environment:)` at `cli/Sources/TestAnywareDriver/Agent/WindowOriginCompensation.swift`. When platform is `.macos`, it subtracts `defaultMacosTopInset` (40 px) from the y position before returning. Non-macOS and nil platforms pass through unchanged. The inset is overridable via `TESTANYWARE_WINDOW_TOP_INSET=<int>`. The six call sites in `InputCommand.swift` now share a single async `windowOffset(connection:spec:windowFilter:)` helper that resolves the window and applies the compensation. Help text on each `--window` flag was rewritten to describe auto-compensation; the prior "prefer screen-absolute coords" caveat was removed. `docs/user/troubleshooting.md` updated from a caveat note to a fix description. 9 new unit tests in `WindowOriginCompensationTests.swift`.
    - **Task 2 (submenu path for --open-menu):** `--open-menu` previously only handled a single top-level label. Added comma-separated path support (`"File,Recent Files"`). New `MenuBarLocator.parsePath(_:)` splits on comma, trims whitespace, returns nil on empty or blank segments. In `AgentCommand.swift`, `openMenuBarItem(named:)` was replaced by `openMenuBarPath(rawPath:)` which loops over segments, re-snapshots at depth `max(3, 2*(index+1)+1)` between each click to expose the just-opened submenu's AX children, and throws a descriptive `ValidationError` when a segment doesn't match. Agent fix: `focusedAppMenuBar` previously hardcoded `depth: 1` regardless of the request, making submenu items invisible. Added `depth: Int` parameter; `handleSnapshot` passes through `req.depth ?? 3`. 6 new `parsePath` tests in `MenuBarLocatorTests.swift`. All 326 tests pass.
    - Both tasks complete in CLI; end-to-end smoke tests for both require a Tahoe golden rebuild (TCC accessibility cannot be re-granted without a full golden bake).
    - What this suggests next: when a Tahoe golden is rebuilt (for SSH-disable or Documents-TCC tasks), smoke-test both features against real AppKit windows. If the 40 px default doesn't match a different window subrole, extend `WindowOriginCompensation` to dispatch on `WindowInfo.windowType`. If 400 ms per-segment settle is insufficient for deep submenus, add a `--menu-settle-ms` flag or poll-and-retry predicate.
- id: session-9
  timestamp: 2026-04-28T01:06:43Z
  phase: work
  body: |
    ### Session 9 (2026-04-28T01:06:43Z) — Disable SSH in macOS and Linux golden images

    - **Attempted:** Remove SSH from both golden images and all related Swift/docs plumbing.
    - **What worked:** End-to-end implementation succeeded in a single session — provisioner scripts updated, Swift CLI cleaned up, tests updated, docs revised, both goldens rebuilt and live-validated.
    - **Provisioner scripts:** `vm-create-golden-macos.sh` folds `systemsetup -f -setremotelogin off` into the same `vm_ssh` call as the System Events shutdown, avoiding a race where the SSH session dies mid-flight. `vm-create-golden-linux.sh` does `systemctl disable ssh.service && systemctl mask ssh.service && shutdown` in a single SSH call; `mask` writes the `/dev/null` symlink preventing accidental re-enable.
    - **Swift CLI:** Removed `VMSpec.ssh`, the `sshReady` poll loop, the SSH-wait block from `VMLifecycle.startTart`, the `--no-ssh` flag shim in `VMCommand`, and all `sshEndpoint` plumbing. Tests updated accordingly; a new `decodesLegacySpecWithSshField` test locks in forward-compat for old spec files that still carry the `ssh` field (ignored by `JSONDecoder` by default).
    - **Verification:** `swift build` clean; `swift test` 326/326 against old goldens; both new goldens rebuilt from scratch; live clone validation on Linux (port 22 refused, `masked` unit, `/dev/null` symlink) and macOS (port 22 refused, sshd unloaded, `disabled` launchd state); integration suite `startStopRoundTrip` 3/3 passed.
    - **What this suggests next:** `smoke-test-window-compensation-and-open-menu-path-on-tahoe-golden` is now half-unblocked (still waiting on `audit-testanyware-agent-entitlements-for-documents-folder-access-on-tahoe`). Backup goldens (`*-backup`) were left on disk (~37 GB total) for the user to delete at their convenience.
- id: session-10
  timestamp: 2026-04-28T02:24:01Z
  phase: work
  body: |
    ### Session 10 (2026-04-28T02:24:01Z) — Add FDA TCC grant to macOS golden; brainstorm Homebrew distribution

    - Attempted three backlog tasks: TCC entitlement audit, backup-image cleanup, and Homebrew distribution brainstorm.
    - **TCC audit (vm-create-golden-macos.sh):** Added `kTCCServiceSystemPolicyAllFiles` (Full Disk Access) grant alongside the existing `kTCCServiceAccessibility` grant. Renamed `grant_accessibility_permission()` → `grant_tcc_permissions()` to reflect the broader scope. Both grants share a single `codesign -dr- | csreq` invocation via `&&`-chained sqlite3 calls in one VM-shell session. Verification blocks updated to check both TCC rows at install-time, post-grant, and post-SIP-re-enable. Script change passes `bash -n`; end-to-end verification deferred to the smoke-test rebuild task.
    - **Backup cleanup:** Both backup VMs (`testanyware-golden-macos-tahoe-backup`, `testanyware-golden-linux-24.04-backup`) were already absent — `tart delete` returned "VM does not exist" for both. No action needed; ~37 GB already recovered.
    - **Homebrew distribution brainstorm:** Resolved all key architecture decisions (ad-hoc signing only, arm64-only macOS, single-tarball bundle covering CLI + all three agents + golden scripts, reuse `Linkuistics/homebrew-taps`). Wrote `0-docs/plans/HomebrewDistribution.plan.md` as a P0–P6 phase plan. One open follow-up: invocation UX for `vm-create-golden-*.sh` for brew-installed users (three candidates; deferred to P5).
    - What worked: the Ravel-Lite pipeline is a near-exact template for the release-build shape; single-tarball factoring eliminated `gh release download` dependency and per-artifact complexity.
    - Suggests next: schedule `local-homebrew-binary-distribution-tap-no-client-builds` (start P1: `scripts/release-build.sh`); schedule `smoke-test-window-compensation-and-open-menu-path-on-tahoe-golden` to exercise the new TCC FDA grant.
