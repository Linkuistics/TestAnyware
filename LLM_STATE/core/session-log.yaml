    - Verification: `bash -n` clean on all scripts, `ruby -c` clean on formula template, `release-doctor.sh` reports all prerequisites met, `release-build.sh` fires the dirty-tree gate correctly before proceeding.
    - P6 (end-to-end smoke test via actual release tag + brew install + golden rebuild) deferred — requires a clean tagged HEAD.
    - Key open questions: (a) invocation UX for brew users invoking golden scripts (documented bash invocation vs a future `testanyware vm create-golden` subcommand); (b) TCC-csreq correctness when the in-VM agent arrives via brew rather than `swift build` — should be fine but unverified until P6.
