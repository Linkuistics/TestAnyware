tasks:
- id: re-measure-matcher-layer-hypotheses-sessions-28-29-via-cached-a-b
  title: Re-measure matcher-layer hypotheses (Sessions 28–29) via cached A/B
  category: evaluation
  status: not_started
  dependencies: []
  description: |
