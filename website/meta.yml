name: TestAnyware
slug: testanyware
tagline: AI-driven GUI testing across virtual machines.
summary: |
  TestAnyware is a two-channel, platform-agnostic driver for VMs. Connect to
  any macOS, Linux, or Windows VM over VNC for pixel-level capture and input,
  and over an HTTP agent for accessibility-tree queries, semantic actions, exec,
  and file transfer. A Python vision pipeline decomposes screenshots into
  structured UI data for LLM-driven test workflows.

status: progress
github_url: https://github.com/Linkuistics/TestAnyware
tags: [ai-tools, ai-testing]

